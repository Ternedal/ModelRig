name: generate-current-state-rag-pr

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    if: github.head_ref == 'agent/rag-benchmark-harness'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: agent/rag-benchmark-harness
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install worker dependencies
        run: pip install -r worker/requirements.txt --break-system-packages >/dev/null
      - name: Regenerate authoritative state
        run: python scripts/current_state.py
      - name: Commit generated state if changed
        shell: bash
        run: |
          if git diff --quiet -- CURRENT_STATE.md; then
            echo "CURRENT_STATE.md already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CURRENT_STATE.md
          git commit -m "docs: regenerate current test inventory"
          git push origin HEAD:agent/rag-benchmark-harness

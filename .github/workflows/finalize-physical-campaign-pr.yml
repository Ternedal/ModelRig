name: finalize-physical-campaign-pr

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'eval/physical-validation-campaign'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: eval/physical-validation-campaign
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Harden lifecycle and candidate evidence
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: target count is {count}")
              target.write_text(text.replace(old, new), encoding="utf-8")

          replace_once(
              "scripts/rig_preflight.py",
              "import os\nimport subprocess",
              "import os\nimport re\nimport subprocess",
          )
          replace_once(
              "scripts/rig_preflight.py",
              '''    git_sha = proc.stdout.strip()
              if proc.returncode != 0 or len(git_sha) != 40:
                  raise RuntimeError("git HEAD is unavailable for preflight evidence")''',
              '''    git_sha = proc.stdout.strip()
              if proc.returncode != 0 or re.fullmatch(r"[0-9a-f]{40}", git_sha) is None:
                  raise RuntimeError("git HEAD is unavailable for preflight evidence")''',
          )

          campaign_path = Path("scripts/physical_validation_campaign.py")
          campaign = campaign_path.read_text(encoding="utf-8")
          campaign = campaign.replace(
              "_thresholds: dict[str, float]",
              "_thresholds: dict[str, Any]",
          )
          campaign = campaign.replace(
              "thresholds: dict[str, float]",
              "thresholds: dict[str, Any]",
          )
          dead = '''    paths = {
                  key: getattr(args, key.replace("_", "") + "_report", None)
                  for key in ()
              }
          '''
          if campaign.count(dead) != 1:
              raise SystemExit(f"dead paths block count is {campaign.count(dead)}")
          campaign = campaign.replace(dead, "")

          helper_anchor = '''def _valid_digest(value: Any, length: int) -> bool:
              return isinstance(value, str) and re.fullmatch(rf"[0-9a-f]{{{length}}}", value) is not None


          def _base_result'''
          helper_replacement = '''def _valid_digest(value: Any, length: int) -> bool:
              return isinstance(value, str) and re.fullmatch(rf"[0-9a-f]{{{length}}}", value) is not None


          def _nonempty_text(errors: list[str], label: str, value: Any) -> str | None:
              if not isinstance(value, str) or not value.strip():
                  errors.append(f"{label} must be a non-empty string")
                  return None
              return value.strip()


          def _base_result'''
          if campaign.count(helper_anchor) != 1:
              raise SystemExit("nonempty helper anchor is missing")
          campaign = campaign.replace(helper_anchor, helper_replacement)

          lifecycle_anchor = '''    _expect_equal(errors, "candidate.code_sha256", _nested(report, "candidate", "code_sha256"), candidate["code_sha256"])
              trials = report.get("trials")'''
          lifecycle_replacement = '''    _expect_equal(errors, "candidate.code_sha256", _nested(report, "candidate", "code_sha256"), candidate["code_sha256"])
              host = report.get("host")
              if not isinstance(host, dict):
                  errors.append("lifecycle host is missing")
              else:
                  _nonempty_text(errors, "host.hostname", host.get("hostname"))
                  _nonempty_text(errors, "host.windows_version", host.get("windows_version"))
              started_at = _iso_datetime(report.get("started_at"))
              finished_at = _iso_datetime(report.get("finished_at"))
              if started_at is None:
                  errors.append("lifecycle started_at is invalid")
              if finished_at is None:
                  errors.append("lifecycle finished_at is invalid")
              if started_at is not None and finished_at is not None and started_at > finished_at:
                  errors.append("lifecycle started_at is after finished_at")
              trials = report.get("trials")'''
          if campaign.count(lifecycle_anchor) != 1:
              raise SystemExit("lifecycle identity anchor is missing")
          campaign = campaign.replace(lifecycle_anchor, lifecycle_replacement)

          good_anchor = '''        _expect_equal(errors, "good_update.target_code_sha256", good.get("target_code_sha256"), candidate["code_sha256"])
                  if not _valid_digest(good.get("source_git_sha"), 40):
                      errors.append("good_update.source_git_sha is not a 40-character digest")'''
          good_replacement = '''        _expect_equal(errors, "good_update.target_code_sha256", good.get("target_code_sha256"), candidate["code_sha256"])
                  source_version = _nonempty_text(
                      errors, "good_update.source_version", good.get("source_version")
                  )
                  if source_version == candidate["version"]:
                      errors.append("good_update.source_version must differ from the candidate")
                  if not _valid_digest(good.get("source_git_sha"), 40):
                      errors.append("good_update.source_git_sha is not a 40-character digest")
                  elif good.get("source_git_sha") == candidate["git_sha"]:
                      errors.append("good_update.source_git_sha must differ from the candidate")'''
          if campaign.count(good_anchor) != 1:
              raise SystemExit("good update anchor is missing")
          campaign = campaign.replace(good_anchor, good_replacement)

          bad_anchor = '''        _expect_equal(errors, "bad_update.active_code_sha256", bad.get("active_code_sha256"), candidate["code_sha256"])
                  if not _valid_digest(bad.get("attempted_git_sha"), 40):'''
          bad_replacement = '''        _expect_equal(errors, "bad_update.active_code_sha256", bad.get("active_code_sha256"), candidate["code_sha256"])
                  _nonempty_text(
                      errors, "bad_update.attempted_version", bad.get("attempted_version")
                  )
                  if not _valid_digest(bad.get("attempted_git_sha"), 40):'''
          if campaign.count(bad_anchor) != 1:
              raise SystemExit("bad update anchor is missing")
          campaign = campaign.replace(bad_anchor, bad_replacement)
          campaign_path.write_text(campaign, encoding="utf-8")

          test_path = Path("tests/workflow_physical_validation_campaign.py")
          test = test_path.read_text(encoding="utf-8")
          insertion_anchor = '''        check(
                      any("reboot.performed is not true" in error for error in typed["evidence"]["lifecycle"]["errors"]),
                      "lifecycle type failure is explicit",
                  )
          finally:'''
          insertion_replacement = '''        check(
                      any("reboot.performed is not true" in error for error in typed["evidence"]["lifecycle"]["errors"]),
                      "lifecycle type failure is explicit",
                  )

                  reports = valid_reports()
                  reports["lifecycle"]["started_at"] = (NOW + timedelta(minutes=1)).isoformat()
                  write(temp / "lifecycle.json", reports["lifecycle"])
                  reversed_time, reversed_exit = campaign.campaign_report(args_for(temp, "verify"))
                  check(reversed_exit == 1, "reversed lifecycle timestamps block campaign")
                  check(
                      "lifecycle started_at is after finished_at"
                      in reversed_time["evidence"]["lifecycle"]["errors"],
                      "lifecycle timestamp ordering failure is explicit",
                  )

                  reports = valid_reports()
                  reports["lifecycle"]["host"]["windows_version"] = "   "
                  reports["lifecycle"]["trials"]["good_update"]["source_version"] = CANDIDATE["version"]
                  reports["lifecycle"]["trials"]["good_update"]["source_git_sha"] = CANDIDATE["git_sha"]
                  reports["lifecycle"]["trials"]["bad_update"]["attempted_version"] = ""
                  write(temp / "lifecycle.json", reports["lifecycle"])
                  metadata, metadata_exit = campaign.campaign_report(args_for(temp, "verify"))
                  check(metadata_exit == 1, "invalid lifecycle metadata blocks campaign")
                  metadata_errors = metadata["evidence"]["lifecycle"]["errors"]
                  check(
                      "host.windows_version must be a non-empty string" in metadata_errors,
                      "lifecycle host metadata is typed",
                  )
                  check(
                      "good_update.source_version must differ from the candidate" in metadata_errors,
                      "good update must prove a real version transition",
                  )
                  check(
                      "good_update.source_git_sha must differ from the candidate" in metadata_errors,
                      "good update must prove a real commit transition",
                  )
                  check(
                      "bad_update.attempted_version must be a non-empty string" in metadata_errors,
                      "bad update identifies the attempted build",
                  )
          finally:'''
          if test.count(insertion_anchor) != 1:
              raise SystemExit("campaign test insertion anchor is missing")
          test_path.write_text(
              test.replace(insertion_anchor, insertion_replacement),
              encoding="utf-8",
          )

          backlog_path = Path("BACKLOG.md")
          backlog = backlog_path.read_text(encoding="utf-8")
          backlog = backlog.replace(
              '| T-004 Kør `rig_preflight.py` | #63 | P0 | [RIG] | T-001 | Exit 0 eller dokumenteret blocker. |',
              '| T-004 Kør `rig_preflight.py` | #63 | P0 | [RIG] (JSON-bevis [ISO] ✅) | T-001 | Exit 0 eller dokumenteret blocker. |',
          )
          backlog = backlog.replace(
              '| T-006 Bevis reboot, supervisor, updater, rollback | #65 | P0 | [RIG] | T-001, T-004 | reboot→ready, kill→restart, bad update→rollback. |',
              '| T-006 Bevis reboot, supervisor, updater, rollback | #65 | P0 | [RIG] (schema/kampagne [ISO] ✅) | T-001, T-004 | reboot→ready, kill→restart, bad update→rollback. |',
          )
          old_note = '''Harnessene til T-007, T-040 og T-043 er versionsbundne og regressions-testede.
          Kun de faktiske lokale model-, voice-, device- og GPU-målinger mangler.'''
          new_note = '''Harnessene til T-007, T-040 og T-043 er versionsbundne og regressions-testede.
          Preflight-JSON, lifecycle-schema og den samlede candidate-bound kampagnekontrol er
          også leveret isoleret. Kun de faktiske rig-, model-, voice-, device-, update- og
          GPU-observationer mangler.'''
          if old_note not in backlog:
              raise SystemExit("BACKLOG Prove note is missing")
          backlog_path.write_text(backlog.replace(old_note, new_note), encoding="utf-8")

          for cleanup in (
              Path(".github/workflows/diagnose-physical-campaign-pr.yml"),
              Path(".github/workflows/finalize-physical-campaign-pr.yml"),
          ):
              cleanup.unlink(missing_ok=True)
          PY
      - name: Regenerate authoritative state
        shell: bash
        run: |
          pip install -r worker/requirements.txt --break-system-packages >/dev/null
          python scripts/current_state.py
      - name: Validate final campaign delivery
        shell: bash
        run: |
          pip install --quiet ruff
          ruff check --select E9,F63,F7,F82 scripts/rig_preflight.py scripts/physical_validation_campaign.py tests/workflow_physical_validation_campaign.py
          PYTHONPATH=worker python tests/workflow_physical_validation_campaign.py
          python tests/workflow_current_state.py
          git diff --check
          test ! -e .github/workflows/diagnose-physical-campaign-pr.yml
          test ! -e .github/workflows/finalize-physical-campaign-pr.yml
      - name: Commit clean campaign delivery
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(eval): finalize candidate-bound physical campaign"
          git push origin HEAD:eval/physical-validation-campaign

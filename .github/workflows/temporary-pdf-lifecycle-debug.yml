name: temporary-pdf-lifecycle-debug

on:
  pull_request:
    branches:
      - main
    paths:
      - worker/app/rag_pdf.py
      - tests/worker_rag_pdf_lifecycle.py
      - .github/workflows/temporary-pdf-lifecycle-debug.yml

permissions:
  contents: read

jobs:
  pdf-lifecycle-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Run exact PDF lifecycle test
        env:
          PYTHONPATH: worker
        run: python tests/worker_rag_pdf_lifecycle.py

  backend-python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: '1.23'
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Build backend
        run: cd backend && go build -o /tmp/modelrig-server ./cmd/modelrig-server
      - name: Run backend integration scripts
        env:
          MODELRIG_BIN: /tmp/modelrig-server
        run: |
          set -e
          for f in tests/backend_*.py; do
            [ -e "$f" ] || continue
            echo "running $f"
            python "$f"
          done

  e2e-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: '1.23'
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Build backend
        run: cd backend && go build -o /tmp/modelrig-server ./cmd/modelrig-server
      - name: Run e2e
        env:
          MODELRIG_BIN: /tmp/modelrig-server
        run: python tests/e2e.py

  workflow-test-slice:
    name: workflow-tests-${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: a-m
            pattern: 'tests/workflow_[a-m]*.py'
          - name: n-z
            pattern: 'tests/workflow_[n-z]*.py'
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Run workflow test slice
        env:
          TEST_PATTERN: ${{ matrix.pattern }}
        run: |
          set -e
          found=0
          for f in $TEST_PATTERN; do
            [ -e "$f" ] || continue
            found=1
            echo "running $f"
            python "$f"
          done
          [ "$found" = 1 ] || { echo "no tests matched $TEST_PATTERN"; exit 1; }

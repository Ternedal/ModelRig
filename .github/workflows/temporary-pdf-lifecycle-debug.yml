name: temporary-pdf-lifecycle-debug

on:
  pull_request:
    branches:
      - main
    paths:
      - worker/app/rag_pdf.py
      - tests/worker_rag_pdf_lifecycle.py
      - .github/workflows/temporary-pdf-lifecycle-debug.yml

permissions:
  contents: read

jobs:
  pdf-lifecycle-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Run exact PDF lifecycle test
        env:
          PYTHONPATH: worker
        run: python tests/worker_rag_pdf_lifecycle.py

  workflow-contract:
    name: workflow-${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: action-pins
            file: tests/workflow_action_pins.py
          - name: activation-readiness
            file: tests/workflow_activation_readiness.py
          - name: agent3-dormant
            file: tests/workflow_agent3_dormant.py
          - name: current-state
            file: tests/workflow_current_state.py
          - name: dependency-pins
            file: tests/workflow_dep_pins.py
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Run workflow contract
        run: python ${{ matrix.file }}

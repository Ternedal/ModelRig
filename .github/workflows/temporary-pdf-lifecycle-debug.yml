name: temporary-pdf-lifecycle-debug

on:
  pull_request:
    branches:
      - main
    paths:
      - worker/app/rag_pdf.py
      - tests/worker_rag_pdf_lifecycle.py
      - .github/workflows/temporary-pdf-lifecycle-debug.yml

permissions:
  contents: read

jobs:
  full-test-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Run exact globbed test file
        env:
          PYTHONPATH: worker
        run: python tests/worker_rag_pdf_lifecycle.py

  worker-suite-slice:
    name: worker-suite-${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: agent3-a-f
            pattern: 'tests/worker_agent3_[a-f]*.py'
            skip_agent: 'no'
          - name: agent3-g-m
            pattern: 'tests/worker_agent3_[g-m]*.py'
            skip_agent: 'no'
          - name: agent3-n-s
            pattern: 'tests/worker_agent3_[n-s]*.py'
            skip_agent: 'no'
          - name: agent3-t-z
            pattern: 'tests/worker_agent3_[t-z]*.py'
            skip_agent: 'no'
          - name: legacy-agent
            pattern: 'tests/worker_agent_*.py'
            skip_agent: 'no'
          - name: other-a-m
            pattern: 'tests/worker_[a-m]*.py'
            skip_agent: 'yes'
          - name: other-n-r
            pattern: 'tests/worker_[n-r]*.py'
            skip_agent: 'yes'
          - name: other-s-z
            pattern: 'tests/worker_[s-z]*.py'
            skip_agent: 'yes'
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Install worker dependencies
        run: pip install -r worker/requirements.txt --break-system-packages
      - name: Run worker test slice
        env:
          PYTHONPATH: worker
          TEST_PATTERN: ${{ matrix.pattern }}
          SKIP_AGENT: ${{ matrix.skip_agent }}
        shell: bash
        run: |
          set -e
          found=0
          for f in $TEST_PATTERN; do
            [ -e "$f" ] || continue
            if [ "$SKIP_AGENT" = yes ] && [[ "$f" == tests/worker_agent* ]]; then
              continue
            fi
            found=1
            echo "running $f"
            python "$f"
          done
          [ "$found" = 1 ] || { echo "no tests matched $TEST_PATTERN"; exit 1; }

name: scheduler-ed25519-self-build

on:
  push:
    branches: [feature/scheduler-ed25519-approval-15890]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'feature/scheduler-ed25519-approval-15890'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: feature/scheduler-ed25519-approval-15890
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.23"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Reconstruct and apply reviewed patch
        run: |
          set -euo pipefail
          cat .github/scheduler-build/patch.* > /tmp/scheduler-ed25519.patch
          echo "e8a7e85a0617dd5291e1654c669495178a4e14173df9a82229b278c7b7c112a7  /tmp/scheduler-ed25519.patch" | sha256sum -c -
          git apply --check /tmp/scheduler-ed25519.patch
          git apply /tmp/scheduler-ed25519.patch
          gofmt -w \
            backend/internal/config/config.go \
            backend/internal/config/scheduler_approval_test.go \
            backend/internal/httpapi/schedules.go \
            backend/internal/httpapi/schedules_test.go \
            backend/internal/httpapi/server.go \
            backend/cmd/modelrig-supervisor/main.go \
            backend/cmd/modelrig-supervisor/main_test.go
      - name: Install worker dependencies
        run: pip install -r worker/requirements.txt
      - name: Regenerate computed state documents
        env:
          PYTHONPATH: worker
        run: |
          python scripts/current_state.py
          python scripts/activation_readiness.py
      - name: Version sites match VERSION
        run: python scripts/version_tool.py check
      - name: Build vet and test backend
        run: |
          cd backend
          go build -o /tmp/modelrig-server ./cmd/modelrig-server
          go vet ./...
          go test ./...
      - name: Python lint gate
        run: |
          pip install --quiet ruff
          ruff check --select E9,F63,F7,F82 worker/ tests/ scripts/
      - name: Full repository Python test glob
        env:
          MODELRIG_BIN: /tmp/modelrig-server
        run: |
          set -euo pipefail
          for f in tests/backend_*.py tests/e2e.py tests/worker_*.py tests/workflow_*.py; do
            [ -e "$f" ] || continue
            echo "::group::$f"
            PYTHONPATH=worker python "$f"
            echo "::endgroup::"
          done
      - name: Commit clean candidate
        run: |
          set -euo pipefail
          rm -rf .github/scheduler-build
          rm .github/workflows/scheduler-ed25519-self-build.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(scheduler): require backend-signed standing-grant approvals"
          git push origin HEAD:feature/scheduler-ed25519-approval-15890

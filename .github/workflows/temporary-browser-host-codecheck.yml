name: temporary-browser-host-codecheck

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  browser-host:
    if: github.head_ref == 'agent/isolated-browser-host'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - run: python -m pip install -r worker/requirements.txt
      - run: PYTHONPATH=worker python tests/worker_browser_host.py

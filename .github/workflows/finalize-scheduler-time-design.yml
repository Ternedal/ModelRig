name: finalize-scheduler-time-design

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'agent/scheduler-time-semantics-design'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: agent/scheduler-time-semantics-design
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - name: Install validation dependencies
        run: |
          pip install -r worker/requirements.txt --break-system-packages >/dev/null
          pip install --quiet ruff
      - name: Validate reference oracle
        run: |
          ruff check scripts/scheduler_time_oracle.py tests/scheduler_time_oracle.py --select E9,F63,F7,F82
          python tests/scheduler_time_oracle.py
          python scripts/scheduler_time_oracle.py \
            --timezone Europe/Copenhagen \
            --daily 02:30 \
            --after 2026-03-28T12:00:00+00:00 > /tmp/oracle.json
          grep -q '2026-03-30' /tmp/oracle.json
      - name: Regenerate authoritative state
        run: python scripts/current_state.py
      - name: Remove temporary workflow and validate diff
        shell: bash
        run: |
          rm .github/workflows/finalize-scheduler-time-design.yml
          git diff --check
          test ! -e .github/workflows/finalize-scheduler-time-design.yml
          grep -q 'scheduler_time_oracle.py' CURRENT_STATE.md
          grep -q 'Status: design + executable reference oracle only' SCHEDULER_TIME_SEMANTICS.md
      - name: Commit clean design delivery
        shell: bash
        run: |
          git config user.name 'ModelRig automation'
          git config user.email 'actions@users.noreply.github.com'
          git add \
            CURRENT_STATE.md \
            .github/workflows/finalize-scheduler-time-design.yml
          git commit -m 'docs: record scheduler time reference suite'
          git push origin HEAD:agent/scheduler-time-semantics-design

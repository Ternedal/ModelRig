name: patch-rag-benchmark-review-pr

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/rag-benchmark-harness'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: agent/rag-benchmark-harness
          fetch-depth: 1
          show-progress: false
      - name: Stop on an already captured diagnostic
        shell: bash
        run: |
          if [ -f validation/rag-review-failure.txt ]; then
            cat validation/rag-review-failure.txt
            exit 1
          fi
      - name: Apply final benchmark review findings
        run: python scripts/_patch_rag_benchmark_review.py
      - name: Install worker dependencies
        run: pip install -r worker/requirements.txt --break-system-packages >/dev/null
      - name: Validate benchmark suite and persist failure
        shell: bash
        run: |
          python -m py_compile scripts/rag_benchmark.py tests/worker_rag_benchmark.py
          log="$RUNNER_TEMP/rag-review-test.txt"
          set +e
          PYTHONPATH=worker python tests/worker_rag_benchmark.py >"$log" 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            mkdir -p validation
            tail -n 120 "$log" > validation/rag-review-failure.txt
            cat validation/rag-review-failure.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add validation/rag-review-failure.txt
            git commit -m "chore: capture RAG review test failure"
            git push origin HEAD:agent/rag-benchmark-harness
            exit "$status"
          fi
          cat "$log"
      - name: Validate patch shape
        run: |
          git diff --check
          test ! -e scripts/_patch_rag_benchmark_review.py
      - name: Commit final review fixes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/rag_benchmark.py tests/worker_rag_benchmark.py scripts/_patch_rag_benchmark_review.py
          git commit -m "fix(eval): harden RAG benchmark evidence and dataset"
          git push origin HEAD:agent/rag-benchmark-harness

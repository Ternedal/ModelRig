name: diagnose-rag-benchmark-pr

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'agent/rag-benchmark-harness'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install worker dependencies
        run: pip install -r worker/requirements.txt --break-system-packages >/dev/null
      - name: Run isolated RAG benchmark suite
        id: test
        shell: bash
        run: |
          log="$RUNNER_TEMP/rag-benchmark-diagnostic.txt"
          set +e
          PYTHONPATH=worker python tests/worker_rag_benchmark.py >"$log" 2>&1
          status=$?
          set -e
          cat "$log"
          exit "$status"
      - name: Upload diagnostic
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rag-benchmark-diagnostic
          path: ${{ runner.temp }}/rag-benchmark-diagnostic.txt
          if-no-files-found: error
          retention-days: 1

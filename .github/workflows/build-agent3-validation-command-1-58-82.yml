name: build-agent3-validation-command-1-58-82

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    if: github.head_ref == 'build/agent3-validation-command-1-58-82'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: build/agent3-validation-command-1-58-82
          fetch-depth: 4
      - name: Preserve reviewed patch program
        run: cp .github/agent3_validation_command_patch.py /tmp/agent3-validation-command-patch.py
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - name: Checkout exact main parent
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin 64224996c905267a55f9b6694780599b97fe891b
          git checkout --detach FETCH_HEAD
          test "$(git rev-parse HEAD)" = "64224996c905267a55f9b6694780599b97fe891b"
          test "$(cat VERSION)" = "1.58.81"
      - name: Apply reviewed product patch
        run: python3 /tmp/agent3-validation-command-patch.py
      - name: Install worker dependencies
        run: pip install -r worker/requirements.txt --break-system-packages
      - name: Set version and regenerate repository truth
        run: |
          set -euo pipefail
          python3 scripts/version_tool.py set 1.58.82
          python3 scripts/current_state.py
          python3 scripts/activation_readiness.py
          python3 scripts/version_tool.py check
          python3 scripts/current_state.py --check
          python3 scripts/activation_readiness.py --check
          git diff --check -- . ':(exclude)ACTIVATION_READINESS.md'
      - name: Run focused validation command contracts
        run: |
          set -euo pipefail
          env PYTHONPATH=worker python3 tests/worker_agent3_validation_path_contract.py
          env PYTHONPATH=worker python3 tests/worker_agent3_rig_validation_cli.py
          env PYTHONPATH=worker python3 tests/worker_agent3_rig_evidence.py
          env PYTHONPATH=worker python3 tests/workflow_activation_readiness.py
      - name: Push one clean product commit
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          test -n "$(git status --porcelain)"
          git commit -m 'feat(agent3): add one-command physical validation'
          clean_sha=$(git rev-parse HEAD)
          git push --force origin HEAD:refs/heads/feature/agent3-validation-command-1-58-82
          printf 'commit=%s\nbase=%s\nversion=1.58.82\n' "$clean_sha" '64224996c905267a55f9b6694780599b97fe891b' > /tmp/agent3-validation-command-result.txt
          git diff --stat 64224996c905267a55f9b6694780599b97fe891b..HEAD >> /tmp/agent3-validation-command-result.txt
          cat /tmp/agent3-validation-command-result.txt
      - name: Upload clean commit identity
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: agent3-validation-command-result
          path: /tmp/agent3-validation-command-result.txt
          if-no-files-found: error
          retention-days: 3

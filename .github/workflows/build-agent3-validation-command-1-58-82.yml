name: build-agent3-validation-command-1-58-83

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    if: github.head_ref == 'build/agent3-validation-command-1-58-82'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: build/agent3-validation-command-1-58-82
          fetch-depth: 4
      - name: Preserve reviewed builder programs
        run: |
          cp .github/agent3_validation_command_patch.py /tmp/agent3-validation-command-patch.py
          cp .github/agent3_validation_command_postpatch.py /tmp/agent3-validation-command-postpatch.py
          cp .github/create_detached_product_commit.py /tmp/create-detached-product-commit.py
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - name: Checkout exact current main
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin 2225ff371c764451499613a94d3540dfe1f0b742
          git checkout --detach FETCH_HEAD
          test "$(git rev-parse HEAD)" = "2225ff371c764451499613a94d3540dfe1f0b742"
          test "$(cat VERSION)" = "1.58.82"
      - name: Retarget harness and release anchors
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('/tmp/agent3-validation-command-patch.py')
          text = path.read_text(encoding='utf-8')
          replacements = [
              ('''    "import agent3_rig_validation as validation\\n",
              "import agent3_rig_validation as validation\\nfrom agent3_validation_paths import DEFAULT_REPORT_TEXT\\n",''',
               '''    "from typing import Any\\n",
              "from typing import Any\\n\\nfrom agent3_validation_paths import DEFAULT_REPORT_TEXT\\n",'''),
              ('''    "versionCode = 213",
              "versionCode = 214",''',
               '''    "versionCode = 214",
              "versionCode = 215",'''),
          ]
          for old, new in replacements:
              if text.count(old) != 1:
                  raise SystemExit(f'retarget anchor drifted: {old!r} -> {text.count(old)} matches')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          compile(text, str(path), 'exec')
          PY
      - name: Apply reviewed product patch
        id: patch
        shell: bash
        run: |
          set +e
          {
            python3 /tmp/agent3-validation-command-patch.py
            first=$?
            if [ $first -eq 0 ]; then
              python3 /tmp/agent3-validation-command-postpatch.py
              second=$?
            else
              second=0
            fi
            [ $first -eq 0 ] && [ $second -eq 0 ]
          } > /tmp/agent3-validation-command-patch.log 2>&1
          rc=$?
          cat /tmp/agent3-validation-command-patch.log
          echo "status=$rc" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: agent3-validation-command-patch-log
          path: /tmp/agent3-validation-command-patch.log
          if-no-files-found: error
          retention-days: 3
      - name: Fail when product patch failed
        if: steps.patch.outputs.status != '0'
        run: exit 1
      - name: Install worker dependencies
        run: pip install -r worker/requirements.txt --break-system-packages
      - name: Set version and regenerate repository truth
        run: |
          set -euo pipefail
          python3 scripts/version_tool.py set 1.58.83
          python3 scripts/current_state.py
          python3 scripts/activation_readiness.py
          python3 scripts/version_tool.py check
          python3 scripts/current_state.py --check
          python3 scripts/activation_readiness.py --check
          git diff --check -- . ':(exclude)ACTIVATION_READINESS.md'
      - name: Run focused validation command contracts
        id: focused
        shell: bash
        run: |
          set +e
          : > /tmp/agent3-validation-command-tests.log
          status=0
          run_cmd() {
            echo ">>> $*" | tee -a /tmp/agent3-validation-command-tests.log
            "$@" >> /tmp/agent3-validation-command-tests.log 2>&1
            rc=$?
            echo "<<< rc=$rc" | tee -a /tmp/agent3-validation-command-tests.log
            if [ $rc -ne 0 ] && [ $status -eq 0 ]; then status=$rc; fi
          }
          run_cmd env PYTHONPATH=worker python3 tests/worker_agent3_validation_path_contract.py
          run_cmd env PYTHONPATH=worker python3 tests/worker_agent3_rig_validation_cli.py
          run_cmd env PYTHONPATH=worker python3 tests/worker_agent3_rig_evidence.py
          run_cmd env PYTHONPATH=worker python3 tests/workflow_activation_readiness.py
          run_cmd python3 tests/workflow_doc_authority.py
          cat /tmp/agent3-validation-command-tests.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload focused validation diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: agent3-validation-command-tests-log
          path: /tmp/agent3-validation-command-tests.log
          if-no-files-found: error
          retention-days: 3
      - name: Fail when focused validation contracts failed
        if: steps.focused.outputs.status != '0'
        run: exit 1
      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Get-ChildItem -Path . -Recurse -File -Filter *.ps1 | ForEach-Object {
            [void][scriptblock]::Create((Get-Content -LiteralPath $_.FullName -Raw))
            Write-Host "parsed $($_.FullName)"
          }
      - name: Create detached clean product commit
        id: detached
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          python3 /tmp/create-detached-product-commit.py > /tmp/agent3-validation-command-detached.log 2>&1
          rc=$?
          cat /tmp/agent3-validation-command-detached.log
          echo "status=$rc" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload detached commit diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: agent3-validation-command-detached-log
          path: /tmp/agent3-validation-command-detached.log
          if-no-files-found: error
          retention-days: 3
      - name: Fail when detached commit creation failed
        if: steps.detached.outputs.status != '0'
        run: exit 1
      - name: Upload clean commit identity
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: agent3-validation-command-result
          path: /tmp/agent3-validation-command-result.txt
          if-no-files-found: error
          retention-days: 3

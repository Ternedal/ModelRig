name: ci

# Runs the shared test suite (_tests.yml) on every push to main and on pull
# requests, so a regression or version drift is caught before a release tag is
# cut. The test list lives in _tests.yml, shared with build-and-release.yml --
# no duplication, the two gates can't drift apart.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    uses: ./.github/workflows/_tests.yml

  # The optional browser runtime stays out of worker/requirements.txt. This job
  # installs it in isolation and validates imports, constructor fields, the
  # concrete action registry and Browser Use's temp-download behavior without
  # starting Chromium, creating a model client or performing network research.
  browser-use-runtime-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install exact optional Browser Use runtime
        run: python -m pip install --disable-pip-version-check -r worker/requirements-browser-use.txt
      - name: Validate Browser Use runtime contract without launching a browser
        run: PYTHONPATH=worker python scripts/browser_use_runtime_contract.py

  # Compile and unit-test the clients on every push/PR. The release workflow
  # builds full APK/jar artifacts, but only at tag time -- so a client that stops
  # compiling used to reach main and only fail at release. Logic that can run
  # without a physical device belongs in these jobs; hardware behavior still
  # needs the separate on-device validation matrix.
  android-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4
      - name: Install platform + build-tools
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - name: Compile Android Kotlin and run unit tests
        working-directory: android
        run: |
          echo "sdk.dir=${ANDROID_HOME:-$ANDROID_SDK_ROOT}" > local.properties
          ./gradlew :app:compileDebugKotlin :app:testDebugUnitTest --no-daemon --console=plain

  desktop-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Compile desktop Kotlin and run unit tests
        working-directory: desktop
        run: ./gradlew :composeApp:test --no-daemon --console=plain

  desktop-dpapi-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Run desktop credential tests against Windows DPAPI
        working-directory: desktop
        run: .\gradlew.bat :composeApp:test --no-daemon --console=plain

name: ci

# Runs the shared test suite (_tests.yml) on every push to main and on pull
# requests, so a regression or version drift is caught before a release tag is
# cut. The test list lives in _tests.yml, shared with build-and-release.yml --
# no duplication, the two gates can't drift apart.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  test:
    uses: ./.github/workflows/_tests.yml

  # The optional browser runtime stays out of worker/requirements.txt. This job
  # validates the pinned package and locked profile, launches real Chromium
  # against one controlled localhost fixture, then proves the claim-bound CDP
  # fulfillment/citation composition with an injected in-memory socket. It
  # creates no model client, contacts no public destination and activates no
  # BrowserHost or ToolGate route.
  browser-use-runtime-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install exact optional Browser Use runtime
        shell: bash
        run: |
          log="$RUNNER_TEMP/browser-use-install.log"
          if ! PIP_PROGRESS_BAR=off python -m pip install --quiet --disable-pip-version-check \
            -r worker/requirements-browser-use.txt >"$log" 2>&1; then
            tail -n 120 "$log"
            exit 1
          fi
      - name: Validate Browser Use runtime and locked profile contract
        id: runtime-contract
        shell: bash
        run: |
          report="$RUNNER_TEMP/browser-use-runtime-contract.txt"
          set +e
          PYTHONPATH=worker python scripts/browser_use_runtime_contract.py >"$report" 2>&1
          status=$?
          set -e
          cat "$report"
          exit "$status"
      - name: Locate controlled Chromium executable
        id: chromium
        shell: bash
        run: |
          for candidate in google-chrome-stable google-chrome chromium chromium-browser; do
            path="$(command -v "$candidate" 2>/dev/null || true)"
            if [ -n "$path" ]; then
              printf "path=%s\n" "$(realpath "$path")" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "No Chrome/Chromium binary is available on the runner" >&2
          exit 1
      - name: Launch Chromium against controlled local fixture
        id: live-fixture
        shell: bash
        env:
          MODELRIG_BROWSER_EXECUTABLE: ${{ steps.chromium.outputs.path }}
          MODELRIG_BROWSER_FIXTURE_REPORT: ${{ runner.temp }}/browser-use-live-fixture.json
          BROWSER_USE_LOGGING_LEVEL: warning
        run: |
          report="$RUNNER_TEMP/browser-use-live-fixture.txt"
          set +e
          PYTHONPATH=worker python scripts/browser_use_live_fixture.py >"$report" 2>&1
          status=$?
          set -e
          cat "$report"
          exit "$status"
      - name: Compose claim-bound runtime with installed Chromium
        id: peer-runtime-fixture
        shell: bash
        env:
          MODELRIG_BROWSER_EXECUTABLE: ${{ steps.chromium.outputs.path }}
          MODELRIG_BROWSER_PEER_FIXTURE_REPORT: ${{ runner.temp }}/browser-peer-runtime-live-fixture.json
          BROWSER_USE_LOGGING_LEVEL: warning
        run: |
          report="$RUNNER_TEMP/browser-peer-runtime-live-fixture.txt"
          set +e
          PYTHONPATH=worker python scripts/browser_peer_runtime_live_fixture.py >"$report" 2>&1
          status=$?
          set -e
          cat "$report"
          exit "$status"
      - name: Upload Browser Use contract failure reports
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: browser-use-contract-failure
          path: |
            ${{ runner.temp }}/browser-use-runtime-contract.txt
            ${{ runner.temp }}/browser-use-live-fixture.txt
            ${{ runner.temp }}/browser-use-live-fixture.json
            ${{ runner.temp }}/browser-peer-runtime-live-fixture.txt
            ${{ runner.temp }}/browser-peer-runtime-live-fixture.json
          if-no-files-found: warn
          retention-days: 7

  # Compile and unit-test the clients on every push/PR. The release workflow
  # builds full APK/jar artifacts, but only at tag time -- so a client that stops
  # compiling used to reach main and only fail at release. Logic that can run
  # without a physical device belongs in these jobs; hardware behavior still
  # needs the separate on-device validation matrix.
  android-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4
      - name: Install platform + build-tools
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - name: Compile Android Kotlin and run unit tests
        working-directory: android
        run: |
          echo "sdk.dir=${ANDROID_HOME:-$ANDROID_SDK_ROOT}" > local.properties
          ./gradlew :app:compileDebugKotlin :app:testDebugUnitTest --no-daemon --console=plain

  desktop-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Compile desktop Kotlin and run unit tests
        working-directory: desktop
        run: ./gradlew :composeApp:test --no-daemon --console=plain

  desktop-dpapi-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Run desktop credential tests against Windows DPAPI
        working-directory: desktop
        run: .\gradlew.bat :composeApp:test --no-daemon --console=plain

  compose-unified-candidate-1-58-145:
    if: ${{ github.event_name == 'pull_request' && github.head_ref == 'agent/unified-candidate-1.58.145' && github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    env:
      CANDIDATE_PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          ref: agent/unified-candidate-1.58.145
      - name: Merge exact current main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --quiet origin main
          expected_main="2e2a29a241c0540b118a7f937bdf3bdd1cc23cbe"
          actual_main="$(git rev-parse origin/main)"
          if [ "$actual_main" != "$expected_main" ]; then
            echo "main moved: expected $expected_main, got $actual_main" >&2
            exit 1
          fi
          set +e
          git merge --no-ff --no-commit origin/main
          merge_rc=$?
          set -e
          if [ "$merge_rc" -ne 0 ]; then
            unresolved="$(git diff --name-only --diff-filter=U)"
            allowed=$'ACTIVATION_READINESS.md\nCURRENT_STATE.md\nVERSION\nandroid/app/build.gradle.kts\nbackend/internal/config/config.go\ndesktop/composeApp/build.gradle.kts\nworker/app/main.py'
            while IFS= read -r path; do
              [ -z "$path" ] && continue
              if ! grep -Fxq "$path" <<<"$allowed"; then
                echo "unexpected merge conflict: $path" >&2
                exit 1
              fi
              git checkout --ours -- "$path"
              git add "$path"
            done <<<"$unresolved"
          fi
          if git diff --name-only --diff-filter=U | grep -q .; then
            echo "unresolved merge conflicts remain" >&2
            git diff --name-only --diff-filter=U >&2
            exit 1
          fi
      - name: Move candidate contract to 1.58.145
        shell: python
        run: |
          import os
          from pathlib import Path
          old_branch = "agent/unified-candidate-1.58.143"
          new_branch = "agent/unified-candidate-1.58.145"
          old_target = "1.58.143"
          new_target = "1.58.145"
          pr_number = os.environ["CANDIDATE_PR_NUMBER"]
          Path("VERSION").write_text(new_target + "\n", encoding="utf-8")
          exact = {
              "android/app/build.gradle.kts": [
                  ("versionCode = 276", "versionCode = 277"),
                  ('versionName = "1.58.143"', 'versionName = "1.58.145"'),
              ],
              "backend/internal/config/config.go": [
                  ('const Version = "1.58.143"', 'const Version = "1.58.145"'),
              ],
              "desktop/composeApp/build.gradle.kts": [
                  ('packageVersion = "1.58.143"', 'packageVersion = "1.58.145"'),
              ],
              "worker/app/main.py": [
                  ('VERSION = "1.58.143"', 'VERSION = "1.58.145"'),
              ],
          }
          for name, pairs in exact.items():
              path = Path(name)
              text = path.read_text(encoding="utf-8")
              for old, new in pairs:
                  count = text.count(old)
                  if count != 1:
                      raise SystemExit(f"{name}: expected exactly one {old!r}, found {count}")
                  text = text.replace(old, new)
              path.write_text(text, encoding="utf-8", newline="")
          contract_files = [
              "scripts/stage_a_one_click.py",
              "scripts/stage_a_physical_operator.py",
              "scripts/agent3_readonly_pilot_one_click.py",
              "scripts/scheduler_pilot_wizard.py",
              "tests/workflow_stage_a_one_click.py",
              "tests/workflow_stage_a_physical_operator.py",
              "tests/workflow_agent3_readonly_pilot_one_click.py",
              "tests/workflow_scheduler_pilot_wizard.py",
              "tests/workflow_remaining_physical_pilots.py",
          ]
          for name in contract_files:
              path = Path(name)
              text = path.read_text(encoding="utf-8")
              if old_branch not in text or old_target not in text:
                  raise SystemExit(f"{name}: old candidate binding missing")
              path.write_text(
                  text.replace(old_branch, new_branch).replace(old_target, new_target),
                  encoding="utf-8",
                  newline="",
              )
          for name in ("STAGED_PHYSICAL_PROMOTION.md", "tests/workflow_staged_promotion_runbook.py"):
              path = Path(name)
              text = path.read_text(encoding="utf-8")
              for value in (old_branch, "1.58.142", old_target, "#150"):
                  if value not in text:
                      raise SystemExit(f"{name}: expected lifecycle value missing: {value}")
              path.write_text(
                  text.replace(old_branch, new_branch)
                  .replace("1.58.142", "1.58.144")
                  .replace(old_target, new_target)
                  .replace("#150", f"#{pr_number}"),
                  encoding="utf-8",
                  newline="",
              )
          selected = [Path(name) for name in contract_files] + [
              Path("STAGED_PHYSICAL_PROMOTION.md"),
              Path("tests/workflow_staged_promotion_runbook.py"),
          ]
          for path in selected:
              text = path.read_text(encoding="utf-8")
              if old_branch in text or old_target in text:
                  raise SystemExit(f"{path}: stale candidate binding remains")
      - name: Regenerate authoritative state
        run: |
          python -m pip install -r worker/requirements.txt
          python scripts/current_state.py
          python scripts/activation_readiness.py
          python scripts/current_state.py --check
          python scripts/activation_readiness.py --check
          python scripts/version_tool.py check
      - name: Run focused candidate contracts
        run: |
          python tests/workflow_stage_a_one_click.py
          python tests/workflow_stage_a_physical_operator.py
          python tests/workflow_agent3_readonly_pilot_one_click.py
          python tests/workflow_scheduler_pilot_wizard.py
          python tests/workflow_remaining_physical_pilots.py
          python tests/workflow_staged_promotion_runbook.py
      - name: Commit merge and restore normal CI
        shell: bash
        run: |
          set -euo pipefail
          git show HEAD^:.github/workflows/ci.yml > .github/workflows/ci.yml
          git rm .github/workflows/compose-unified-candidate-1.58.145.yml
          git add -A
          git status --short
          git diff --cached --check
          git commit -m "merge(candidate): compose current main into unified 1.58.145"
          git push origin HEAD:agent/unified-candidate-1.58.145

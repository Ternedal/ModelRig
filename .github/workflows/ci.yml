name: ci

# Standard CI plus one temporary snapshot job on PR #36. The product branch
# never receives this file; it exists only to export the current main tree for a
# conflict-safe 1.58.91 rebase.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  snapshot-current-main:
    if: github.head_ref == 'build/scheduler-approval-token-inspect'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: af38f9821f97ede5cbd39f8c22a6f996af3f9027
          fetch-depth: 1
      - name: Record exact snapshot identity
        run: |
          test "$(git rev-parse HEAD)" = "af38f9821f97ede5cbd39f8c22a6f996af3f9027"
          test "$(cat VERSION)" = "1.58.90"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: modelrig-main-1-58-90-source
          path: .
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 3

  test:
    uses: ./.github/workflows/_tests.yml

  android-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4
      - name: Install platform + build-tools
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - name: Compile Android Kotlin
        working-directory: android
        run: |
          echo "sdk.dir=${ANDROID_HOME:-$ANDROID_SDK_ROOT}" > local.properties
          ./gradlew :app:compileDebugKotlin :app:testDebugUnitTest --no-daemon --console=plain

  desktop-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Compile desktop Kotlin
        working-directory: desktop
        run: ./gradlew :composeApp:compileKotlin --no-daemon --console=plain

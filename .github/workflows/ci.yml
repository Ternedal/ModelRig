name: ci

# Runs the shared test suite (_tests.yml) on every push to main and on pull
# requests. The temporary materializer job exists only on PR #36 and restores
# this file from main before it creates the scheduler product commit.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  materialize-scheduler:
    if: github.head_ref == 'build/scheduler-approval-token-inspect'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: feature/scheduler-ed25519-approval-15890
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.23"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Build and test clean scheduler candidate
        run: bash .github/scheduler-build/materialize.sh

  test:
    uses: ./.github/workflows/_tests.yml

  android-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4
      - name: Install platform + build-tools
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - name: Compile Android Kotlin
        working-directory: android
        run: |
          echo "sdk.dir=${ANDROID_HOME:-$ANDROID_SDK_ROOT}" > local.properties
          ./gradlew :app:compileDebugKotlin :app:testDebugUnitTest --no-daemon --console=plain

  desktop-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Compile desktop Kotlin
        working-directory: desktop
        run: ./gradlew :composeApp:compileKotlin --no-daemon --console=plain

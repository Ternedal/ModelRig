name: harden-scheduler-pilot-window

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  harden:
    if: github.head_ref == 'agent/scheduler-pilot-evidence'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: agent/scheduler-pilot-evidence
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - name: Install validation dependencies
        run: |
          pip install -r worker/requirements.txt --break-system-packages >/dev/null
          pip install --quiet ruff
      - name: Apply pilot window and packaged-worker requirements
        run: python scripts/_harden_scheduler_pilot_window.py
      - name: Validate hardened collector
        env:
          PYTHONPATH: worker
        run: |
          ruff check scripts/scheduler_pilot_evidence.py \
            tests/workflow_scheduler_pilot_evidence.py --select E9,F63,F7,F82
          python tests/workflow_scheduler_pilot_evidence.py
      - name: Regenerate state and prove collection
        env:
          PYTHONPATH: worker
        run: |
          python scripts/current_state.py
          python tests/workflow_test_coverage.py
          python tests/workflow_current_state.py
      - name: Remove temporary patch files and validate diff
        shell: bash
        run: |
          rm .github/workflows/harden-scheduler-pilot-window.yml
          rm scripts/_harden_scheduler_pilot_window.py
          git diff --check
          test ! -e .github/workflows/harden-scheduler-pilot-window.yml
          test ! -e scripts/_harden_scheduler_pilot_window.py
          grep -q 'pilot_window' scripts/scheduler_pilot_evidence.py
          grep -q 'worker is not the packaged appliance build' scripts/scheduler_pilot_evidence.py
      - name: Commit clean freshness hardening
        shell: bash
        run: |
          git config user.name 'ModelRig automation'
          git config user.email 'actions@users.noreply.github.com'
          git add \
            scripts/scheduler_pilot_evidence.py \
            tests/workflow_scheduler_pilot_evidence.py \
            eval/scheduler_pilot_manifest.example.json \
            SCHEDULER_PILOT_EVIDENCE.md \
            CURRENT_STATE.md \
            .github/workflows/harden-scheduler-pilot-window.yml \
            scripts/_harden_scheduler_pilot_window.py
          git commit -m 'test(eval): bind scheduler pilot evidence to its run window'
          git push origin HEAD:agent/scheduler-pilot-evidence

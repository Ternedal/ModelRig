                      "active_tool_handle_present": False,
                  }
                  # Atomic (F-309): a run that is cancelled with no run_cancelled
                  # event is a stop nobody can account for.
                  self.store.save_with_event(run, "run_cancelled", receipt)
              return run'''.replace("          ", ""))
          replace("worker/app/agent3/core.py", '''                "idempotent": step.idempotent,
                  "conversation_id": step.conversation_id,'''.replace("          ", ""), '''                "idempotent": step.idempotent,
                  "cancellation": step.cancellation.value,
                  "conversation_id": step.conversation_id,'''.replace("          ", ""))


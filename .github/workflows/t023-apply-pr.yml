          replace("worker/app/agent3/api.py", 'from .validation_gate import evaluate_configured_report', 'from .validation_gate import evaluate_configured_report\nfrom .cancellation_status import termination_view')
          replace("worker/app/agent3/api.py", '        payload = {"run": _run_payload(run), "read_review": read_review(run.id)}', '''        payload = {
              "run": _run_payload(run),

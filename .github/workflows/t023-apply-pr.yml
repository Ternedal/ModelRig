name: t023-apply-pr

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/t023-cancellation-contract' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: agent/t023-cancellation-contract
          fetch-depth: 0
      - name: Apply T-023 contract
        run: |
          python3 - <<'PY'
          from pathlib import Path


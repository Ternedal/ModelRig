              "forceable": CancellationSemantics.RUNTIME,
          }


          @dataclass(frozen=True)'''.replace("          ", ""))
          replace("worker/app/agent3/integration.py", '''            # Stamped from the registry, like risk and sensitivity: recovery
              # reads the step, not a registry that may have moved since (F-614).
              idempotent = bool(getattr(tool, "idempotent", False))
              summary = tool.human_summary(call.args)'''.replace("          ", ""), '''            declared_cancellation = str(getattr(tool, "cancellation", "none"))
              cancellation = _V2_CANCELLATION.get(declared_cancellation)
              if cancellation is None:
                  raise Agent3PlanError(

          replace("worker/app/agent3/core.py", '''            for key in ("risk", "sensitivity", "egress", "state"):''', '''            for key in ("risk", "sensitivity", "egress", "cancellation", "state"):''')
          replace("worker/app/agent3/core.py", '''            step["egress"] = EgressClass(step["egress"])
              step["state"] = StepState(step["state"])'''.replace("          ", ""), '''            step["egress"] = EgressClass(step["egress"])
              step["cancellation"] = CancellationSemantics(step.get("cancellation", "none"))
              step["state"] = StepState(step["state"])'''.replace("          ", ""))
          replace("worker/app/agent3/core.py", '''    def cancel(self, run_id: str) -> AgentRun:
              run = self._require(run_id)
              if run.state not in {RunState.COMPLETED, RunState.FAILED, RunState.CANCELLED}:
                  run.state = RunState.CANCELLED
                  run.error = "Cancelled by user"
                  # Atomic (F-309): a run that is cancelled with no run_cancelled
                  # event is a stop nobody can account for.
                  self.store.save_with_event(run, "run_cancelled", {})
              return run'''.replace("          ", ""), '''    def cancel(self, run_id: str) -> AgentRun:
              run = self._require(run_id)
              if run.state not in {RunState.COMPLETED, RunState.FAILED, RunState.CANCELLED}:
                  active = run.steps[run.current_step] if run.current_step < len(run.steps) else None
                  active_executing = active is not None and active.state == StepState.EXECUTING
                  run.state = RunState.CANCELLED
                  run.error = "Cancelled by user"
                  receipt = {
                      "scope": "plan",
                      "effect": (
                          "prevent_future_steps_active_tool_continues"
                          if active_executing else "prevent_future_steps"
                      ),
                      "active_step_id": active.id if active is not None else None,

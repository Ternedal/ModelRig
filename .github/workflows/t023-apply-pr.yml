          replace("worker/app/agent3/integration.py", '''                    idempotent=idempotent,
                      conversation_id=conversation_id,'''.replace("          ", ""), '''                    idempotent=idempotent,
                      cancellation=cancellation,
                      conversation_id=conversation_id,'''.replace("          ", ""))

          replace("worker/app/agent3/planner.py", '''                    "egress": step.egress.value,
                      "summary": step.summary,'''.replace("          ", ""), '''                    "egress": step.egress.value,
                      "cancellation": step.cancellation.value,

          Path("worker/app/agent3/cancellation_status.py").write_text('''from __future__ import annotations

from typing import Any

from .core import AgentRun, RunState, StepState

SCHEMA = "kaliv-agent3-termination/v1"
_TERMINAL_RUNS = {RunState.COMPLETED, RunState.FAILED, RunState.CANCELLED}


def termination_view(run: AgentRun) -> dict[str, Any]:
    """Truthful scopes for plan, model stream and active tool termination."""
    active = run.steps[run.current_step] if run.current_step < len(run.steps) else None
    executing = active is not None and active.state == StepState.EXECUTING
    completed_after_cancel = active is not None and active.state == StepState.COMPLETED_AFTER_CANCEL
    plan_can_request = run.state not in _TERMINAL_RUNS

    if active is None:
        active_tool = None
    else:
        if completed_after_cancel:
            request_state, reason = "terminal", "tool_completed_after_plan_cancel"
        elif not executing:
            request_state, reason = "not_active", "tool_is_not_executing"
        elif active.cancellation.value == "none":
            request_state, reason = "unavailable", "synchronous_tool_has_no_cancellation_handle"
        else:
            request_state, reason = "unavailable", "declared_semantics_but_runtime_handle_not_bound"
        active_tool = {
            "step_id": active.id,
            "tool": active.tool,
            "state": active.state.value,
            "semantics": active.cancellation.value,
            "handle_present": False,
            "can_request": False,
            "request_state": request_state,
            "reason": reason,
        }

    return {
        "schema": SCHEMA,
        "plan": {
            "state": "available" if plan_can_request else "terminal",
            "can_request": plan_can_request,
            "request_scope": "plan",
            "effect": "prevent_future_steps_active_tool_continues" if executing else "prevent_future_steps",
            "reason": "plan_stop_is_available" if plan_can_request else "run_is_terminal",
        },
        "model_stream": {
            "state": "not_active",
            "active": False,
            "can_request": False,
            "handle_present": False,
            "reason": "agent3_run_has_no_model_stream_handle",
        },
        "active_tool": active_tool,
        "production_activation": False,
    }
''', encoding="utf-8")

          Path("tests/worker_agent3_cancellation_contract.py").write_text('''from __future__ import annotations

import os
import tempfile

_tmp = tempfile.mkdtemp(prefix="kaliv-cancel-contract-")
os.environ.setdefault("KALIV_AUDIT_DB", os.path.join(_tmp, "audit.db"))
os.environ.setdefault("KALIV_TOOLS_STATE", os.path.join(_tmp, "tools.json"))
os.environ.setdefault("KALIV_JOBS_DB", os.path.join(_tmp, "jobs.db"))
os.environ.setdefault("KALIV_TOOLS_DIR", _tmp)

from app import tools
from app.agent3.cancellation_status import SCHEMA, termination_view
from app.agent3.core import Agent3Orchestrator, AgentRun, AgentRunStore, AgentStep, CancellationSemantics, RiskClass, RouteKind, RoutePlan, RunState, StepState, TurnRequest
from app.agent3.integration import Agent3PlanError, PlannedToolCall, V2ToolAdapter


def route():
    return RoutePlan(RouteKind.RIG_TOOLS_LOCAL, "test", False, True, True, False)


def run_with(step, state=RunState.RUNNING):
    return AgentRun(TurnRequest("test", tools=True), route(), [step], state=state)


def enabled_adapter(registry):
    class Gate:
        enabled = True
        state_error = None
        def is_enabled(self, _name): return True
    class Module:
        GATE = Gate()
        REGISTRY = registry
    return V2ToolAdapter(Module())


def test_registry_semantics_are_stamped_and_persisted():
    adapter = enabled_adapter(tools.REGISTRY)
    pull = adapter.build_steps([PlannedToolCall("pull_model", {"name": "qwen3:8b"})], route(), None)[0]
    note = adapter.build_steps([PlannedToolCall("note_append", {"text": "x"})], route(), None)[0]
    assert pull.cancellation == CancellationSemantics.COOPERATIVE
    assert note.cancellation == CancellationSemantics.NONE
    restored = AgentRun.from_json(run_with(pull).to_json())
    assert restored.steps[0].cancellation == CancellationSemantics.COOPERATIVE
    assert restored.steps[0].cloned_for_retry().cancellation == CancellationSemantics.COOPERATIVE


def test_unknown_semantics_fail_closed():
    original = tools.REGISTRY["rig_status"]
    class Odd:
        name, description, params = "rig_status", original.description, original.params
        risk, impact, sensitivity = original.risk, original.impact, original.sensitivity
        idempotent, cancellation = original.idempotent, "magic"
        def human_summary(self, _args): return "test"
    try:
        enabled_adapter({"rig_status": Odd()}).build_steps([PlannedToolCall("rig_status", {})], route(), None)
    except Agent3PlanError as exc:
        assert "cancellation-klasse" in str(exc)
    else:
        raise AssertionError("unknown semantics must fail closed")


def test_digest_binds_semantics():
    orch = Agent3Orchestrator(AgentRunStore(":memory:"), executor=lambda _step: "ok")
    a = AgentStep("rig_status", {}, RiskClass.READ, cancellation=CancellationSemantics.NONE)
    b = AgentStep("rig_status", {}, RiskClass.READ, cancellation=CancellationSemantics.COOPERATIVE, id=a.id)
    assert orch._digest(a) != orch._digest(b)


def test_executing_tool_exposes_plan_only_stop():
    step = AgentStep("note_append", {"text": "x"}, RiskClass.WRITE, state=StepState.EXECUTING)
    view = termination_view(run_with(step))
    assert view["schema"] == SCHEMA and view["production_activation"] is False
    assert view["plan"]["can_request"] is True
    assert view["plan"]["effect"] == "prevent_future_steps_active_tool_continues"
    assert view["model_stream"]["can_request"] is False
    assert view["active_tool"]["can_request"] is False
    assert view["active_tool"]["handle_present"] is False


def test_cooperative_declaration_is_not_a_handle():
    step = AgentStep("pull_model", {"name": "qwen3:8b"}, RiskClass.ADMIN, state=StepState.EXECUTING, cancellation=CancellationSemantics.COOPERATIVE)
    active = termination_view(run_with(step))["active_tool"]
    assert active["semantics"] == "cooperative"
    assert active["can_request"] is False
    assert active["reason"] == "declared_semantics_but_runtime_handle_not_bound"


def test_cancel_event_records_truthful_scope():
    with tempfile.TemporaryDirectory() as temp:
        store = AgentRunStore(os.path.join(temp, "runs.db"))
        step = AgentStep("note_append", {"text": "x"}, RiskClass.WRITE, state=StepState.EXECUTING)
        run = run_with(step)
        store.save(run)
        cancelled = Agent3Orchestrator(store, executor=lambda _step: "ok").cancel(run.id)
        assert cancelled.state == RunState.CANCELLED
        event = store.events(run.id)[-1]
        assert event["kind"] == "run_cancelled"
        assert event["payload"]["scope"] == "plan"
        assert event["payload"]["effect"] == "prevent_future_steps_active_tool_continues"
        assert event["payload"]["active_tool_handle_present"] is False


TESTS = [value for name, value in sorted(globals().items()) if name.startswith("test_")]
if __name__ == "__main__":
    for test in TESTS: test()
    print(f"agent3 cancellation contract: {len(TESTS)} passed")
''', encoding="utf-8")

          Path("AGENT3_CANCELLATION_CONTRACT.md").write_text('''# Agent 3 cancellation contract (T-023 dormant slice)

**Status:** truthful server contract; no active-tool runtime handle is enabled.

A stop request has three distinct scopes: the Agent 3 plan, a model stream and the active tool. The API returns `kaliv-agent3-termination/v1` with a separate status for each scope. The current cancel endpoint stops the plan and prevents future steps. The synchronous executor cannot interrupt an active tool, so the receipt explicitly says that work continues and never offers a direct tool-stop control.

Each step snapshots the registry declaration (`none`, `cooperative`, or API `runtime`, mapped from registry `forceable`). Unknown classes fail planning. The snapshot survives persistence and retry and is included in the immutable confirmation digest.

A declaration is not a handle. `pull_model` declares cooperative cancellation for its background JobStore job, but Agent 3 does not bind that job handle to the active step; therefore `handle_present=false` and `can_request=false` remain the truthful values.

Late completion remains visible as `completed_after_cancel` with its actual result. The run remains terminally cancelled and cannot be resurrected by the stale executor copy.

This slice does not activate Agent 3 routing, add a killable process runtime, stop model streams or claim physical Pixel/desktop coverage.
''', encoding="utf-8")


              p = Path(path)
              text = p.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"expected snippet missing in {path}: {old[:120]!r}")
              p.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace("worker/app/agent3/core.py", '''class EgressClass(StrEnum):
              NONE = "none"
              LOCAL = "local"
              CLOUD = "cloud"


          @dataclass(frozen=True)
          class CapabilitySnapshot:'''.replace("          ", ""), '''class EgressClass(StrEnum):
              NONE = "none"
              LOCAL = "local"
              CLOUD = "cloud"


          class CancellationSemantics(StrEnum):
              """What the active tool runtime can honestly stop."""

              NONE = "none"
              COOPERATIVE = "cooperative"
              RUNTIME = "runtime"


          @dataclass(frozen=True)
          class CapabilitySnapshot:'''.replace("          ", ""))
          replace("worker/app/agent3/core.py", '''    idempotent: bool = False
              conversation_id: str | None = None'''.replace("          ", ""), '''    idempotent: bool = False

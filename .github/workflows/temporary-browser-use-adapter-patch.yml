name: temporary-browser-use-adapter-patch

on:
  push:
    branches:
      - agent/browser-use-adapter

permissions:
  contents: write

jobs:
  patch-and-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: agent/browser-use-adapter
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - run: python -m pip install -r worker/requirements.txt
      - name: Add verified receipt handoff
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one match, found {count}: {old[:120]!r}')
              target.write_text(text.replace(old, new), encoding='utf-8')

          replace_once(
              'worker/app/browser_host.py',
              '@dataclass(frozen=True)\nclass BrowserCitationDraft:',
              '''@dataclass(frozen=True)
class VerifiedBrowserSourceArtifact:
    """A receipt created by ModelRig's deterministic fetcher, not by the agent."""

    receipt: SourceReceipt

    def __post_init__(self) -> None:
        if not isinstance(self.receipt, SourceReceipt):
            raise BrowserHostContractError("verified browser source must contain a SourceReceipt")
        if self.receipt.adapter != "deterministic-web-fetch":
            raise BrowserHostContractError("verified browser source must come from deterministic-web-fetch")


@dataclass(frozen=True)
class BrowserCitationDraft:''',
          )
          replace_once(
              'worker/app/browser_host.py',
              '    sources: tuple[BrowserSourceArtifact, ...]\n',
              '    sources: tuple[BrowserSourceArtifact | VerifiedBrowserSourceArtifact, ...]\n',
          )
          replace_once(
              'worker/app/browser_host.py',
              '''    receipts: list[SourceReceipt] = []
    for source in run.sources:
        if not isinstance(source, BrowserSourceArtifact):
            raise BrowserHostContractError("backend sources have an invalid type")
        try:
            source_url = policy.require_allowed_url(source.url)
        except ResearchContractError as exc:
            raise BrowserHostContractError("backend source URL is forbidden") from exc
        if source_url not in visited_set:
            raise BrowserHostContractError("backend source was not in the visit trace")
        if len(source.content) > policy.max_source_bytes:
            raise BrowserHostContractError("backend source exceeds max_source_bytes")
        try:
            receipt = SourceReceipt.from_content(
                url=source_url,
                title=source.title,
                content=source.content,
                excerpt=source.excerpt,
                media_type=source.media_type,
                adapter=adapter,
            )
            policy.accept_receipt(receipt)
        except ResearchContractError as exc:
            raise BrowserHostContractError("backend source evidence is invalid") from exc
        receipts.append(receipt)
''',
              '''    receipts: list[SourceReceipt] = []
    for source in run.sources:
        if isinstance(source, VerifiedBrowserSourceArtifact):
            receipt = source.receipt
            try:
                source_url = policy.require_allowed_url(receipt.url)
                policy.accept_receipt(receipt)
            except ResearchContractError as exc:
                raise BrowserHostContractError("verified backend source evidence is invalid") from exc
            if receipt.adapter != "deterministic-web-fetch":
                raise BrowserHostContractError("verified backend source has an invalid adapter")
        elif isinstance(source, BrowserSourceArtifact):
            try:
                source_url = policy.require_allowed_url(source.url)
            except ResearchContractError as exc:
                raise BrowserHostContractError("backend source URL is forbidden") from exc
            if len(source.content) > policy.max_source_bytes:
                raise BrowserHostContractError("backend source exceeds max_source_bytes")
            try:
                receipt = SourceReceipt.from_content(
                    url=source_url,
                    title=source.title,
                    content=source.content,
                    excerpt=source.excerpt,
                    media_type=source.media_type,
                    adapter=adapter,
                )
                policy.accept_receipt(receipt)
            except ResearchContractError as exc:
                raise BrowserHostContractError("backend source evidence is invalid") from exc
        else:
            raise BrowserHostContractError("backend sources have an invalid type")
        if source_url not in visited_set:
            raise BrowserHostContractError("backend source was not in the visit trace")
        receipts.append(receipt)
''',
          )

          replace_once(
              'worker/app/browser_use_adapter.py',
              '    BrowserCitationDraft,\n    BrowserSourceArtifact,\n)',
              '    BrowserCitationDraft,\n    VerifiedBrowserSourceArtifact,\n)',
          )
          replace_once(
              'worker/app/browser_use_adapter.py',
              '''            sources.append(
                BrowserSourceArtifact(
                    url=trace.final_url,
                    title=trace.receipt.title,
                    content=trace.content,
                    excerpt=trace.receipt.excerpt,
                    media_type=trace.receipt.media_type,
                )
            )
''',
              '''            sources.append(
                VerifiedBrowserSourceArtifact(receipt=trace.receipt)
            )
''',
          )

          replace_once(
              'tests/worker_browser_use_adapter.py',
              '    receipt=RECEIPT,\n    content=RAW,\n)',
              '    receipt=RECEIPT,\n)',
          )
          replace_once(
              'tests/worker_browser_use_adapter.py',
              'check(result.sources[0].content == RAW, "raw bytes come from deterministic re-fetch")\ncheck(result.sources[0].url == "https://example.com/final", "source uses verified final URL")\ncheck(result.sources[0].title == "Release", "verified source metadata is preserved")\n',
              'check(result.sources[0].receipt.content_sha256 == RECEIPT.content_sha256, "verified content hash comes from deterministic re-fetch")\ncheck(result.sources[0].receipt.url == "https://example.com/final", "source uses verified final URL")\ncheck(result.sources[0].receipt.title == "Release", "verified source metadata is preserved")\n',
          )

          replace_once(
              'tests/worker_browser_host.py',
              '    BrowserSourceArtifact,\n    encode_response,',
              '    BrowserSourceArtifact,\n    VerifiedBrowserSourceArtifact,\n    encode_response,',
          )
          replace_once(
              'tests/worker_browser_host.py',
              'from app.research_contract import ReadOnlyBrowserPolicy, ResearchRequest, source_id_for\n',
              'from app.research_contract import ReadOnlyBrowserPolicy, ResearchRequest, SourceReceipt, source_id_for\n',
          )
          replace_once(
              'tests/worker_browser_host.py',
              'check(research["warnings"] == ["fixture backend only"], "bounded warnings are preserved")\n\nrequest_dict = REQUEST.to_dict()\n',
              '''check(research["warnings"] == ["fixture backend only"], "bounded warnings are preserved")

VERIFIED_RECEIPT = SourceReceipt.from_content(
    url="https://example.com/report",
    title="Verified release",
    content=CONTENT,
    excerpt="Version 7 is live.",
    media_type="text/html",
    adapter="deterministic-web-fetch",
)
verified_run = replace(
    VALID_RUN,
    sources=(VerifiedBrowserSourceArtifact(receipt=VERIFIED_RECEIPT),),
)
verified_response = execute(FixtureBackend(run=verified_run))
verified_source = verified_response.to_dict()["result"]["research"]["sources"][0]
check(verified_response.ok, "deterministic fetch receipts are accepted")
check(verified_source["source_id"] == VERIFIED_RECEIPT.source_id, "verified source id is preserved")
check(verified_source["content_sha256"] == VERIFIED_RECEIPT.content_sha256, "verified content hash is preserved")
check(verified_source["adapter"] == "deterministic-web-fetch", "verified adapter provenance is preserved")

request_dict = REQUEST.to_dict()
''',
          )
          PY
      - run: PYTHONPATH=worker python tests/worker_web_fetch_adapter.py
      - run: PYTHONPATH=worker python tests/worker_browser_host.py
      - run: PYTHONPATH=worker python tests/worker_browser_use_adapter.py
      - name: Commit patch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add worker/app/browser_host.py worker/app/browser_use_adapter.py \
            tests/worker_browser_host.py tests/worker_browser_use_adapter.py
          git commit -m 'feat(research): preserve verified fetch receipts'
          git push origin HEAD:agent/browser-use-adapter

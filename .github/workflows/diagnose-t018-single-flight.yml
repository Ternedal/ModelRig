name: diagnose-t018-single-flight

on:
  pull_request:
    branches: [main]

jobs:
  diagnose:
    if: github.head_ref == 'agent/scheduler-explicit-single-flight'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: agent/scheduler-explicit-single-flight
          show-progress: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - name: Install and apply patch
        run: |
          pip install -r worker/requirements.txt --break-system-packages >/dev/null
          python scripts/_patch_t018_single_flight.py
          python scripts/_adjust_t018_fixture.py
      - name: Run scheduler contracts with bounded failure artifact
        env:
          PYTHONPATH: worker
        shell: bash
        run: |
          set -u
          : > /tmp/t018-diagnosis.txt
          for f in \
            tests/worker_scheduler_single_flight.py \
            tests/worker_schedule_service.py \
            tests/worker_schedule_runner.py \
            tests/worker_schedule_revoke.py \
            tests/worker_occurrence_ledger.py; do
            if ! python "$f" > /tmp/t018-output.txt 2>&1; then
              {
                echo "FAILED_TEST=$f"
                tail -n 140 /tmp/t018-output.txt
              } > /tmp/t018-diagnosis.txt
              cat /tmp/t018-diagnosis.txt
              exit 1
            fi
          done
          echo 'ALL_T018_CONTRACTS_PASSED' > /tmp/t018-diagnosis.txt
          cat /tmp/t018-diagnosis.txt
      - name: Upload bounded diagnosis
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: t018-single-flight-diagnosis
          path: /tmp/t018-diagnosis.txt
          if-no-files-found: error
          retention-days: 1

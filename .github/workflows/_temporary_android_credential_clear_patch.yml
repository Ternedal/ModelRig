name: temporary-android-credential-clear-patch

on:
  push:
    branches:
      - agent/android-credential-commit-truth

permissions:
  contents: write

jobs:
  apply-patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Apply exact Android credential clear patch
        run: python scripts/_temporary_patch_android_credential_clear.py
      - name: Commit production and tests
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add android/app/src/main/java/dk/ternedal/modelrig/data/TokenStore.kt \
            android/app/src/main/java/dk/ternedal/modelrig/ui/AppUi.kt \
            android/app/src/main/java/dk/ternedal/modelrig/ui/AppEntryUi.kt \
            tests/android_credential_commit_contract.py
          git commit -m 'fix(android): surface credential clear failures'
          git push

name: temporary-voice-status-main-sync

on:
  push:
    branches:
      - agent/worker-voice-status-contract

permissions:
  contents: write

jobs:
  sync-main:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: agent/worker-voice-status-contract
          fetch-depth: 0
      - name: Install generator dependencies
        run: python3 -m pip install -r worker/requirements.txt
      - name: Merge latest main and regenerate release state
        run: |
          git fetch origin main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git merge origin/main --no-edit -X theirs
          python3 scripts/version_tool.py set 1.58.99
          python3 - <<'PY'
          from pathlib import Path
          import re
          path = Path('android/app/build.gradle.kts')
          text = path.read_text(encoding='utf-8')
          text, count = re.subn(r'versionCode = \d+', 'versionCode = 232', text, count=1)
          if count != 1:
              raise SystemExit('Android versionCode pattern not found')
          path.write_text(text, encoding='utf-8')
          PY
          python3 scripts/current_state.py
          python3 scripts/activation_readiness.py
          git add VERSION worker/app/main.py backend/internal/config/config.go \
            android/app/build.gradle.kts desktop/composeApp/build.gradle.kts \
            CURRENT_STATE.md ACTIVATION_READINESS.md
          if ! git diff --cached --quiet; then
            git commit -m "chore(release): refresh ModelRig 1.58.99 after main sync"
          fi
          git push origin HEAD:agent/worker-voice-status-contract

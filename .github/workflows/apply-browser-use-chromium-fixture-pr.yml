name: apply-browser-use-chromium-fixture-pr

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/browser-use-chromium-fixture'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: agent/browser-use-chromium-fixture
          fetch-depth: 1
          show-progress: false
      - name: Apply locked Browser Use adapter patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap

          source = Path('.github/workflows/apply-browser-use-chromium-fixture.yml').read_text(encoding='utf-8')
          start = "          python - <<'PY'\n"
          end = "\n          PY\n"
          if source.count(start) != 1 or source.count(end) != 1:
              raise SystemExit('embedded patch markers are not unique')
          body = textwrap.dedent(source.split(start, 1)[1].split(end, 1)[0])
          marker = '\nruntime_contract = "scripts/browser_use_runtime_contract.py"'
          if marker not in body:
              raise SystemExit('adapter patch boundary is missing')
          exec(compile(body.split(marker, 1)[0], '<browser-use-adapter-patch>', 'exec'))
          Path('.github/workflows/apply-browser-use-chromium-fixture.yml').unlink()
          Path('.github/workflows/apply-browser-use-chromium-fixture-pr.yml').unlink()
          PY
      - name: Validate adapter patch
        shell: bash
        run: |
          python -m py_compile worker/app/browser_use_adapter.py
          git diff --check
          grep -q 'accept_downloads=False' worker/app/browser_use_adapter.py
          grep -q 'permissions=\[\]' worker/app/browser_use_adapter.py
          test ! -e .github/workflows/apply-browser-use-chromium-fixture.yml
          test ! -e .github/workflows/apply-browser-use-chromium-fixture-pr.yml
      - name: Commit locked adapter
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(research): lock Browser Use runtime profile"
          git push origin HEAD:agent/browser-use-chromium-fixture

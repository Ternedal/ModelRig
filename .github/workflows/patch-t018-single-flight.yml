name: patch-t018-single-flight

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/scheduler-explicit-single-flight'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: agent/scheduler-explicit-single-flight
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - name: Install worker test dependencies
        run: |
          pip install -r worker/requirements.txt --break-system-packages >/dev/null
          pip install --quiet ruff
      - name: Apply explicit single-flight patch
        run: |
          python scripts/_patch_t018_single_flight.py
          python scripts/_adjust_t018_fixture.py
      - name: Validate scheduler execution model
        env:
          PYTHONPATH: worker
        run: |
          ruff check worker/app/schedule_runner.py worker/app/schedule_service.py \
            tests/worker_schedule_service.py tests/worker_schedule_revoke.py \
            tests/worker_scheduler_single_flight.py --select E9,F63,F7,F82
          python tests/worker_scheduler_single_flight.py
          python tests/worker_schedule_service.py
          python tests/worker_schedule_runner.py
          python tests/worker_schedule_revoke.py
          python tests/worker_occurrence_ledger.py
      - name: Regenerate state and verify collection
        env:
          PYTHONPATH: worker
        run: |
          python scripts/current_state.py
          python tests/workflow_test_coverage.py
          python tests/workflow_current_state.py
      - name: Remove temporary patch files and validate scope
        shell: bash
        run: |
          rm .github/workflows/patch-t018-single-flight.yml
          rm .github/workflows/diagnose-t018-single-flight.yml
          rm scripts/_patch_t018_single_flight.py
          rm scripts/_adjust_t018_fixture.py
          git diff --check
          test ! -e .github/workflows/patch-t018-single-flight.yml
          test ! -e .github/workflows/diagnose-t018-single-flight.yml
          test ! -e scripts/_patch_t018_single_flight.py
          test ! -e scripts/_adjust_t018_fixture.py
          grep -q 'EXECUTION_MODEL = "single_flight"' worker/app/schedule_runner.py
          grep -q 'claim_due(now=tick_at, limit=1)' worker/app/schedule_runner.py
          grep -q 'tests/worker_scheduler_single_flight.py' CURRENT_STATE.md
      - name: Commit clean T-018 delivery
        shell: bash
        run: |
          git config user.name 'ModelRig automation'
          git config user.email 'actions@users.noreply.github.com'
          git add \
            worker/app/schedule_runner.py \
            worker/app/schedule_service.py \
            tests/worker_schedule_service.py \
            tests/worker_schedule_revoke.py \
            tests/worker_scheduler_single_flight.py \
            SCHEDULER_EXECUTION_MODEL.md \
            CURRENT_STATE.md \
            .github/workflows/patch-t018-single-flight.yml \
            .github/workflows/diagnose-t018-single-flight.yml \
            scripts/_patch_t018_single_flight.py \
            scripts/_adjust_t018_fixture.py
          git commit -m 'feat(scheduler): make execution explicitly single-flight'
          git push origin HEAD:agent/scheduler-explicit-single-flight

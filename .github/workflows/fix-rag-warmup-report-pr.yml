name: fix-rag-warmup-report-pr

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'agent/rag-benchmark-harness'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: agent/rag-benchmark-harness
          fetch-depth: 1
          show-progress: false
      - name: Complete warmup failure report contract
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          script_path = Path('scripts/rag_benchmark.py')
          script = script_path.read_text(encoding='utf-8')
          warmup_anchor = '        warmup_started = time.perf_counter()\n'
          success_marker = '        warmup_ms = (time.perf_counter() - warmup_started) * 1000\n'
          anchor_index = script.index(warmup_anchor)
          except_start = script.index('        except Exception as exc:\n', anchor_index)
          success_start = script.index(success_marker, except_start)
          replacement = '''        except Exception as exc:
                      warmup_ms = (time.perf_counter() - warmup_started) * 1000
                      report = {
                          "schema": SCHEMA,
                          "generated_at": datetime.now(timezone.utc).isoformat(),
                          "dataset_schema": DATASET_SCHEMA,
                          "dataset_version": DATASET_VERSION,
                          "isolation": {
                              "temporary_database": True,
                              "user_index_opened": False,
                              "synthesis_enabled": False,
                          },
                          "build": {
                              "version": (root / "VERSION").read_text(encoding="utf-8").strip(),
                              "git_sha": _git_sha(root),
                          },
                          "host": {
                              "platform": platform.platform(),
                              "python": platform.python_version(),
                          },
                          "ollama": {
                              "url": oc.OLLAMA_URL,
                              "embedding_model": oc.EMBED_MODEL,
                              "embedding_dimensions": None,
                              "warmup_ms": round(warmup_ms, 3),
                          },
                          "configuration": {
                              "scales": args.scales,
                              "queries": args.queries,
                              "repetitions": args.repetitions,
                              "seed": args.seed,
                              "top_k": MAX_TOP_K,
                              "min_score": 0.0,
                              "chunk_size": CHUNK_SIZE,
                              "overlap": 0,
                          },
                          "scales": [],
                          "error": _safe_error(exc),
                          "summary": {
                              "scales": 0,
                              "errors": 1,
                              "minimum_recall_at_5": None,
                              "maximum_query_p95_ms": None,
                          },
                          "gate": {
                              "passed": False,
                              "fail_under_recall_at_5": args.fail_under_recall_at_5,
                              "max_p95_ms": (
                                  args.max_p95_ms if args.max_p95_ms > 0 else None
                              ),
                          },
                      }
                      return report, 2
          '''
          script_path.write_text(
              script[:except_start] + replacement + script[success_start:],
              encoding='utf-8',
          )

          test_path = Path('tests/worker_rag_benchmark.py')
          test = test_path.read_text(encoding='utf-8')
          if 'from types import SimpleNamespace' not in test:
              test = test.replace(
                  'from pathlib import Path\n',
                  'from pathlib import Path\nfrom types import SimpleNamespace\n',
                  1,
              )
          if 'warmup failure uses reserved environment exit 2' in test:
              raise SystemExit('warmup failure regression already exists')
          final_marker = 'print(f"\\n===== RAG BENCHMARK: {passed} passed, {failed} failed =====")\n'
          insertion_index = test.rfind(final_marker)
          if insertion_index < 0:
              raise SystemExit('final benchmark marker is missing')
          regression = '''# Warmup/model failures are expected environment failures and must still
          # emit the same complete evidence envelope as successful runs.
          from app import ollama_client as warmup_oc

          old_warmup_embed = warmup_oc.embed


          async def fail_warmup(_text, model=None):
              raise RuntimeError("simulated missing embedding model")


          warmup_oc.embed = fail_warmup
          try:
              warmup_report, warmup_exit = run(
                  rb._run(
                      SimpleNamespace(
                          scales=[1],
                          queries=1,
                          repetitions=1,
                          seed=20260718,
                          sample_interval=0.5,
                          fail_under_recall_at_5=0.95,
                          max_p95_ms=0.0,
                      )
                  )
              )
              check(warmup_exit == 2, "warmup failure uses reserved environment exit 2")
              check(warmup_report["gate"]["passed"] is False, "warmup failure explicitly fails the gate")
              check(warmup_report["scales"] == [], "warmup failure records that no scale ran")
              check(
                  warmup_report["ollama"]["embedding_dimensions"] is None,
                  "warmup failure keeps unknown dimensions explicit",
              )
              check(
                  warmup_report["error"]["message"] == "simulated missing embedding model",
                  "warmup failure remains diagnosable",
              )
              check(
                  warmup_report["isolation"]["user_index_opened"] is False,
                  "warmup failure still proves the user index was untouched",
              )
          finally:
              warmup_oc.embed = old_warmup_embed

          '''
          test_path.write_text(
              test[:insertion_index] + regression + test[insertion_index:],
              encoding='utf-8',
          )

          Path('.github/workflows/fix-rag-warmup-report-pr.yml').unlink()
          PY
      - name: Validate complete benchmark evidence
        shell: bash
        run: |
          pip install -r worker/requirements.txt --break-system-packages >/dev/null
          pip install --quiet ruff
          ruff check --select E9,F63,F7,F82 scripts/rag_benchmark.py tests/worker_rag_benchmark.py
          PYTHONPATH=worker python tests/worker_rag_benchmark.py
          git diff --check
          test ! -e .github/workflows/fix-rag-warmup-report-pr.yml
      - name: Commit warmup evidence fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(eval): complete RAG warmup failure report"
          git push origin HEAD:agent/rag-benchmark-harness

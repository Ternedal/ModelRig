name: agent3-sync-main

on:
  push:
    branches:
      - agent/agent3-integration-draft-v2

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Merge main with guarded CI conflict resolution
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main

          if ! git merge --no-ff --no-commit origin/main; then
            conflicts="$(git diff --name-only --diff-filter=U)"
            for file in $conflicts; do
              case "$file" in
                .github/workflows/_tests.yml|.github/workflows/ci.yml) ;;
                *)
                  echo "Unexpected merge conflict: $file" >&2
                  git merge --abort
                  exit 1
                  ;;
              esac
            done
          fi

          cat > .github/workflows/_tests.yml <<'YAML'
          name: _tests

          # Reusable test suite shared by pull-request CI and release builds.
          on:
            workflow_call:

          permissions:
            contents: read

          jobs:
            test:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
                - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
                  with:
                    go-version: "1.23"
                - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
                  with:
                    python-version: "3.12"

                - name: Version sites match VERSION
                  run: python3 scripts/version_tool.py check
                - name: Install worker deps
                  run: pip install -r worker/requirements.txt --break-system-packages
                - name: Build backend
                  run: cd backend && go build -o /tmp/modelrig-server ./cmd/modelrig-server
                - name: Backend vet
                  run: cd backend && go vet ./...
                - name: Backend tests
                  run: cd backend && go test ./...
                - name: Python lint gate (syntax + undefined names)
                  run: |
                    pip install --quiet ruff
                    ruff check --select E9,F63,F7,F82 worker/ tests/

                - name: Test suite (auto-includes new tests/*.py)
                  env:
                    MODELRIG_BIN: /tmp/modelrig-server
                  run: |
                    set -o pipefail
                    : > /tmp/modelrig-test-suite.log
                    status=0
                    for f in tests/backend_*.py tests/e2e.py tests/worker_*.py tests/workflow_*.py; do
                      [ -e "$f" ] || continue
                      echo "::group::$f"
                      echo "===== $f =====" | tee -a /tmp/modelrig-test-suite.log
                      PYTHONPATH=worker python3 "$f" 2>&1 | tee -a /tmp/modelrig-test-suite.log || {
                        status=${PIPESTATUS[0]}
                        echo "FAILED: $f (exit $status)" | tee -a /tmp/modelrig-test-suite.log
                        echo "::endgroup::"
                        break
                      }
                      echo "::endgroup::"
                    done
                    exit "$status"
                - name: Upload failed test log
                  if: failure()
                  uses: actions/upload-artifact@v4
                  with:
                    name: modelrig-test-suite-log
                    path: /tmp/modelrig-test-suite.log
                    if-no-files-found: error
                    retention-days: 7

            test-windows-appliance:
              runs-on: windows-latest
              steps:
                - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
                - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
                  with:
                    go-version: "1.23"
                - name: Appliance Go tests on real Windows
                  working-directory: backend
                  run: go test ./cmd/modelrig-updater/ ./cmd/modelrig-supervisor/ ./internal/heartbeat/
          YAML

          cat > .github/workflows/ci.yml <<'YAML'
          name: ci

          on:
            push:
              branches: [main]
            pull_request:

          permissions:
            contents: read

          jobs:
            test:
              uses: ./.github/workflows/_tests.yml

            android-compile:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
                - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
                  with:
                    distribution: temurin
                    java-version: "21"
                - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4
                - name: Install platform + build-tools
                  run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
                - name: Compile Android Kotlin
                  working-directory: android
                  run: |
                    echo "sdk.dir=${ANDROID_HOME:-$ANDROID_SDK_ROOT}" > local.properties
                    ./gradlew :app:compileDebugKotlin :app:testDebugUnitTest --no-daemon --console=plain

            desktop-compile:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
                - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
                  with:
                    distribution: temurin
                    java-version: "21"
                - name: Compile desktop Kotlin
                  working-directory: desktop
                  run: |
                    set -o pipefail
                    ./gradlew :composeApp:compileKotlin --no-daemon --console=plain 2>&1 \
                      | tee /tmp/desktop-compile.log
                - name: Upload failed desktop compiler log
                  if: failure()
                  uses: actions/upload-artifact@v4
                  with:
                    name: desktop-compile-log
                    path: /tmp/desktop-compile.log
                    if-no-files-found: error
                    retention-days: 7
          YAML

          git add .github/workflows/_tests.yml .github/workflows/ci.yml
          if git diff --name-only --diff-filter=U | grep -q .; then
            echo "Unresolved merge conflicts remain" >&2
            git diff --name-only --diff-filter=U >&2
            git merge --abort
            exit 1
          fi
          git diff --cached --check
          git commit -m "Merge main into Agent 3.0 draft"
          git push origin HEAD:agent/agent3-integration-draft-v2

name: agent3-sync-main

on:
  push:
    branches:
      - agent/agent3-integration-draft-v2

permissions:
  contents: write

jobs:
  merge-main:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Agent 3 branch
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Merge current main with guarded conflict policy
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main

          if git merge-base --is-ancestor origin/main HEAD; then
            echo "Branch already contains current main."
            exit 0
          fi

          set +e
          git merge --no-ff --no-commit origin/main
          merge_status=$?
          set -e

          if [ "$merge_status" -ne 0 ]; then
            mapfile -t conflicts < <(git diff --name-only --diff-filter=U)
            printf 'Conflicts:\n%s\n' "${conflicts[*]}"

            allowed_a='.github/workflows/_tests.yml'
            allowed_b='.github/workflows/ci.yml'
            for path in "${conflicts[@]}"; do
              if [ "$path" != "$allowed_a" ] && [ "$path" != "$allowed_b" ]; then
                echo "Unexpected conflict: $path"
                git merge --abort
                exit 1
              fi
            done

            # The branch versions are deliberate supersets: they retain main's
            # Ruff/Android/unit-test gates and add full failure artifacts.
            git checkout --ours -- "$allowed_a" "$allowed_b"
            git add "$allowed_a" "$allowed_b"
          fi

          if git diff --cached --quiet && git diff --quiet; then
            echo "Nothing to commit after merge."
            exit 0
          fi

          git commit -m "chore(agent3): merge current main into draft [skip ci]"
          git push origin HEAD:agent/agent3-integration-draft-v2

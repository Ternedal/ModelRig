name: agent3-package

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  package-agent3-draft:
    if: github.head_ref == 'agent/agent3-integration-draft-v2'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Build source ZIP
        shell: bash
        run: |
          set -euo pipefail
          package="ModelRig-Agent3-draft"
          mkdir -p "$package"
          rsync -a \
            --exclude='.git/' \
            --exclude='.gradle/' \
            --exclude='**/build/' \
            --exclude='*.db' \
            --exclude='*.tmp' \
            ./ "$package/"
          cat > "$package/AGENT3_PACKAGE_INFO.txt" <<EOF
          Repository: Ternedal/ModelRig
          Branch: agent/agent3-integration-draft-v2
          Commit: ${{ github.event.pull_request.head.sha }}
          PR: #${{ github.event.pull_request.number }}
          Packaged: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF
          zip -qr "ModelRig-Agent3-draft.zip" "$package"
          sha256sum "ModelRig-Agent3-draft.zip" > "ModelRig-Agent3-draft.zip.sha256"

      - name: Upload source package
        uses: actions/upload-artifact@v4
        with:
          name: ModelRig-Agent3-draft-${{ github.event.pull_request.head.sha }}
          path: |
            ModelRig-Agent3-draft.zip
            ModelRig-Agent3-draft.zip.sha256
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

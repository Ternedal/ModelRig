name: temporary-pdf-main-sync

on:
  push:
    branches:
      - agent/pdf-document-lifecycle

permissions:
  contents: write

jobs:
  sync-and-release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Install generator dependencies
        run: python -m pip install -r worker/requirements.txt
      - name: Merge latest main and resolve generated release sites
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin main
          if ! git merge --no-edit origin/main; then
            git checkout --theirs -- VERSION worker/app/main.py \
              backend/internal/config/config.go android/app/build.gradle.kts \
              desktop/composeApp/build.gradle.kts CURRENT_STATE.md \
              ACTIVATION_READINESS.md
            git add VERSION worker/app/main.py backend/internal/config/config.go \
              android/app/build.gradle.kts desktop/composeApp/build.gradle.kts \
              CURRENT_STATE.md ACTIVATION_READINESS.md
            git -c core.editor=true merge --continue
          fi
      - name: Synchronize release metadata
        shell: bash
        run: |
          python scripts/version_tool.py set 1.58.107
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('android/app/build.gradle.kts')
          text = path.read_text(encoding='utf-8')
          updated, count = re.subn(r'versionCode = \d+', 'versionCode = 240', text, count=1)
          if count != 1:
              raise SystemExit('Android versionCode pattern not found exactly once')
          path.write_text(updated, encoding='utf-8')
          PY
          python scripts/current_state.py
          python scripts/activation_readiness.py
          git add VERSION worker/app/main.py backend/internal/config/config.go \
            android/app/build.gradle.kts desktop/composeApp/build.gradle.kts \
            CURRENT_STATE.md ACTIVATION_READINESS.md
          git commit -m 'chore(release): prepare 1.58.107'
          git push

name: harden-t016-boolean-contract

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  harden:
    if: github.head_ref == 'agent/android-scheduler-tool-picker'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: agent/android-scheduler-tool-picker
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '17'
      - name: Apply strict boolean parsing
        run: python scripts/_harden_t016_boolean_contract.py
      - name: Run Android parser and picker tests
        working-directory: android
        run: ./gradlew :app:testDebugUnitTest :app:compileDebugKotlin --no-daemon
      - name: Remove temporary patch files and validate scope
        shell: bash
        run: |
          rm .github/workflows/harden-t016-boolean-contract.yml
          rm scripts/_harden_t016_boolean_contract.py
          git diff --check
          grep -q 'enabled = t.opt("enabled") == true' android/app/src/main/java/dk/ternedal/modelrig/net/ModelRigClient.kt
          grep -q 'schedulable = t.opt("schedulable") == true' android/app/src/main/java/dk/ternedal/modelrig/net/ModelRigClient.kt
          grep -q '"enabled": "true"' android/app/src/test/java/dk/ternedal/modelrig/net/ToolRegistryContractTest.kt
      - name: Commit strict contract
        shell: bash
        run: |
          git config user.name 'ModelRig automation'
          git config user.email 'actions@users.noreply.github.com'
          git add \
            android/app/src/main/java/dk/ternedal/modelrig/net/ModelRigClient.kt \
            android/app/src/test/java/dk/ternedal/modelrig/net/ToolRegistryContractTest.kt \
            .github/workflows/harden-t016-boolean-contract.yml \
            scripts/_harden_t016_boolean_contract.py
          git commit -m 'test(android): require typed scheduler metadata'
          git push origin HEAD:agent/android-scheduler-tool-picker

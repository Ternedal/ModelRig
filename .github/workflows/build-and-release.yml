name: build-and-release

# Triggered by pushing a tag matching v* (this is exactly what every release in
# this project already does -- creating a GitHub Release via the API also
# creates the underlying tag, which fires this same trigger).
#
# Removes the sandbox-toolchain dependency this project has had all along:
# server tests, the Android APK, and now genuinely cross-platform desktop
# jars (built natively on Windows/macOS/Linux runners -- something the
# Linux-only build sandbox could never produce) all happen here instead.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      force_full_matrix:
        description: "Build all 3 desktop OSes even if this isn't a milestone tag"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  determine-matrix:
    # Cost control: macOS runners bill at 10x, Windows at 2x, against GitHub's
    # free-tier Actions minutes for private repos. Building all three OSes on
    # every single patch release (this project bumps the patch version on
    # almost every push) burns quota fast for little marginal benefit -- a
    # patch release's desktop code is the same Kotlin/Compose source on every
    # OS; what actually needs testing per-OS is new/changed desktop code,
    # which milestone releases (versions ending in .0, e.g. v0.19.0, v0.20.0,
    # v1.0.0) are the natural checkpoint for. Patch releases (.1, .2, ...)
    # build ubuntu only; a full 3-OS matrix is still one click away via
    # workflow_dispatch if a patch release specifically touches desktop code
    # and needs full verification.
    runs-on: ubuntu-latest
    outputs:
      os_matrix: ${{ steps.calc.outputs.os_matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          # depth 2 so git diff-tree can compare HEAD against its parent (the
          # desktop-touch check below). Assumes the linear one-commit-per-
          # release flow this project actually uses; a multi-commit tag would
          # only be checked against its last commit -- acceptable, and the
          # workflow_dispatch override exists for that edge.
          fetch-depth: 2
      - id: calc
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.force_full_matrix }}" = "true" ]; then
            echo 'os_matrix=["ubuntu-latest","windows-latest","macos-latest"]' >> "$GITHUB_OUTPUT"
            echo "Manual dispatch with force_full_matrix -> full 3-OS matrix"
          else
            TAG="${{ github.ref_name }}"
            PATCH="${TAG##*.}"
            if [ "$PATCH" = "0" ]; then
              echo 'os_matrix=["ubuntu-latest","windows-latest","macos-latest"]' >> "$GITHUB_OUTPUT"
              echo "Milestone release ($TAG, patch=0) -> full 3-OS matrix"
            elif git diff-tree --no-commit-id --name-only -r HEAD | grep -q '^desktop/'; then
              # The whole rationale for ubuntu-only patch builds was "a patch
              # release's desktop code is the same source" -- a patch that
              # CHANGES desktop code is exactly the exception (learned when
              # v0.20.13's Windows layout fix needed a Windows jar and the
              # rule would have skipped building one).
              echo 'os_matrix=["ubuntu-latest","windows-latest","macos-latest"]' >> "$GITHUB_OUTPUT"
              echo "Patch release ($TAG) but the tagged commit touches desktop/ -> full 3-OS matrix"
            else
              echo 'os_matrix=["ubuntu-latest"]' >> "$GITHUB_OUTPUT"
              echo "Patch release ($TAG, patch=$PATCH, no desktop changes) -> ubuntu-only desktop build"
            fi
          fi

  server-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install worker deps
        run: pip install fastapi uvicorn httpx --break-system-packages

      - name: Build backend
        run: cd backend && go build -o /tmp/modelrig-server ./cmd/modelrig-server

      - name: Backend smoke
        run: MODELRIG_BIN=/tmp/modelrig-server python3 tests/backend_smoke.py

      - name: Backend v1
        run: MODELRIG_BIN=/tmp/modelrig-server python3 tests/backend_v1.py

      - name: E2E
        run: MODELRIG_BIN=/tmp/modelrig-server python3 tests/e2e.py

      - name: Worker unit
        run: PYTHONPATH=worker python3 tests/worker_unit.py

      - name: Worker RAG
        run: PYTHONPATH=worker python3 tests/worker_rag.py

  android-build:
    needs: server-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install platform + build-tools
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Build debug APK
        working-directory: android
        run: |
          echo "sdk.dir=${ANDROID_HOME:-$ANDROID_SDK_ROOT}" > local.properties
          ./gradlew :app:assembleDebug --no-daemon --console=plain

      - name: Name APK with the release tag
        working-directory: android
        run: cp app/build/outputs/apk/debug/app-debug.apk "../modelrig-${{ github.ref_name }}.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: modelrig-${{ github.ref_name }}.apk
          retention-days: 14

  desktop-build:
    needs: [server-tests, determine-matrix]
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(needs.determine-matrix.outputs.os_matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build + package runnable jar (native to this OS)
        working-directory: desktop
        shell: bash
        run: ./gradlew :composeApp:packageUberJarForCurrentOS --no-daemon --console=plain

      - name: Locate the packaged jar
        id: findjar
        working-directory: desktop
        shell: bash
        run: |
          jar=$(find composeApp/build/compose/jars -name "*.jar" | head -1)
          echo "Found: $jar"
          # upload-artifact runs from the job's default working directory
          # (repo root), not this step's `working-directory: desktop` -- so
          # the recorded path must include that prefix or the next step can't
          # find the file (this bit v0.19.6: "No files were found").
          echo "path=desktop/$jar" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-jar-${{ matrix.os }}
          path: ${{ steps.findjar.outputs.path }}
          retention-days: 14

  release:
    needs: [android-build, desktop-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build source zip (same exclude pattern used throughout this project)
        run: |
          # The checkout directory is named after the exact repo name on GitHub
          # (ModelRig, capital R) -- not this project's local lowercase sandbox
          # convention. Resolve it dynamically instead of hardcoding either case,
          # so this keeps working regardless.
          cd "$GITHUB_WORKSPACE/.."
          dirname=$(basename "$GITHUB_WORKSPACE")
          zip -r "modelrig-${{ github.ref_name }}.zip" "$dirname" \
            -x '*/__pycache__/*' -x '*.pyc' -x '*/.git/*' \
            -x '*/build/*' -x '*/.gradle/*' -x '*/local.properties' -x '*.apk'
          mv "modelrig-${{ github.ref_name }}.zip" "$GITHUB_WORKSPACE/"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect all release assets into one flat folder
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.apk" -o -name "*.jar" \) -exec cp {} release-assets/ \;
          cp "modelrig-${{ github.ref_name }}.zip" release-assets/
          ls -la release-assets

      - name: Publish / update the GitHub Release with all assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release-assets/*
          fail_on_unmatched_files: true
          # Only sets these if the release doesn't already exist yet (this
          # project usually creates the release via the API first, then the
          # tag push fires this workflow -- action-gh-release updates the
          # existing release with assets rather than overwriting its notes).
          draft: false
          prerelease: false

name: build-and-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      force_full_matrix:
        description: "Byg Windows-jar + server-exes"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Version sites (+ tag) match VERSION
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            python3 scripts/version_tool.py check --tag "${{ github.ref_name }}"
          else
            python3 scripts/version_tool.py check
          fi

  # One authority creates the release before any parallel upload job starts.
  # A bare tag therefore gets the same draft-first contract as the normal API
  # release flow. Upload jobs are forbidden from creating their own release.
  ensure-draft-release:
    needs: version-check
    runs-on: ubuntu-latest
    steps:
      - name: Ensure one private draft exists
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            # Even if an external caller accidentally created it public, move it
            # back to draft BEFORE build jobs are allowed to upload anything.
            gh release edit "$TAG" --draft=true
          else
            gh release create "$TAG" --draft --title "$TAG" --notes ""
          fi
          state=$(gh release view "$TAG" --json isDraft --jq '.isDraft')
          test "$state" = "true" || { echo "release $TAG is not a draft"; exit 1; }
          echo "draft release ready: $TAG"
      - name: Manual dispatch is build-only
        if: github.ref_type != 'tag'
        run: echo "workflow_dispatch builds/tests only; no release is created without a tag"

  determine-matrix:
    needs: [version-check, ensure-draft-release]
    runs-on: ubuntu-latest
    outputs:
      build_desktop: ${{ steps.calc.outputs.build_desktop }}
      server_bins: ${{ steps.calc.outputs.server_bins }}
    steps:
      - id: calc
        run: |
          # The updater consumes a complete matched appliance set, and every
          # published version must have a version-matched desktop jar.
          echo "build_desktop=true" >> "$GITHUB_OUTPUT"
          echo "server_bins=true" >> "$GITHUB_OUTPUT"

  server-tests:
    needs: [version-check, ensure-draft-release]
    uses: ./.github/workflows/_tests.yml

  android-build:
    needs: server-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: android-actions/setup-android@v4
      - name: Install platform + build-tools
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - name: Unit tests (JVM)
        working-directory: android
        run: |
          echo "sdk.dir=${ANDROID_HOME:-$ANDROID_SDK_ROOT}" > local.properties
          ./gradlew :app:testDebugUnitTest --no-daemon --console=plain
      - name: Build release APK
        working-directory: android
        run: |
          echo "sdk.dir=${ANDROID_HOME:-$ANDROID_SDK_ROOT}" > local.properties
          ./gradlew :app:assembleRelease --no-daemon --console=plain
      - name: Verify signed release APK
        working-directory: android
        run: |
          set -euo pipefail
          APK=app/build/outputs/apk/release/app-release.apk
          test -f "$APK" || { echo "release APK missing"; exit 1; }
          BT="${ANDROID_HOME:-$ANDROID_SDK_ROOT}/build-tools/35.0.0"
          "$BT/apksigner" verify --print-certs "$APK" >/dev/null
          AAPT="$BT/aapt"; [ -x "$AAPT" ] || AAPT="$BT/aapt2"
          BADGING="$("$AAPT" dump badging "$APK")"
          TAG="${{ github.ref_name }}"; VER="${TAG#v}"
          echo "$BADGING" | grep -qE "package: name='dk\.ternedal\.modelrig'"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "$BADGING" | grep -qE "versionName='$VER'"
          fi
          ! echo "$BADGING" | grep -q "application-debuggable"
      - name: Name APK
        if: github.ref_type == 'tag'
        working-directory: android
        run: cp app/build/outputs/apk/release/app-release.apk "../modelrig-${{ github.ref_name }}.apk"
      - name: Upload APKs to the existing draft
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp "modelrig-${{ github.ref_name }}.apk" kaliv-latest.apk
          gh release upload "${{ github.ref_name }}" \
            "modelrig-${{ github.ref_name }}.apk" kaliv-latest.apk --clobber

  desktop-build:
    needs: [server-tests, determine-matrix]
    if: needs.determine-matrix.outputs.build_desktop == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Build + package runnable jar
        working-directory: desktop
        shell: bash
        run: ./gradlew :composeApp:packageUberJarForCurrentOS --no-daemon --console=plain
      - name: Locate jar
        id: findjar
        working-directory: desktop
        shell: bash
        run: |
          jar=$(find composeApp/build/compose/jars -name "*.jar" | head -1)
          test -n "$jar" && test -f "$jar"
          echo "path=desktop/$jar" >> "$GITHUB_OUTPUT"
      - name: Upload jar to the existing draft
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: gh release upload "${{ github.ref_name }}" "${{ steps.findjar.outputs.path }}" --clobber

  server-binaries:
    needs: [determine-matrix, server-tests]
    if: needs.determine-matrix.outputs.server_bins == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build backend exe
        working-directory: backend
        run: go build -o ../modelrig-server-windows-x64.exe ./cmd/modelrig-server
      - name: Build worker exe
        run: |
          pip install -r worker/requirements.txt pyinstaller
          pyinstaller --onefile --name modelrig-worker-windows-x64 --paths worker worker/run_worker.py
      - name: Build supervisor exe
        working-directory: backend
        run: go build -o ../modelrig-supervisor-windows-x64.exe ./cmd/modelrig-supervisor
      - name: Build updater exe
        working-directory: backend
        run: go build -o ../modelrig-updater-windows-x64.exe ./cmd/modelrig-updater
      - name: Smoke test worker and backend exes
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:MODELRIG_OLLAMA_URL = "http://127.0.0.1:9"
          $worker = Start-Process -FilePath ".\dist\modelrig-worker-windows-x64.exe" -PassThru -NoNewWindow
          $server = $null
          try {
            $wh = $null
            foreach ($i in 1..15) {
              try { $wh = Invoke-RestMethod -Uri http://127.0.0.1:8099/healthz -TimeoutSec 3; break }
              catch { Start-Sleep -Seconds 2 }
            }
            if (-not $wh -or $wh.service -ne "modelrig-worker") { throw "worker healthz failed: $($wh | ConvertTo-Json -Compress)" }

            $server = Start-Process -FilePath ".\modelrig-server-windows-x64.exe" -PassThru -NoNewWindow
            $sh = $null
            foreach ($i in 1..10) {
              try { $sh = Invoke-RestMethod -Uri http://127.0.0.1:8080/healthz -TimeoutSec 3; break }
              catch { Start-Sleep -Seconds 2 }
            }
            if ("${{ github.ref_type }}" -eq "tag") {
              $expected = $env:GITHUB_REF_NAME.TrimStart("v")
              if (-not $sh -or $sh.version -ne $expected) { throw "server version mismatch: got '$($sh.version)', expected '$expected'" }
            } elseif (-not $sh) {
              throw "server healthz failed"
            }

            $hf = Invoke-RestMethod -Uri http://127.0.0.1:8099/health/full -TimeoutSec 5
            foreach ($k in @("asr","tts","pdf","docx","cuda")) {
              if ($null -eq $hf.capabilities.$k) { throw "health/full missing capability '$k'" }
            }
          }
          finally {
            if ($server -and -not $server.HasExited) { Stop-Process -Id $server.Id -Force -ErrorAction SilentlyContinue }
            if ($worker -and -not $worker.HasExited) { Stop-Process -Id $worker.Id -Force -ErrorAction SilentlyContinue }
          }
      - name: Upload exes to the existing draft
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ github.ref_name }}" \
            modelrig-server-windows-x64.exe \
            modelrig-supervisor-windows-x64.exe \
            modelrig-updater-windows-x64.exe \
            dist/modelrig-worker-windows-x64.exe --clobber

  release:
    needs: [determine-matrix, android-build, desktop-build, server-binaries]
    if: ${{ github.ref_type == 'tag' && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build source zip
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/.."
          dirname=$(basename "$GITHUB_WORKSPACE")
          zip -r "modelrig-${{ github.ref_name }}.zip" "$dirname" \
            -x '*/__pycache__/*' -x '*.pyc' -x '*/.git/*' \
            -x '*/build/*' -x '*/.gradle/*' -x '*/local.properties' -x '*.apk'
          mv "modelrig-${{ github.ref_name }}.zip" "$GITHUB_WORKSPACE/"
      - name: Upload source zip to the existing draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "modelrig-${{ github.ref_name }}.zip" --clobber
      - name: Publish SHA256SUMS.txt over every asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p _sums && cd _sums
          gh release download "${{ github.ref_name }}" --dir . --clobber
          rm -f SHA256SUMS.txt
          sha256sum * > SHA256SUMS.txt
          gh release upload "${{ github.ref_name }}" SHA256SUMS.txt --clobber
      - name: Verify complete draft asset set
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          draft=$(gh release view "${{ github.ref_name }}" --json isDraft --jq '.isDraft')
          test "$draft" = "true" || { echo "release became public before verification"; exit 1; }
          names=$(gh release view "${{ github.ref_name }}" --json assets --jq '.assets[].name')
          echo "$names"
          for want in .apk .jar .zip .exe SHA256SUMS.txt; do
            echo "$names" | grep -q -- "$want" || { echo "MISSING: $want"; exit 1; }
          done
      - name: Publish verified release atomically
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --draft=false --latest

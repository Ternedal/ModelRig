name: temporary-scheduler-post-execution-patch

on:
  push:
    branches:
      - agent/scheduler-post-execution-truth

permissions:
  contents: write

jobs:
  apply-patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Apply exact scheduler patch
        run: python scripts/_temporary_patch_scheduler_post_execution.py
      - name: Commit production and regression test
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add worker/app/schedule_runner.py tests/worker_schedule_post_execution.py
          git commit -m 'fix(scheduler): preserve execution truth after bookkeeping failures'
          git push

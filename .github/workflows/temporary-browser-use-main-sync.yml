name: temporary-browser-use-main-sync

on:
  push:
    branches:
      - agent/browser-use-adapter

permissions:
  contents: write

jobs:
  sync-main:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - run: python -m pip install -r worker/requirements.txt
      - name: Merge latest main while preserving tested release identity
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin main
          set +e
          git merge --no-commit --no-ff origin/main
          merge_status=$?
          set -e
          if [ "$merge_status" -ne 0 ]; then
            for path in \
              VERSION \
              worker/app/main.py \
              backend/internal/config/config.go \
              android/app/build.gradle.kts \
              desktop/composeApp/build.gradle.kts \
              CURRENT_STATE.md \
              ACTIVATION_READINESS.md; do
              if git diff --name-only --diff-filter=U | grep -Fxq "$path"; then
                git checkout --ours -- "$path"
                git add "$path"
              fi
            done
          fi
          unresolved=$(git diff --name-only --diff-filter=U)
          if [ -n "$unresolved" ]; then
            echo "Unexpected merge conflicts:" >&2
            echo "$unresolved" >&2
            exit 1
          fi
          git add -A
          git commit -m 'merge: synchronize scheduler recovery from main'
      - name: Regenerate authoritative state
        run: |
          python scripts/current_state.py
          python scripts/activation_readiness.py
          git add CURRENT_STATE.md ACTIVATION_READINESS.md
          if ! git diff --cached --quiet; then
            git commit -m 'docs: regenerate state after main synchronization'
          fi
          git push

name: patch-browser-fixture-request-proof

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/browser-use-chromium-fixture'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: agent/browser-use-chromium-fixture
          fetch-depth: 1
          show-progress: false
      - name: Patch endpoint-specific denial proof
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('scripts/browser_use_live_fixture.py')
          text = path.read_text(encoding='utf-8')
          text, proof_count = re.subn(
              r'''        check\(\n\s+FixtureHandler\.requests == \["/fixture"\],\n\s+"denied numeric URL never reaches fixture",\n\s+results,\n\s+\)''',
              '''        check(
                  FixtureHandler.requests.count("/fixture") == 1,
                  "denied numeric URL never reaches fixture endpoint",
                  results,
              )''',
              text,
              count=1,
          )
          if proof_count != 1:
              raise SystemExit(f'denial proof replacement count is {proof_count}')

          anchor = '        "fixture_url": fixture_url,\n'
          addition = anchor + '        "served_requests": list(FixtureHandler.requests),\n'
          if text.count(anchor) != 1:
              raise SystemExit(f'report anchor count is {text.count(anchor)}')
          path.write_text(text.replace(anchor, addition), encoding='utf-8')
          PY
      - name: Validate fixture script
        run: |
          python -m py_compile scripts/browser_use_live_fixture.py
          git diff --check
      - name: Commit fixture proof
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/browser_use_live_fixture.py
          git commit -m "test(research): prove numeric denial at fixture endpoint"
          git push origin HEAD:agent/browser-use-chromium-fixture

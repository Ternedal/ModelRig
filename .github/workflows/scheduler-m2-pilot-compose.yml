name: scheduler-m2-pilot-compose

on:
  pull_request:

permissions:
  contents: write

jobs:
  compose-and-prove:
    if: github.head_ref == 'agent/scheduler-m2-pilot-candidate'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.23'

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Fetch proven pilot operator
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin \
            18ab9fce3d3e9a0173f5573aa226b9e36f116e17 \
            e4b4d6af94bbb7acbd060f4fcf1f1789bce27cca

      - name: Compose pilot operator files
        shell: bash
        run: |
          set -euo pipefail
          git checkout e4b4d6af94bbb7acbd060f4fcf1f1789bce27cca -- \
            START_SCHEDULER_PILOT.cmd \
            scripts/scheduler_pilot_wizard.py \
            tests/workflow_scheduler_pilot_wizard.py
          git diff --binary \
            18ab9fce3d3e9a0173f5573aa226b9e36f116e17 \
            e4b4d6af94bbb7acbd060f4fcf1f1789bce27cca \
            -- .gitignore | git apply --3way

      - name: Bind wizard to combined pilot branch
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          wizard = Path('scripts/scheduler_pilot_wizard.py')
          text = wizard.read_text(encoding='utf-8')
          old = 'BRANCH = "agent/t019-scheduler-pilot-wizard"'
          new = 'BRANCH = "agent/scheduler-m2-pilot-candidate"'
          if text.count(old) != 1:
              raise SystemExit(f'expected one old branch binding, found {text.count(old)}')
          wizard.write_text(text.replace(old, new, 1), encoding='utf-8')

          test = Path('tests/workflow_scheduler_pilot_wizard.py')
          source = test.read_text(encoding='utf-8')
          anchor = 'check(module.matches_manifest(read, module.READ_SPEC), "read manifest is exact")\n'
          addition = (
              'check(module.BRANCH == "agent/scheduler-m2-pilot-candidate", '
              '"wizard is bound to the combined pilot branch")\n'
          )
          if source.count(anchor) != 1:
              raise SystemExit('wizard test branch anchor mismatch')
          test.write_text(source.replace(anchor, addition + anchor, 1), encoding='utf-8')
          PY

      - name: Remove composition workflow
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/scheduler-m2-pilot-compose.yml
          test ! -e .github/workflows/scheduler-m2-pilot-compose.yml

      - name: Install worker dependencies
        run: pip install -r worker/requirements.txt --break-system-packages

      - name: Regenerate authoritative current state
        run: python3 scripts/current_state.py

      - name: Build backend and run complete repository suite
        env:
          MODELRIG_BIN: /tmp/modelrig-server
        shell: bash
        run: |
          set -euo pipefail
          cd backend
          go build -o /tmp/modelrig-server ./cmd/modelrig-server
          go vet ./...
          go test ./...
          cd ..
          pip install --quiet ruff
          ruff check --select E9,F63,F7,F82 worker/ tests/
          git diff --check
          for f in tests/backend_*.py tests/e2e.py tests/worker_*.py tests/workflow_*.py; do
            [ -e "$f" ] || continue
            echo "::group::$f"
            PYTHONPATH=worker python3 "$f"
            echo "::endgroup::"
          done

      - name: Verify exact pilot scope
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/expected.txt <<'EOF'
          .gitignore
          CURRENT_STATE.md
          START_SCHEDULER_PILOT.cmd
          scripts/scheduler_pilot_wizard.py
          tests/workflow_scheduler_pilot_wizard.py
          EOF
          git diff --name-only 9dc470878317ac0c44dfc69660b9f96fe66d7063 | sort > /tmp/actual.txt
          sort -o /tmp/expected.txt /tmp/expected.txt
          diff -u /tmp/expected.txt /tmp/actual.txt
          test ! -e .github/workflows/scheduler-m2-pilot-compose.yml
          git diff --check

      - name: Commit proven combined pilot candidate
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "validation(scheduler): add one-click M2 physical pilot"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

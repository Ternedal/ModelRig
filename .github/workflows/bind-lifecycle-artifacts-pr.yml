name: bind-lifecycle-artifacts-pr

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  bind:
    if: github.head_ref == 'eval/physical-validation-campaign'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: eval/physical-validation-campaign
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Bind every lifecycle trial to a hashed artifact
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          def replace_once(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: target count is {count}")
              target.write_text(text.replace(old, new), encoding="utf-8")

          script_path = Path("scripts/physical_validation_campaign.py")
          script = script_path.read_text(encoding="utf-8")
          helper_anchor = '''def _nonempty_text(errors: list[str], label: str, value: Any) -> str | None:
              if not isinstance(value, str) or not value.strip():
                  errors.append(f"{label} must be a non-empty string")
                  return None
              return value.strip()


          def _base_result'''
          helper_replacement = '''def _nonempty_text(errors: list[str], label: str, value: Any) -> str | None:
              if not isinstance(value, str) or not value.strip():
                  errors.append(f"{label} must be a non-empty string")
                  return None
              return value.strip()


          def _validate_lifecycle_artifact(
              errors: list[str],
              label: str,
              root: Path,
              path_value: Any,
              digest_value: Any,
          ) -> dict[str, Any] | None:
              raw_path = _nonempty_text(errors, f"{label}.evidence_path", path_value)
              if not _valid_digest(digest_value, 64):
                  errors.append(f"{label}.evidence_sha256 is not a 64-character digest")
                  expected_digest = None
              else:
                  expected_digest = digest_value
              if raw_path is None:
                  return None
              relative_input = Path(raw_path)
              if relative_input.is_absolute() or ".." in relative_input.parts:
                  errors.append(f"{label}.evidence_path must be repository-relative")
                  return None
              unresolved = root / relative_input
              if unresolved.is_symlink():
                  errors.append(f"{label}.evidence_path must not be a symlink")
                  return None
              try:
                  resolved = _resolve_under(root, relative_input)
                  relative = resolved.relative_to(root.resolve())
              except CampaignError as exc:
                  errors.append(f"{label}.evidence_path is invalid: {exc}")
                  return None
              if relative.parts[:2] != ("validation", "appliance-lifecycle-evidence"):
                  errors.append(
                      f"{label}.evidence_path must be under "
                      "validation/appliance-lifecycle-evidence"
                  )
                  return None
              if not resolved.exists() or not resolved.is_file():
                  errors.append(f"{label}.evidence artifact is missing")
                  return None
              try:
                  size = resolved.stat().st_size
                  if size <= 0 or size > MAX_EVIDENCE_BYTES:
                      errors.append(
                          f"{label}.evidence artifact size is invalid: {size} bytes"
                      )
                      return None
                  raw = resolved.read_bytes()
              except OSError as exc:
                  errors.append(
                      f"{label}.evidence artifact cannot be read: {type(exc).__name__}"
                  )
                  return None
              actual_digest = hashlib.sha256(raw).hexdigest()
              if expected_digest is not None and actual_digest != expected_digest:
                  errors.append(f"{label}.evidence_sha256 does not match the artifact")
              return {
                  "path": str(relative),
                  "sha256": actual_digest,
                  "bytes": len(raw),
              }


          def _base_result'''
          if script.count(helper_anchor) != 1:
              raise SystemExit("lifecycle artifact helper anchor is missing")
          script = script.replace(helper_anchor, helper_replacement)

          lifecycle_anchor = '''    trials = report.get("trials")
              if not isinstance(trials, dict):
                  errors.append("lifecycle trials are missing")
                  trials = {}

              reboot = trials.get("reboot")'''
          lifecycle_replacement = '''    trials = report.get("trials")
              if not isinstance(trials, dict):
                  errors.append("lifecycle trials are missing")
                  trials = {}
              root = _thresholds.get("root")
              artifacts: dict[str, Any] = {}
              if not isinstance(root, Path):
                  errors.append("campaign root is unavailable for lifecycle artifacts")

              def capture_artifact(name: str, trial: dict[str, Any]) -> None:
                  if isinstance(root, Path):
                      artifact = _validate_lifecycle_artifact(
                          errors,
                          name,
                          root,
                          trial.get("evidence_path"),
                          trial.get("evidence_sha256"),
                      )
                      if artifact is not None:
                          artifacts[name] = artifact

              reboot = trials.get("reboot")'''
          if script.count(lifecycle_anchor) != 1:
              raise SystemExit("lifecycle artifact setup anchor is missing")
          script = script.replace(lifecycle_anchor, lifecycle_replacement)

          reboot_anchor = '''        _expect_equal(errors, "reboot.worker_code_sha256", reboot.get("worker_code_sha256"), candidate["code_sha256"])

              for name in ("supervisor_backend", "supervisor_worker"):'''
          reboot_replacement = '''        _expect_equal(errors, "reboot.worker_code_sha256", reboot.get("worker_code_sha256"), candidate["code_sha256"])
                  capture_artifact("reboot", reboot)

              for name in ("supervisor_backend", "supervisor_worker"):'''
          if script.count(reboot_anchor) != 1:
              raise SystemExit("reboot artifact anchor is missing")
          script = script.replace(reboot_anchor, reboot_replacement)

          supervisor_anchor = '''        _expect_equal(errors, f"{name}.active_code_sha256", trial.get("active_code_sha256"), candidate["code_sha256"])

              good = trials.get("good_update")'''
          supervisor_replacement = '''        _expect_equal(errors, f"{name}.active_code_sha256", trial.get("active_code_sha256"), candidate["code_sha256"])
                  capture_artifact(name, trial)

              good = trials.get("good_update")'''
          if script.count(supervisor_anchor) != 1:
              raise SystemExit("supervisor artifact anchor is missing")
          script = script.replace(supervisor_anchor, supervisor_replacement)

          good_anchor = '''        elif good.get("source_git_sha") == candidate["git_sha"]:
                      errors.append("good_update.source_git_sha must differ from the candidate")

              bad = trials.get("bad_update")'''
          good_replacement = '''        elif good.get("source_git_sha") == candidate["git_sha"]:
                      errors.append("good_update.source_git_sha must differ from the candidate")
                  capture_artifact("good_update", good)

              bad = trials.get("bad_update")'''
          if script.count(good_anchor) != 1:
              raise SystemExit("good update artifact anchor is missing")
          script = script.replace(good_anchor, good_replacement)

          bad_anchor = '''        if bad.get("attempted_git_sha") == candidate["git_sha"]:
                      errors.append("bad_update attempted_git_sha must differ from the candidate")

              result["summary"] = {'''
          bad_replacement = '''        if bad.get("attempted_git_sha") == candidate["git_sha"]:
                      errors.append("bad_update attempted_git_sha must differ from the candidate")
                  capture_artifact("bad_update", bad)

              result["summary"] = {'''
          if script.count(bad_anchor) != 1:
              raise SystemExit("bad update artifact anchor is missing")
          script = script.replace(bad_anchor, bad_replacement)

          summary_anchor = '''        "bad_update_recovered": _nested(
                      report, "trials", "bad_update", "rejected_or_rolled_back"
                  ),
              }'''
          summary_replacement = '''        "bad_update_recovered": _nested(
                      report, "trials", "bad_update", "rejected_or_rolled_back"
                  ),
                  "artifacts": artifacts,
              }'''
          if script.count(summary_anchor) != 1:
              raise SystemExit("lifecycle summary artifact anchor is missing")
          script = script.replace(summary_anchor, summary_replacement)

          thresholds_anchor = '''    thresholds: dict[str, Any] = {
                  "min_model_exact": args.min_model_exact,
                  "agent3_assessor": assessor,
              }'''
          thresholds_replacement = '''    thresholds: dict[str, Any] = {
                  "min_model_exact": args.min_model_exact,
                  "agent3_assessor": assessor,
                  "root": root,
              }'''
          if script.count(thresholds_anchor) != 1:
              raise SystemExit("campaign root threshold anchor is missing")
          script_path.write_text(
              script.replace(thresholds_anchor, thresholds_replacement),
              encoding="utf-8",
          )

          example_path = Path("eval/appliance_lifecycle_observations.example.json")
          example = json.loads(example_path.read_text(encoding="utf-8"))
          for name, trial in example["trials"].items():
              trial["evidence_path"] = (
                  f"validation/appliance-lifecycle-evidence/{name}.log"
              )
              trial["evidence_sha256"] = "FILL_ME_64_HEX"
          example_path.write_text(
              json.dumps(example, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )

          test_path = Path("tests/workflow_physical_validation_campaign.py")
          test = test_path.read_text(encoding="utf-8")
          test = test.replace(
              "import argparse\nimport importlib.util",
              "import argparse\nimport hashlib\nimport importlib.util",
              1,
          )
          helper_test_anchor = '''def fake_assessor(_report, *, current_version, current_code, report_sha256):'''
          helper_test_replacement = '''def reports_with_artifacts(temp: Path) -> dict[str, dict]:
              reports = valid_reports()
              for name, trial in reports["lifecycle"]["trials"].items():
                  artifact = temp / f"{name}.log"
                  raw = f"{name} physical lifecycle evidence\\n".encode("utf-8")
                  artifact.write_bytes(raw)
                  trial["evidence_path"] = str(artifact.relative_to(ROOT))
                  trial["evidence_sha256"] = hashlib.sha256(raw).hexdigest()
              return reports


          def fake_assessor(_report, *, current_version, current_code, report_sha256):'''
          if test.count(helper_test_anchor) != 1:
              raise SystemExit("test artifact helper anchor is missing")
          test = test.replace(helper_test_anchor, helper_test_replacement)
          test = test.replace(
              "for name, report in valid_reports().items():",
              "for name, report in reports_with_artifacts(temp).items():",
          )
          test = test.replace(
              'voice = valid_reports()["voice"]',
              'voice = reports_with_artifacts(temp)["voice"]',
          )
          test = test.replace(
              "reports = valid_reports()",
              "reports = reports_with_artifacts(temp)",
          )

          negative_anchor = '''        check(
                      "bad_update.attempted_version must be a non-empty string" in metadata_errors,
                      "bad update identifies the attempted build",
                  )
          finally:'''
          negative_replacement = '''        check(
                      "bad_update.attempted_version must be a non-empty string" in metadata_errors,
                      "bad update identifies the attempted build",
                  )

                  reports = reports_with_artifacts(temp)
                  reboot_artifact = ROOT / reports["lifecycle"]["trials"]["reboot"]["evidence_path"]
                  reboot_artifact.write_text("tampered evidence\\n", encoding="utf-8")
                  write(temp / "lifecycle.json", reports["lifecycle"])
                  tampered, tampered_exit = campaign.campaign_report(args_for(temp, "verify"))
                  check(tampered_exit == 1, "tampered lifecycle artifact blocks campaign")
                  check(
                      "reboot.evidence_sha256 does not match the artifact"
                      in tampered["evidence"]["lifecycle"]["errors"],
                      "artifact hash mismatch is explicit",
                  )
          finally:'''
          if test.count(negative_anchor) != 1:
              raise SystemExit("artifact negative test anchor is missing")
          test_path.write_text(
              test.replace(negative_anchor, negative_replacement),
              encoding="utf-8",
          )

          ignore_path = Path(".gitignore")
          ignore = ignore_path.read_text(encoding="utf-8")
          ignore_anchor = "/validation/appliance-lifecycle-observations.json\n"
          ignore_replacement = (
              ignore_anchor + "/validation/appliance-lifecycle-evidence/\n"
          )
          if ignore.count(ignore_anchor) != 1:
              raise SystemExit("lifecycle ignore anchor is missing")
          ignore_path.write_text(
              ignore.replace(ignore_anchor, ignore_replacement),
              encoding="utf-8",
          )

          Path(".github/workflows/bind-lifecycle-artifacts-pr.yml").unlink()
          PY
      - name: Validate artifact-bound lifecycle evidence
        shell: bash
        run: |
          pip install -r worker/requirements.txt --break-system-packages >/dev/null
          pip install --quiet ruff
          ruff check --select E9,F63,F7,F82 scripts/physical_validation_campaign.py tests/workflow_physical_validation_campaign.py
          PYTHONPATH=worker python tests/workflow_physical_validation_campaign.py
          git diff --check
          test ! -e .github/workflows/bind-lifecycle-artifacts-pr.yml
      - name: Commit artifact binding
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(eval): bind lifecycle trials to hashed artifacts"
          git push origin HEAD:eval/physical-validation-campaign

name: fix-rag-review-indentation-pr

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'agent/rag-benchmark-harness'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: agent/rag-benchmark-harness
          fetch-depth: 1
          show-progress: false
      - name: Fix indentation and remove diagnostics
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('tests/worker_rag_benchmark.py')
          text = path.read_text(encoding='utf-8')
          old = '    check(scale_result["resources"]["rss_delta_peak_bytes"] == 234, "resource delta reaches the report")'
          new = '            check(scale_result["resources"]["rss_delta_peak_bytes"] == 234, "resource delta reaches the report")'
          if text.count(old) != 1:
              raise SystemExit(f'indentation target count is {text.count(old)}')
          path.write_text(text.replace(old, new), encoding='utf-8')
          for cleanup in (
              Path('RUFF_FAILURE.txt'),
              Path('.github/workflows/diagnose-rag-ruff-pr.yml'),
              Path('.github/workflows/fix-rag-review-indentation-pr.yml'),
          ):
              cleanup.unlink(missing_ok=True)
          PY
      - name: Validate benchmark review
        shell: bash
        run: |
          pip install -r worker/requirements.txt --break-system-packages >/dev/null
          pip install --quiet ruff
          ruff check --select E9,F63,F7,F82 scripts/rag_benchmark.py tests/worker_rag_benchmark.py
          PYTHONPATH=worker python tests/worker_rag_benchmark.py
          git diff --check
          test ! -e RUFF_FAILURE.txt
          test ! -e .github/workflows/diagnose-rag-ruff-pr.yml
          test ! -e .github/workflows/fix-rag-review-indentation-pr.yml
      - name: Commit clean final review
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(eval): correct RAG benchmark resource assertion"
          git push origin HEAD:agent/rag-benchmark-harness

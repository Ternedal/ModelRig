name: combined-pilot-entrypoint-finalize

on:
  pull_request:

permissions:
  contents: write

jobs:
  patch-and-prove:
    if: github.head_ref == 'agent/combined-physical-pilots-candidate'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.23'

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Bind scheduler operator to combined branch
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          wizard = Path('scripts/scheduler_pilot_wizard.py')
          text = wizard.read_text(encoding='utf-8')
          old = 'BRANCH = "agent/scheduler-m2-pilot-candidate"'
          new = 'BRANCH = "agent/combined-physical-pilots-candidate"'
          if text.count(old) != 1:
              raise SystemExit(f'scheduler branch anchor count={text.count(old)}')
          wizard.write_text(text.replace(old, new, 1), encoding='utf-8')

          test = Path('tests/workflow_scheduler_pilot_wizard.py')
          source = test.read_text(encoding='utf-8')
          old_test = 'check(module.BRANCH == "agent/scheduler-m2-pilot-candidate", "wizard is bound to the combined pilot branch")'
          new_test = 'check(module.BRANCH == "agent/combined-physical-pilots-candidate", "wizard is bound to the combined physical branch")'
          if source.count(old_test) != 1:
              raise SystemExit(f'scheduler test branch anchor count={source.count(old_test)}')
          test.write_text(source.replace(old_test, new_test, 1), encoding='utf-8')
          PY

      - name: Remove temporary workflow
        run: |
          rm -f .github/workflows/combined-pilot-entrypoint-finalize.yml
          test ! -e .github/workflows/combined-pilot-entrypoint-finalize.yml

      - name: Install worker dependencies
        run: pip install -r worker/requirements.txt --break-system-packages

      - name: Regenerate state and prove complete repository
        env:
          MODELRIG_BIN: /tmp/modelrig-server
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/current_state.py
          cd backend
          go build -o /tmp/modelrig-server ./cmd/modelrig-server
          go vet ./...
          go test ./...
          cd ..
          pip install --quiet ruff
          ruff check --select E9,F63,F7,F82 worker/ tests/
          git diff --check
          for f in tests/backend_*.py tests/e2e.py tests/worker_*.py tests/workflow_*.py; do
            [ -e "$f" ] || continue
            PYTHONPATH=worker python3 "$f"
          done

      - name: Verify exact combined scope
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/expected.txt <<'EOF'
          AGENT3_READONLY_PILOT.md
          CURRENT_STATE.md
          START_AGENT3_READONLY_PILOT.cmd
          START_REMAINING_PHYSICAL_TESTS.cmd
          eval/agent3_readonly_pilot_tasks.json
          scripts/agent3_readonly_pilot.py
          scripts/agent3_readonly_pilot_one_click.py
          scripts/remaining_physical_pilots.py
          scripts/scheduler_pilot_wizard.py
          tests/worker_agent3_readonly_pilot.py
          tests/workflow_agent3_readonly_pilot_one_click.py
          tests/workflow_remaining_physical_pilots.py
          tests/workflow_scheduler_pilot_wizard.py
          EOF
          git diff --name-only 582cce37e16e52a69bf6c7f0d8932536ef8e1a5d | sort > /tmp/actual.txt
          sort -o /tmp/expected.txt /tmp/expected.txt
          diff -u /tmp/expected.txt /tmp/actual.txt
          test ! -e .github/workflows/combined-pilot-entrypoint-finalize.yml
          test ! -e .github/workflows/combined-physical-pilots-compose.yml
          git diff --check

      - name: Commit final single-entry physical candidate
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "validation: add one entrypoint for remaining physical pilots"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

name: Unified candidate version bump

on:
  push:
    branches:
      - agent/unified-candidate-1.58.143

permissions:
  contents: write

jobs:
  bump:
    if: ${{ !contains(github.event.head_commit.message, '[version-bump-bot]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/unified-candidate-1.58.143

      - name: Apply lockstep 1.58.143 version stamps
        shell: python
        run: |
          from pathlib import Path

          replacements = {
              "VERSION": [("1.58.142", "1.58.143")],
              "ACTIVATION_READINESS.md": [("`1.58.142`", "`1.58.143`")],
              "CURRENT_STATE.md": [("**Version:** 1.58.142", "**Version:** 1.58.143")],
              "android/app/build.gradle.kts": [
                  ("versionCode = 275", "versionCode = 276"),
                  ('versionName = "1.58.142"', 'versionName = "1.58.143"'),
              ],
              "backend/internal/config/config.go": [
                  ('const Version = "1.58.142"', 'const Version = "1.58.143"'),
              ],
              "desktop/composeApp/build.gradle.kts": [
                  ('packageVersion = "1.58.142"', 'packageVersion = "1.58.143"'),
              ],
              "worker/app/main.py": [
                  ('VERSION = "1.58.142"', 'VERSION = "1.58.143"'),
              ],
          }

          for name, pairs in replacements.items():
              path = Path(name)
              text = path.read_text(encoding="utf-8")
              for old, new in pairs:
                  count = text.count(old)
                  if count != 1:
                      raise SystemExit(f"{name}: expected exactly one {old!r}, found {count}")
                  text = text.replace(old, new)
              path.write_text(text, encoding="utf-8", newline="")

      - name: Commit candidate version
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION ACTIVATION_READINESS.md CURRENT_STATE.md \
            android/app/build.gradle.kts backend/internal/config/config.go \
            desktop/composeApp/build.gradle.kts worker/app/main.py
          git diff --cached --check
          git commit -m "v1.58.143: unified current-main candidate [version-bump-bot]"
          git push origin HEAD:agent/unified-candidate-1.58.143

name: apply-browser-use-contract-fixture

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/browser-use-chromium-fixture'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: agent/browser-use-chromium-fixture
          fetch-depth: 1
          show-progress: false
      - name: Apply exact test and CI patch
        run: python scripts/_apply_browser_use_contract_fixture.py
      - name: Validate patch shape
        shell: bash
        run: |
          python -m py_compile scripts/browser_use_live_fixture.py tests/worker_browser_use_adapter.py
          git diff --check
          grep -q 'Launch Chromium against controlled local fixture' .github/workflows/ci.yml
          grep -q 'browser context refuses downloads' tests/worker_browser_use_adapter.py
          test ! -e .github/workflows/apply-browser-use-contract-fixture.yml
          test ! -e scripts/_apply_browser_use_contract_fixture.py
      - name: Commit contract and fixture gates
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test(research): gate Browser Use with controlled Chromium"
          git push origin HEAD:agent/browser-use-chromium-fixture

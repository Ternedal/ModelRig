name: retry-lifecycle-artifacts-pr

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  retry:
    if: github.head_ref == 'eval/physical-validation-campaign'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: eval/physical-validation-campaign
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Apply corrected lifecycle artifact patch
        run: python scripts/_apply_lifecycle_artifact_patch.py
      - name: Validate artifact-bound lifecycle evidence
        shell: bash
        run: |
          pip install -r worker/requirements.txt --break-system-packages >/dev/null
          pip install --quiet ruff
          ruff check --select E9,F63,F7,F82 scripts/physical_validation_campaign.py tests/workflow_physical_validation_campaign.py
          PYTHONPATH=worker python tests/workflow_physical_validation_campaign.py
          git diff --check
          test ! -e .github/workflows/bind-lifecycle-artifacts-pr.yml
          test ! -e .github/workflows/retry-lifecycle-artifacts-pr.yml
          test ! -e scripts/_apply_lifecycle_artifact_patch.py
      - name: Commit artifact binding
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(eval): bind lifecycle trials to hashed artifacts"
          git push origin HEAD:eval/physical-validation-campaign

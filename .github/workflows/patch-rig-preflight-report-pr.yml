name: patch-rig-preflight-report-pr

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'eval/physical-validation-campaign'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: eval/physical-validation-campaign
          fetch-depth: 1
          show-progress: false
      - name: Add optional JSON preflight report
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding='utf-8')
              if text.count(old) != 1:
                  raise SystemExit(f'{path}: target count is {text.count(old)}')
              target.write_text(text.replace(old, new), encoding='utf-8')

          replace_once(
              'scripts/rig_preflight.py',
              '''import argparse
          import json
          import os
          import sys''',
              '''import argparse
          import json
          import os
          import subprocess
          import sys
          import tempfile
          from datetime import datetime, timezone
          from pathlib import Path''',
          )
          replace_once(
              'scripts/rig_preflight.py',
              '''_FAIL = "  FAIL "


          class Check:''',
              '''_FAIL = "  FAIL "
          PREFLIGHT_SCHEMA = "kaliv-rig-preflight/v1"


          def _write_json_atomic(path: Path, value: dict) -> None:
              path.parent.mkdir(parents=True, exist_ok=True)
              payload = json.dumps(value, ensure_ascii=False, indent=2, sort_keys=True) + "\\n"
              with tempfile.NamedTemporaryFile(
                  mode="w",
                  encoding="utf-8",
                  dir=path.parent,
                  prefix=path.name + ".",
                  suffix=".tmp",
                  delete=False,
              ) as handle:
                  handle.write(payload)
                  temp = Path(handle.name)
              temp.replace(path)


          def _candidate_identity() -> dict:
              root = Path(__file__).resolve().parents[1]
              version = (root / "VERSION").read_text(encoding="utf-8").strip()
              proc = subprocess.run(
                  ["git", "rev-parse", "HEAD"],
                  cwd=root,
                  capture_output=True,
                  text=True,
                  timeout=10,
                  check=False,
              )
              git_sha = proc.stdout.strip()
              if proc.returncode != 0 or len(git_sha) != 40:
                  raise RuntimeError("git HEAD is unavailable for preflight evidence")
              worker = root / "worker"
              if str(worker) not in sys.path:
                  sys.path.insert(0, str(worker))
              from app.build_identity import code_fingerprint

              return {
                  "version": version,
                  "git_sha": git_sha,
                  "code_sha256": code_fingerprint(),
              }


          class Check:''',
          )
          replace_once(
              'scripts/rig_preflight.py',
              '''    def render(self) -> None:
                  tag = {"ok": _OK, "warn": _WARN, "fail": _FAIL}[self.status]
                  line = f"{tag} {self.name}"
                  if self.detail:
                      line += f" -- {self.detail}"
                  print(line)
                  if self.fix and self.status != "ok":
                      for fl in self.fix.splitlines():
                          print(f"         -> {fl}")''',
              '''    def render(self) -> None:
                  tag = {"ok": _OK, "warn": _WARN, "fail": _FAIL}[self.status]
                  line = f"{tag} {self.name}"
                  if self.detail:
                      line += f" -- {self.detail}"
                  print(line)
                  if self.fix and self.status != "ok":
                      for fl in self.fix.splitlines():
                          print(f"         -> {fl}")

              def to_dict(self) -> dict:
                  return {
                      "name": self.name,
                      "status": self.status,
                      "detail": self.detail,
                      "fix": self.fix,
                  }''',
          )
          replace_once(
              'scripts/rig_preflight.py',
              '''    ap.add_argument("--base-url",
                              default=os.environ.get("MODELRIG_BASE_URL", "http://127.0.0.1:8080"),
                              help="backend base URL (default: env MODELRIG_BASE_URL or "
                                   "http://127.0.0.1:8080)")
              args = ap.parse_args(argv)''',
              '''    ap.add_argument("--base-url",
                              default=os.environ.get("MODELRIG_BASE_URL", "http://127.0.0.1:8080"),
                              help="backend base URL (default: env MODELRIG_BASE_URL or "
                                   "http://127.0.0.1:8080)")
              ap.add_argument(
                  "--report",
                  type=Path,
                  help="optional atomic JSON report for the physical campaign",
              )
              args = ap.parse_args(argv)''',
          )
          replace_once(
              'scripts/rig_preflight.py',
              '''    # A report already present and accepted means validation has run and passed.
              already_valid = rig.get("eligible_for_developer_preview") is True

              if fails:''',
              '''    # A report already present and accepted means validation has run and passed.
              already_valid = rig.get("eligible_for_developer_preview") is True
              ready = not fails
              if args.report is not None:
                  report = {
                      "schema": PREFLIGHT_SCHEMA,
                      "generated_at": datetime.now(timezone.utc).isoformat(),
                      "candidate": _candidate_identity(),
                      "backend": {"base_url": args.base_url},
                      "ready": ready,
                      "already_validated": already_valid,
                      "summary": {
                          "checks": len(checks),
                          "ok": sum(c.status == "ok" for c in checks),
                          "warnings": len(warns),
                          "failures": len(fails),
                      },
                      "checks": [c.to_dict() for c in checks],
                  }
                  _write_json_atomic(args.report, report)
                  print(f"  report: {args.report}")

              if fails:''',
          )
          Path('.github/workflows/patch-rig-preflight-report-pr.yml').unlink()
          PY
      - name: Validate preflight patch
        shell: bash
        run: |
          python -m py_compile scripts/rig_preflight.py scripts/physical_validation_campaign.py
          git diff --check
          test ! -e .github/workflows/patch-rig-preflight-report-pr.yml
      - name: Commit preflight evidence contract
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(eval): emit candidate-bound rig preflight evidence"
          git push origin HEAD:eval/physical-validation-campaign

from typing import Any

from .core import AgentRun, RunState, StepState

SCHEMA = "kaliv-agent3-termination/v1"
_TERMINAL_RUNS = {RunState.COMPLETED, RunState.FAILED, RunState.CANCELLED}


def termination_view(run: AgentRun) -> dict[str, Any]:
    """Server-authored truth about what a stop request can affect.

    Agent 3's executor is synchronous and exposes no per-call handle today.
    Therefore a run can always stop future PLAN steps, but an executing tool is
    never presented as directly interruptible. A future runtime may set
    handle_present only after it owns a concrete, tested handle with bounded
    cleanup; this contract deliberately has no optimistic fallback.
    """

    active = run.steps[run.current_step] if run.current_step < len(run.steps) else None
    executing = active is not None and active.state == StepState.EXECUTING
    completed_after_cancel = (
        active is not None and active.state == StepState.COMPLETED_AFTER_CANCEL
    )
    plan_can_request = run.state not in _TERMINAL_RUNS

    if active is None:
        active_tool = None
    else:
        if completed_after_cancel:
            request_state = "terminal"
            reason = "tool_completed_after_plan_cancel"
        elif not executing:
            request_state = "not_active"
            reason = "tool_is_not_executing"
        elif active.cancellation.value == "none":
            request_state = "unavailable"
            reason = "synchronous_tool_has_no_cancellation_handle"
        else:
            request_state = "unavailable"
            reason = "declared_semantics_but_runtime_handle_not_bound"
        active_tool = {
            "step_id": active.id,
            "tool": active.tool,
            "state": active.state.value,
            "semantics": active.cancellation.value,
            "handle_present": False,
            "can_request": False,
            "request_state": request_state,
            "reason": reason,
        }

    return {
        "schema": SCHEMA,
        "plan": {
            "state": "available" if plan_can_request else "terminal",
            "can_request": plan_can_request,
            "request_scope": "plan",
            "effect": (
                "prevent_future_steps_active_tool_continues"
                if executing
                else "prevent_future_steps"
            ),
            "reason": (
                "run_is_terminal" if not plan_can_request else "plan_stop_is_available"
            ),
        },
        "model_stream": {
            "state": "not_active",
            "active": False,
            "can_request": False,
            "handle_present": False,
            "reason": "agent3_run_has_no_model_stream_handle",
        },
        "active_tool": active_tool,
        "production_activation": False,
    }
''', encoding="utf-8")

          Path("tests/worker_agent3_cancellation_contract.py").write_text('''from __future__ import annotations

import json
import os
import tempfile

_tmp = tempfile.mkdtemp(prefix="kaliv-cancel-contract-")
os.environ.setdefault("KALIV_AUDIT_DB", os.path.join(_tmp, "audit.db"))
os.environ.setdefault("KALIV_TOOLS_STATE", os.path.join(_tmp, "tools.json"))
os.environ.setdefault("KALIV_JOBS_DB", os.path.join(_tmp, "jobs.db"))
os.environ.setdefault("KALIV_TOOLS_DIR", _tmp)

from app import tools
from app.agent3.cancellation_status import SCHEMA, termination_view
from app.agent3.core import (
    Agent3Orchestrator,
    AgentRun,
    AgentRunStore,
    AgentStep,
    CancellationSemantics,
    RiskClass,
    RouteKind,
    RoutePlan,
    RunState,
    Sensitivity,
    StepState,
    TurnRequest,
)
from app.agent3.integration import Agent3PlanError, PlannedToolCall, V2ToolAdapter


def route() -> RoutePlan:
    return RoutePlan(RouteKind.RIG_TOOLS_LOCAL, "test", False, True, True, False)


def run_with(step: AgentStep, state: RunState = RunState.RUNNING) -> AgentRun:
    return AgentRun(
        request=TurnRequest("test", tools=True),
        route=route(),
        steps=[step],
        state=state,
    )


def test_registry_semantics_are_stamped_on_the_immutable_step() -> None:
    class Gate:
        enabled = True
        state_error = None
        def is_enabled(self, _name): return True

    class Module:
        GATE = Gate()
        REGISTRY = tools.REGISTRY

    adapter = V2ToolAdapter(Module())
    pull = adapter.build_steps([PlannedToolCall("pull_model", {"name": "qwen3:8b"})], route(), None)[0]
    note = adapter.build_steps([PlannedToolCall("note_append", {"text": "x"})], route(), None)[0]
    assert pull.cancellation == CancellationSemantics.COOPERATIVE
    assert note.cancellation == CancellationSemantics.NONE

    raw = run_with(pull).to_json()
    restored = AgentRun.from_json(raw)
    assert restored.steps[0].cancellation == CancellationSemantics.COOPERATIVE
    assert restored.steps[0].cloned_for_retry().cancellation == CancellationSemantics.COOPERATIVE


def test_unknown_registry_semantics_fail_closed() -> None:
    original = tools.REGISTRY["rig_status"]
    class Odd:
        name = "rig_status"
        description = original.description
        params = original.params
        risk = original.risk
        impact = original.impact
        sensitivity = original.sensitivity
        idempotent = original.idempotent
        cancellation = "magic"
        def human_summary(self, args): return "test"

    class Gate:
        enabled = True
        state_error = None
        def is_enabled(self, _name): return True
    class Module:
        GATE = Gate()
        REGISTRY = {"rig_status": Odd()}

    try:
        V2ToolAdapter(Module()).build_steps([PlannedToolCall("rig_status", {})], route(), None)
    except Agent3PlanError as exc:
        assert "cancellation-klasse" in str(exc)
    else:
        raise AssertionError("unknown cancellation semantics must fail closed")


def test_confirmation_digest_binds_cancellation_semantics() -> None:
    store = AgentRunStore(":memory:")
    orch = Agent3Orchestrator(store, executor=lambda _step: "ok")
    none = AgentStep("rig_status", {}, RiskClass.READ, cancellation=CancellationSemantics.NONE)
    cooperative = AgentStep(
        "rig_status", {}, RiskClass.READ,
        cancellation=CancellationSemantics.COOPERATIVE,
        id=none.id,
    )
    assert orch._digest(none) != orch._digest(cooperative)


def test_executing_tool_has_truthful_plan_only_stop() -> None:
    step = AgentStep(
        "note_append", {"text": "x"}, RiskClass.WRITE,
        sensitivity=Sensitivity.PRIVATE,
        state=StepState.EXECUTING,
        cancellation=CancellationSemantics.NONE,
    )
    view = termination_view(run_with(step))
    assert view["schema"] == SCHEMA
    assert view["production_activation"] is False
    assert view["plan"]["can_request"] is True
    assert view["plan"]["effect"] == "prevent_future_steps_active_tool_continues"
    assert view["model_stream"]["can_request"] is False
    assert view["active_tool"]["can_request"] is False
    assert view["active_tool"]["handle_present"] is False
    assert view["active_tool"]["reason"] == "synchronous_tool_has_no_cancellation_handle"


def test_declared_cooperative_without_handle_still_has_no_button() -> None:
    step = AgentStep(
        "pull_model", {"name": "qwen3:8b"}, RiskClass.ADMIN,
        state=StepState.EXECUTING,
        cancellation=CancellationSemantics.COOPERATIVE,
    )
    active = termination_view(run_with(step))["active_tool"]
    assert active["semantics"] == "cooperative"
    assert active["can_request"] is False
    assert active["reason"] == "declared_semantics_but_runtime_handle_not_bound"


def test_cancel_event_records_scope_and_late_completion_truth() -> None:
    with tempfile.TemporaryDirectory() as temp:
        store = AgentRunStore(os.path.join(temp, "runs.db"))
        step = AgentStep(
            "note_append", {"text": "x"}, RiskClass.WRITE,
            state=StepState.EXECUTING,
            cancellation=CancellationSemantics.NONE,
        )
        run = run_with(step)
        store.save(run)
        orch = Agent3Orchestrator(store, executor=lambda _step: "ok")
        cancelled = orch.cancel(run.id)
        assert cancelled.state == RunState.CANCELLED
        event = store.events(run.id)[-1]
        assert event["kind"] == "run_cancelled"
        assert event["payload"]["scope"] == "plan"
        assert event["payload"]["effect"] == "prevent_future_steps_active_tool_continues"
        assert event["payload"]["active_tool_handle_present"] is False

        late = store.load(run.id)
        assert late is not None
        late.steps[0].state = StepState.COMPLETED_AFTER_CANCEL
        view = termination_view(late)
        assert view["plan"]["can_request"] is False
        assert view["active_tool"]["request_state"] == "terminal"
        assert view["active_tool"]["reason"] == "tool_completed_after_plan_cancel"


TESTS = [value for name, value in sorted(globals().items()) if name.startswith("test_")]
if __name__ == "__main__":
    for test in TESTS:
        test()
    print(f"agent3 cancellation contract: {len(TESTS)} passed")
''', encoding="utf-8")

          Path("AGENT3_CANCELLATION_CONTRACT.md").write_text('''# Agent 3 cancellation contract (T-023 dormant slice)

**Status:** server-authoritative semantics and truthful plan-stop receipt; no active-tool runtime handle is enabled.

## Three different things

A user-visible stop must say what it can affect:

1. **Plan:** prevents future Agent 3 steps. This is what the existing cancel endpoint does.
2. **Model stream:** requires a live model-stream handle. Agent 3 tool runs do not expose one today.
3. **Active tool:** requires a concrete per-execution handle and bounded cleanup. The synchronous executor exposes none today.

The API returns `kaliv-agent3-termination/v1` with separate `plan`, `model_stream` and `active_tool` scopes. A plan stop remains available for non-terminal runs, but an executing synchronous tool is explicitly reported as continuing. No active-tool stop control may be rendered unless `handle_present=true` and `can_request=true`.

## Immutable step semantics

Each Agent 3 step snapshots the registry's cancellation declaration:

- `none`: synchronous work cannot be interrupted;
- `cooperative`: the tool family knows how to observe a cancellation request;
- `runtime`: an external runtime can terminate the work.

Registry `forceable` maps to API `runtime`. Unknown values fail the plan. The snapshot survives persistence/retry and is included in the immutable confirmation digest.

A declaration is **not** a handle. `pull_model` declares cooperative cancellation for its background JobStore job, but the Agent 3 executor does not bind that job handle to the active step. Consequently the current receipt truthfully reports `can_request=false` for the active tool.

## Late completion

Stopping a plan while a non-interruptible tool executes records:

- terminal run state `cancelled`;
- a `run_cancelled` event with scope, active step/tool, semantics and `active_tool_handle_present=false`;
- `completed_after_cancel` if the tool later finishes;
- the actual result, so the UI cannot hide a side effect that happened.

## Deliberate limits

This slice does not activate Agent 3 routing, add a killable process runtime, stop model streams, or claim physical coverage. Android/desktop controls and device evidence remain part of T-023 before promotion.
''', encoding="utf-8")


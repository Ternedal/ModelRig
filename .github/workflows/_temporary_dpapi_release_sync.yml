name: temporary-dpapi-release-sync

on:
  push:
    branches:
      - agent/desktop-dpapi-credentials

permissions:
  contents: write

jobs:
  sync-release-version:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: agent/desktop-dpapi-credentials
      - name: Sync release version and generated state
        run: |
          python3 scripts/version_tool.py set 1.58.97
          python3 scripts/current_state.py
          python3 scripts/activation_readiness.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION worker/app/main.py backend/internal/config/config.go \
            android/app/build.gradle.kts desktop/composeApp/build.gradle.kts \
            CURRENT_STATE.md ACTIVATION_READINESS.md
          if ! git diff --cached --quiet; then
            git commit -m "chore(release): bump ModelRig to 1.58.97"
            git push origin HEAD:agent/desktop-dpapi-credentials
          fi

name: agent3-full-diagnostics

on:
  pull_request:

permissions:
  contents: write

jobs:
  full-test-log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.23"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install worker deps
        run: pip install -r worker/requirements.txt --break-system-packages

      - name: Apply protected MemoryStore stage
        run: python3 scripts/t033_stage3_store.py

      - name: Remove transport and restore ordinary workflow
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin 7ebecbd0f62818218ddd25385379f5c38b6413ca
          git show 7ebecbd0f62818218ddd25385379f5c38b6413ca:.github/workflows/agent3-full-diagnostics.yml > .github/workflows/agent3-full-diagnostics.yml
          rm -f scripts/t033_stage3_store.py

      - name: Regenerate authoritative current state
        run: python3 scripts/current_state.py

      - name: Focused protected-memory contracts
        env:
          PYTHONPATH: worker
        shell: bash
        run: |
          set -euo pipefail
          python3 tests/worker_agent3_memory_protection.py
          python3 tests/worker_agent3_memory_dpapi.py
          python3 tests/worker_agent3_memory_storage_protection.py
          python3 tests/worker_agent3_memory.py
          python3 tests/worker_agent3_memory_api.py
          python3 tests/worker_agent3_memory_context.py
          python3 tests/worker_agent3_planner_memory.py

      - name: Build backend
        run: cd backend && go build -o /tmp/modelrig-server ./cmd/modelrig-server

      - name: Full repository test log
        env:
          MODELRIG_BIN: /tmp/modelrig-server
        shell: bash
        run: |
          set -o pipefail
          : > /tmp/modelrig-full-test.log
          status=0
          for f in tests/backend_*.py tests/e2e.py tests/worker_*.py tests/workflow_*.py; do
            [ -e "$f" ] || continue
            echo "::group::$f"
            echo "===== $f =====" | tee -a /tmp/modelrig-full-test.log
            PYTHONPATH=worker python3 "$f" 2>&1 | tee -a /tmp/modelrig-full-test.log || {
              status=${PIPESTATUS[0]}
              echo "FAILED: $f (exit $status)" | tee -a /tmp/modelrig-full-test.log
              echo "::endgroup::"
              break
            }
            echo "::endgroup::"
          done
          exit "$status"

      - name: Verify isolated stage scope
        shell: bash
        run: |
          set -euo pipefail
          test ! -e scripts/t033_stage3_store.py
          git diff --check
          allowed='^(\.github/workflows/ci\.yml|CURRENT_STATE\.md|worker/app/agent3/memory\.py|worker/app/agent3/memory_protection\.py|worker/app/agent3/memory_dpapi\.py|tests/support_memory_protector\.py|tests/worker_agent3_memory_protection\.py|tests/worker_agent3_memory_dpapi\.py|tests/worker_agent3_memory_storage_protection\.py|tests/worker_agent3_memory\.py|tests/worker_agent3_memory_context\.py|tests/worker_agent3_memory_api\.py|tests/worker_agent3_planner_memory\.py)$'
          unexpected=$(git diff --name-only 7ebecbd0f62818218ddd25385379f5c38b6413ca | grep -Ev "$allowed" || true)
          if [ -n "$unexpected" ]; then
            echo "Unexpected T-033 paths:"
            echo "$unexpected"
            exit 1
          fi

      - name: Commit proven protected MemoryStore
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat(memory): protect sensitive records at rest"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: t033-memory-store-stage
          path: /tmp/modelrig-full-test.log
          if-no-files-found: warn
          retention-days: 1

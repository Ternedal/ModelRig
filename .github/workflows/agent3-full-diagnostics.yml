name: agent3-full-diagnostics

on:
  pull_request:

permissions:
  contents: write

jobs:
  full-test-log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.23"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install worker deps
        run: pip install -r worker/requirements.txt --break-system-packages

      - name: Apply T-019 operator resume fixes only
        run: python3 scripts/t019_stage2_operator_fix.py

      - name: Remove transport and restore ordinary workflow
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin 7ebecbd0f62818218ddd25385379f5c38b6413ca
          git show 7ebecbd0f62818218ddd25385379f5c38b6413ca:.github/workflows/agent3-full-diagnostics.yml > .github/workflows/agent3-full-diagnostics.yml
          rm -f scripts/t019_stage2_operator_fix.py

      - name: Regenerate authoritative current state
        run: python3 scripts/current_state.py

      - name: Focused pilot operator contracts
        env:
          PYTHONPATH: worker
        run: |
          python3 tests/worker_scheduler_pilot_barrier.py
          python3 tests/workflow_scheduler_pilot_operator.py

      - name: Build backend
        run: cd backend && go build -o /tmp/modelrig-server ./cmd/modelrig-server

      - name: Full repository test log
        env:
          MODELRIG_BIN: /tmp/modelrig-server
        shell: bash
        run: |
          set -o pipefail
          : > /tmp/modelrig-full-test.log
          status=0
          for f in tests/backend_*.py tests/e2e.py tests/worker_*.py tests/workflow_*.py; do
            [ -e "$f" ] || continue
            echo "::group::$f"
            PYTHONPATH=worker python3 "$f" 2>&1 | tee -a /tmp/modelrig-full-test.log || {
              status=${PIPESTATUS[0]}
              echo "FAILED: $f (exit $status)" | tee -a /tmp/modelrig-full-test.log
              echo "::endgroup::"
              break
            }
            echo "::endgroup::"
          done
          exit "$status"

      - name: Verify isolated stage scope
        shell: bash
        run: |
          set -euo pipefail
          test ! -e scripts/t019_stage2_operator_fix.py
          git diff --check
          allowed='^(\.gitignore|CURRENT_STATE\.md|worker/app/schedule_runner\.py|worker/app/scheduler_pilot_barrier\.py|scripts/scheduler_pilot_operator\.py|tests/worker_scheduler_pilot_barrier\.py|tests/workflow_scheduler_pilot_operator\.py)$'
          unexpected=$(git diff --name-only 7ebecbd0f62818218ddd25385379f5c38b6413ca | grep -Ev "$allowed" || true)
          if [ -n "$unexpected" ]; then
            echo "Unexpected T-019 operator paths:"
            echo "$unexpected"
            exit 1
          fi

      - name: Commit proven T-019 operator layer
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat(validation): add resumable scheduler pilot operator"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: t019-stage2-operator-diagnostics
          path: /tmp/modelrig-full-test.log
          if-no-files-found: warn
          retention-days: 1

name: agent3-full-diagnostics

on:
  pull_request:

permissions:
  contents: write

jobs:
  full-test-log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: agent/t032-proof-count-fix
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.23"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install worker deps
        run: pip install -r worker/requirements.txt --break-system-packages

      - name: Apply exact T-032 proof-count correction
        run: |
          python3 scripts/t032_proof_count_fix.py
          python3 scripts/t032_proof_count_test_fix.py

      - name: Remove all transport mechanics before validation
        shell: bash
        run: |
          git fetch --quiet origin agent/t032-integration-candidate
          git checkout origin/agent/t032-integration-candidate -- .github/workflows/agent3-full-diagnostics.yml
          rm -f .github/workflows/t032-proof-count-fix.yml
          rm -f scripts/t032_proof_count_fix.py
          rm -f scripts/t032_proof_count_test_fix.py

      - name: Run focused proof-count contracts
        run: |
          python3 tests/workflow_physical_validation_campaign.py
          python3 tests/workflow_physical_validation_final_gate.py

      - name: Build backend
        run: cd backend && go build -o /tmp/modelrig-server ./cmd/modelrig-server

      - name: Generate authoritative current state
        run: python3 scripts/current_state.py

      - name: Full repository test log on the intended final tree
        env:
          MODELRIG_BIN: /tmp/modelrig-server
        shell: bash
        run: |
          set -o pipefail
          : > /tmp/modelrig-full-test.log
          status=0
          for f in tests/backend_*.py tests/e2e.py tests/worker_*.py tests/workflow_*.py; do
            [ -e "$f" ] || continue
            echo "::group::$f"
            echo "===== $f =====" | tee -a /tmp/modelrig-full-test.log
            PYTHONPATH=worker python3 "$f" 2>&1 | tee -a /tmp/modelrig-full-test.log || {
              status=${PIPESTATUS[0]}
              echo "FAILED: $f (exit $status)" | tee -a /tmp/modelrig-full-test.log
              echo "::endgroup::"
              break
            }
            echo "::endgroup::"
          done
          exit "$status"

      - name: Upload full failed test log
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: agent3-full-test-log
          path: /tmp/modelrig-full-test.log
          if-no-files-found: warn
          retention-days: 7

      - name: Commit the clean verified tree
        shell: bash
        run: |
          git add -A
          python3 - <<'PY'
          import subprocess

          allowed = {
              "CURRENT_STATE.md",
              "PHYSICAL_VALIDATION_CAMPAIGN.md",
              ".github/workflows/agent3-full-diagnostics.yml",
              ".github/workflows/t032-proof-count-fix.yml",
              "scripts/physical_validation_campaign.py",
              "scripts/physical_validation_final_gate.py",
              "scripts/t032_proof_count_fix.py",
              "scripts/t032_proof_count_test_fix.py",
              "tests/workflow_physical_validation_campaign.py",
              "tests/workflow_physical_validation_final_gate.py",
          }
          changed = set(
              subprocess.check_output(
                  ["git", "diff", "--cached", "--name-only"], text=True
              ).splitlines()
          )
          unexpected = sorted(changed - allowed)
          if unexpected:
              raise SystemExit("unexpected staged paths: " + ", ".join(unexpected))
          required = {
              "PHYSICAL_VALIDATION_CAMPAIGN.md",
              "scripts/physical_validation_campaign.py",
              "scripts/physical_validation_final_gate.py",
              "tests/workflow_physical_validation_campaign.py",
              "tests/workflow_physical_validation_final_gate.py",
          }
          missing = sorted(required - changed)
          if missing:
              raise SystemExit("required correction paths missing: " + ", ".join(missing))
          PY
          git diff --cached --check
          git config user.name "ModelRig integration bot"
          git config user.email "actions@users.noreply.github.com"
          git commit -m "docs: align physical validation proof counts"
          git push origin HEAD:agent/t032-proof-count-fix

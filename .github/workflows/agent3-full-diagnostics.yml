name: agent3-full-diagnostics

on:
  pull_request:

permissions:
  contents: write

jobs:
  full-test-log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: agent/t032-staged-physical-promotion
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.23"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install worker deps
        run: pip install -r worker/requirements.txt --break-system-packages

      - name: Apply staged promotion version and docs
        run: python3 scripts/apply_staged_promotion_docs.py

      - name: Remove transport mechanics before validation
        shell: bash
        run: |
          git fetch --quiet origin agent/t032-integration-candidate
          git checkout origin/agent/t032-integration-candidate -- .github/workflows/agent3-full-diagnostics.yml
          rm -f scripts/apply_staged_promotion_docs.py

      - name: Run staged-promotion contracts
        run: |
          python3 tests/workflow_candidate_freeze.py
          python3 tests/workflow_candidate_campaign.py
          python3 tests/workflow_candidate_gate.py
          python3 tests/workflow_staged_promotion_runbook.py

      - name: Build backend
        run: cd backend && go build -o /tmp/modelrig-server ./cmd/modelrig-server

      - name: Regenerate authoritative generated state
        run: |
          python3 scripts/current_state.py
          python3 scripts/activation_readiness.py

      - name: Full repository test log on intended clean tree
        env:
          MODELRIG_BIN: /tmp/modelrig-server
        shell: bash
        run: |
          set -o pipefail
          : > /tmp/modelrig-full-test.log
          status=0
          for f in tests/backend_*.py tests/e2e.py tests/worker_*.py tests/workflow_*.py; do
            [ -e "$f" ] || continue
            echo "::group::$f"
            echo "===== $f =====" | tee -a /tmp/modelrig-full-test.log
            PYTHONPATH=worker python3 "$f" 2>&1 | tee -a /tmp/modelrig-full-test.log || {
              status=${PIPESTATUS[0]}
              echo "FAILED: $f (exit $status)" | tee -a /tmp/modelrig-full-test.log
              echo "::endgroup::"
              break
            }
            echo "::endgroup::"
          done
          exit "$status"

      - name: Upload full failed test log
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: agent3-full-test-log
          path: /tmp/modelrig-full-test.log
          if-no-files-found: warn
          retention-days: 7

      - name: Commit verified staged candidate
        shell: bash
        run: |
          git add -A
          python3 - <<'PY'
          import subprocess
          allowed = {
              ".github/workflows/agent3-full-diagnostics.yml",
              "ACTIVATION_READINESS.md",
              "AGENT3_RIG_VALIDATION.md",
              "CURRENT_STATE.md",
              "DEVICE_TEST.md",
              "PHYSICAL_VALIDATION_CAMPAIGN.md",
              "VERSION",
              "android/app/build.gradle.kts",
              "backend/internal/config/config.go",
              "desktop/composeApp/build.gradle.kts",
              "scripts/apply_staged_promotion_docs.py",
              "worker/app/main.py",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--cached", "--name-only"], text=True
          ).splitlines())
          unexpected = sorted(changed - allowed)
          if unexpected:
              raise SystemExit("unexpected staged paths: " + ", ".join(unexpected))
          required = {
              "ACTIVATION_READINESS.md",
              "AGENT3_RIG_VALIDATION.md",
              "DEVICE_TEST.md",
              "PHYSICAL_VALIDATION_CAMPAIGN.md",
              "VERSION",
              "android/app/build.gradle.kts",
              "backend/internal/config/config.go",
              "desktop/composeApp/build.gradle.kts",
              "worker/app/main.py",
          }
          missing = sorted(required - changed)
          if missing:
              raise SystemExit("required final paths missing: " + ", ".join(missing))
          PY
          git diff --cached --check
          git config user.name "ModelRig integration bot"
          git config user.email "actions@users.noreply.github.com"
          git commit -m "validation: stage physical promotion for 1.58.141"
          git push origin HEAD:agent/t032-staged-physical-promotion

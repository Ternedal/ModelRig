name: agent3-full-diagnostics

on:
  pull_request:

permissions:
  contents: write

jobs:
  full-test-log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.23"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4

      - name: Install platform and worker deps
        shell: bash
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"
          pip install -r worker/requirements.txt --break-system-packages

      - name: Apply Android time UI patch only
        shell: bash
        run: |
          set -o pipefail
          python3 scripts/t017_stage4b_android_ui.py 2>&1 | tee /tmp/t017-stage4b.log

      - name: Remove transport and restore ordinary workflow
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin 054d311fc8858c1ae4a5d6c041084c7991cb092e
          git show 054d311fc8858c1ae4a5d6c041084c7991cb092e:.github/workflows/agent3-full-diagnostics.yml > .github/workflows/agent3-full-diagnostics.yml
          rm -f scripts/t017_stage4b_android_ui.py

      - name: Regenerate authoritative current state
        run: python3 scripts/current_state.py

      - name: Android UI compile and tests
        working-directory: android
        shell: bash
        run: |
          echo "sdk.dir=${ANDROID_HOME:-$ANDROID_SDK_ROOT}" > local.properties
          ./gradlew :app:compileDebugKotlin :app:testDebugUnitTest --no-daemon --console=plain

      - name: Build backend
        run: cd backend && go build -o /tmp/modelrig-server ./cmd/modelrig-server

      - name: Full repository test log
        env:
          MODELRIG_BIN: /tmp/modelrig-server
        shell: bash
        run: |
          set -o pipefail
          : > /tmp/modelrig-full-test.log
          status=0
          for f in tests/backend_*.py tests/e2e.py tests/worker_*.py tests/workflow_*.py; do
            [ -e "$f" ] || continue
            echo "::group::$f"
            echo "===== $f =====" | tee -a /tmp/modelrig-full-test.log
            PYTHONPATH=worker python3 "$f" 2>&1 | tee -a /tmp/modelrig-full-test.log || {
              status=${PIPESTATUS[0]}
              echo "FAILED: $f (exit $status)" | tee -a /tmp/modelrig-full-test.log
              echo "::endgroup::"
              break
            }
            echo "::endgroup::"
          done
          exit "$status"

      - name: Verify isolated stage scope
        shell: bash
        run: |
          set -euo pipefail
          test ! -e scripts/t017_stage4b_android_ui.py
          git diff --check
          allowed='^(CURRENT_STATE\.md|worker/requirements\.txt|worker/app/scheduler\.py|worker/app/scheduler_time\.py|worker/app/schedule_admin\.py|worker/app/schedule_api\.py|worker/app/schedule_approval\.py|backend/internal/httpapi/schedule_approvals\.go|backend/internal/httpapi/schedule_approval_time_test\.go|backend/internal/httpapi/schedule_approval_http_time_test\.go|backend/internal/httpapi/schedule_renewal_time_test\.go|backend/internal/httpapi/schedules_test\.go|android/app/src/main/java/dk/ternedal/modelrig/net/ScheduleClient\.kt|android/app/src/main/java/dk/ternedal/modelrig/ui/ScheduleScreen\.kt|android/app/src/test/java/dk/ternedal/modelrig/net/ScheduleClientTest\.kt|android/app/src/test/java/dk/ternedal/modelrig/net/ScheduleTimeContractTest\.kt|android/app/src/test/java/dk/ternedal/modelrig/ui/ScheduleTimeDisplayTest\.kt|tests/worker_schedule_admin_persistence_time\.py|tests/worker_schedule_admin_preview_time\.py|tests/worker_schedule_api_time\.py|tests/worker_schedule_approval_time\.py|tests/worker_schedule_approval\.py|tests/worker_schedule_api\.py|tests/worker_scheduler\.py|tests/worker_scheduler_time\.py|tests/worker_scheduler_time_store\.py)$'
          unexpected=$(git diff --name-only 7ebecbd0f62818218ddd25385379f5c38b6413ca | grep -Ev "$allowed" || true)
          if [ -n "$unexpected" ]; then
            echo "Unexpected stage-4B paths:"
            echo "$unexpected"
            exit 1
          fi

      - name: Commit proven Android time UI layer
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat(scheduler): show authoritative time terms in Android"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: t017-stage4b-diagnostics
          path: |
            /tmp/t017-stage4b.log
            /tmp/modelrig-full-test.log
          if-no-files-found: warn
          retention-days: 1

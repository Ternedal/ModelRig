name: agent3-full-diagnostics

on:
  pull_request:

permissions:
  contents: write

jobs:
  full-test-log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.23"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install worker deps
        run: pip install -r worker/requirements.txt --break-system-packages

      - name: Extract validated T-019 operator payload
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import hashlib
          import io
          import tarfile
          from pathlib import Path

          payload_path = Path("scripts/t019_wizard_payload.b64")
          raw = base64.b64decode(payload_path.read_text(encoding="ascii"), validate=True)
          digest = hashlib.sha256(raw).hexdigest()
          expected = "59820e7930ebb9a781f0c3239bb1fb19140f7dfdb7d498ce78617c0ab8149575"
          if digest != expected:
              raise SystemExit(f"payload digest mismatch: {digest}")

          allowed = {
              "START_SCHEDULER_PILOT.cmd",
              "scripts/scheduler_pilot_wizard.py",
              "tests/workflow_scheduler_pilot_wizard.py",
          }
          with tarfile.open(fileobj=io.BytesIO(raw), mode="r:gz") as archive:
              members = archive.getmembers()
              names = {member.name for member in members}
              if names != allowed:
                  raise SystemExit(f"unexpected payload members: {sorted(names ^ allowed)}")
              for member in members:
                  path = Path(member.name)
                  if not member.isfile() or path.is_absolute() or ".." in path.parts:
                      raise SystemExit(f"unsafe payload member: {member.name}")
              archive.extractall(".", filter="data")

          ignore = Path(".gitignore")
          text = ignore.read_text(encoding="utf-8")
          anchor = "/validation/stage-a-easy-state.json\n/validation/stage-a-runtime/\n/validation/archive/\n"
          replacement = (
              "/validation/stage-a-easy-state.json\n"
              "/validation/stage-a-runtime/\n"
              "/validation/archive/\n"
              "/validation/scheduler-pilot-easy-state.json\n"
              "/validation/scheduler-pilot-easy-state.json.tmp\n"
              "/validation/scheduler-pilot-worker.log\n"
          )
          if text.count(anchor) != 1:
              raise SystemExit(".gitignore anchor mismatch")
          ignore.write_text(text.replace(anchor, replacement, 1), encoding="utf-8")
          PY

      - name: Remove transport and restore ordinary diagnostics workflow
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin 18ab9fce3d3e9a0173f5573aa226b9e36f116e17
          git show 18ab9fce3d3e9a0173f5573aa226b9e36f116e17:.github/workflows/agent3-full-diagnostics.yml > .github/workflows/agent3-full-diagnostics.yml
          rm -f scripts/t019_wizard_payload.b64

      - name: Generate authoritative current state
        run: python3 scripts/current_state.py

      - name: Focused T-019 wizard contract
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python3 tests/workflow_scheduler_pilot_wizard.py

      - name: Build backend
        run: cd backend && go build -o /tmp/modelrig-server ./cmd/modelrig-server

      - name: Full repository test log
        env:
          MODELRIG_BIN: /tmp/modelrig-server
        shell: bash
        run: |
          set -o pipefail
          : > /tmp/modelrig-full-test.log
          status=0
          for f in tests/backend_*.py tests/e2e.py tests/worker_*.py tests/workflow_*.py; do
            [ -e "$f" ] || continue
            echo "::group::$f"
            echo "===== $f =====" | tee -a /tmp/modelrig-full-test.log
            PYTHONPATH=worker python3 "$f" 2>&1 | tee -a /tmp/modelrig-full-test.log || {
              status=${PIPESTATUS[0]}
              echo "FAILED: $f (exit $status)" | tee -a /tmp/modelrig-full-test.log
              echo "::endgroup::"
              break
            }
            echo "::endgroup::"
          done
          exit "$status"

      - name: Verify isolated final scope
        shell: bash
        run: |
          set -euo pipefail
          test ! -e scripts/t019_wizard_payload.b64
          git diff --check
          allowed='^(\.gitignore|CURRENT_STATE\.md|START_SCHEDULER_PILOT\.cmd|scripts/scheduler_pilot_wizard\.py|tests/workflow_scheduler_pilot_wizard\.py)$'
          unexpected=$(git diff --name-only 18ab9fce3d3e9a0173f5573aa226b9e36f116e17 | grep -Ev "$allowed" || true)
          if [ -n "$unexpected" ]; then
            echo "Unexpected T-019 paths:"
            echo "$unexpected"
            exit 1
          fi

      - name: Commit proven T-019 wizard
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "validation: add one-click scheduler pilot wizard"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: t019-wizard-diagnostics
          path: /tmp/modelrig-full-test.log
          if-no-files-found: warn
          retention-days: 1

name: run-agent3-plan-authority-builder

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  run-builder:
    if: github.head_ref == 'agent/agent3-plan-authority-builder-1-58-78'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: agent/agent3-plan-authority-builder-1-58-78
          fetch-depth: 8
      - name: Preserve reviewed patch program
        run: cp .github/workflows/one-shot-agent3-plan-authority.yml /tmp/agent3-builder.yml
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: 'stable'
      - name: Checkout exact main and extract patch script
        run: |
          set -euo pipefail
          git checkout --detach 7ef5444213a360d3342bc21d576eeff61211b10d
          test "$(git rev-parse HEAD)" = "7ef5444213a360d3342bc21d576eeff61211b10d"
          test "$(cat VERSION)" = "1.58.77"
          python3 - <<'EXTRACT'
          from pathlib import Path

          source = Path('/tmp/agent3-builder.yml').read_text(encoding='utf-8')
          marker = "          python3 - <<'PY'\n"
          start = source.index(marker) + len(marker)
          end = source.index("\n          PY\n", start)
          lines = source[start:end].splitlines()
          program = "\n".join(line[10:] if line.startswith("          ") else line for line in lines) + "\n"

          android_anchor = '''    fun events(runId: String): List<Event> {
                  val arr = get("/api/v1/experimental/agent3/runs/$runId/events")
                      .optJSONArray("events") ?: JSONArray()
                  return buildList {
                      for (i in 0 until arr.length()) {
                          val e = arr.optJSONObject(i) ?: continue
                          add(Event(e.optDouble("ts"), e.optString("kind"), e.opt("payload")?.toString().orEmpty()))
                      }
                  }
              }

          '''
          android_retry = '''    fun retry(runId: String, cloudReady: Boolean = false): Run {
                  val payload = JSONObject().put("cloud_ready", cloudReady)
                  val root = post("/api/v1/experimental/agent3/runs/$runId/retry", payload)
                  return parseRun(root.requireObject("run"))
              }

          '''
          android_start = program.index("android_anchor = '''")
          android_end = program.index("replace_once(\n    'android/app/src/main/java/dk/ternedal/modelrig/net/Agent3Client.kt'", android_start)
          android_source = (
              f"android_anchor = {android_anchor!r}\n"
              f"android_retry = android_anchor + {android_retry!r}\n"
          )
          program = program[:android_start] + android_source + program[android_end:]

          desktop_path = 'desktop/composeApp/src/main/kotlin/dk/ternedal/modelrig/desktop/net/Agent3Client.kt'
          desktop_models_old = '''@Serializable
          private data class ConfirmRequest(
              @SerialName("step_id") val stepId: String,
              val decision: String,
              val digest: String,
          )
          '''
          desktop_models_new = '''@Serializable
          private data class ConfirmRequest(
              @SerialName("step_id") val stepId: String,
              val decision: String,
              val digest: String,
          )

          @Serializable
          private data class RetryRequest(
              @SerialName("cloud_ready") val cloudReady: Boolean = false,
          )
          '''
          desktop_events_old = '''    fun events(runId: String): List<Agent3Event> =
                  decode<EventsEnvelope>(get("/api/v1/experimental/agent3/runs/$runId/events")).events

          '''
          desktop_events_new = '''    fun events(runId: String): List<Agent3Event> =
                  decode<EventsEnvelope>(get("/api/v1/experimental/agent3/runs/$runId/events")).events

              fun retry(runId: String, cloudReady: Boolean = false): Agent3Run =
                  decode<Agent3RunEnvelope>(
                      post(
                          "/api/v1/experimental/agent3/runs/$runId/retry",
                          json.encodeToString(RetryRequest(cloudReady)),
                      )
                  ).run

          '''
          desktop_start = program.index("replace_once(\n    'desktop/composeApp/src/main/kotlin/dk/ternedal/modelrig/desktop/net/Agent3Client.kt'", android_end)
          desktop_end = program.index("# --- test-only explicit route opt-in", desktop_start)
          desktop_source = (
              f"replace_once({desktop_path!r}, {desktop_models_old!r}, {desktop_models_new!r})\n"
              f"replace_once({desktop_path!r}, {desktop_events_old!r}, {desktop_events_new!r})\n\n"
          )
          program = program[:desktop_start] + desktop_source + program[desktop_end:]

          Path('/tmp/agent3-authority-patch.py').write_text(program, encoding='utf-8')
          compile(program, '/tmp/agent3-authority-patch.py', 'exec')
          EXTRACT
      - name: Install patch and worker dependencies
        run: pip install -r worker/requirements.txt libcst --break-system-packages
      - name: Normalize the one legacy Go handler anchor
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('backend/internal/httpapi/agent3.go')
          text = path.read_text(encoding='utf-8')
          old = (
              'func (s *server) handleAgent3RunsStart(w http.ResponseWriter, r *http.Request) {\n'
              '\t// A run may execute several read steps or wait on a model-backed adapter in a\n'
              '\t// later phase, so use the long-lived worker proxy just like /tools/chat.\n'
              '\ts.WorkerSlow.Forward(w, r, agent3Target(r, "/experimental/agent3/runs"))\n'
              '}\n\n'
          )
          normalized = old.replace('\t', '    ')
          if text.count(old) != 1:
              raise SystemExit(f'legacy Go handler anchor drifted: {text.count(old)} matches')
          path.write_text(text.replace(old, normalized, 1), encoding='utf-8')
          PY
      - name: Apply reviewed patch program
        id: patch
        shell: bash
        run: |
          set +e
          python3 /tmp/agent3-authority-patch.py > agent3-patch.log 2>&1
          rc=$?
          cat agent3-patch.log
          echo "status=$rc" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: agent3-plan-authority-patch-log
          path: agent3-patch.log
          if-no-files-found: error
          retention-days: 3
      - name: Fail when patch program failed
        if: steps.patch.outputs.status != '0'
        run: exit 1
      - name: Set version and regenerate truth
        run: |
          set -euo pipefail
          gofmt -w backend/internal/httpapi/agent3.go backend/internal/httpapi/server.go backend/internal/httpapi/agent3_test.go
          python3 scripts/version_tool.py set 1.58.78
          python3 scripts/current_state.py
          python3 scripts/activation_readiness.py
          python3 scripts/version_tool.py check
          python3 scripts/current_state.py --check
          python3 scripts/activation_readiness.py --check
          git diff --check -- . ':(exclude)ACTIVATION_READINESS.md'
      - name: Run focused authority gates
        run: |
          set -euo pipefail
          PYTHONPATH=worker python3 tests/worker_agent3_plan_authority_api.py
          PYTHONPATH=worker python3 tests/worker_agent3_retry.py
          PYTHONPATH=worker python3 tests/workflow_activation_readiness.py
          (cd backend && go test ./internal/httpapi)
      - name: Push one clean product commit
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          test -n "$(git status --porcelain)"
          git commit -m 'fix(agent3): require server-authored run plans'
          clean_sha=$(git rev-parse HEAD)
          git push --force origin HEAD:refs/heads/agent/agent3-plan-authority-1-58-78
          printf 'commit=%s\nbase=%s\nversion=1.58.78\n' "$clean_sha" '7ef5444213a360d3342bc21d576eeff61211b10d' > agent3-plan-authority-result.txt
          git diff --stat 7ef5444213a360d3342bc21d576eeff61211b10d..HEAD >> agent3-plan-authority-result.txt
          cat agent3-plan-authority-result.txt
      - name: Upload clean commit identity
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: agent3-plan-authority-result
          path: agent3-plan-authority-result.txt
          if-no-files-found: error
          retention-days: 3

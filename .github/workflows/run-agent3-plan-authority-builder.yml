name: run-agent3-plan-authority-builder

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  run-builder:
    if: github.head_ref == 'agent/agent3-plan-authority-builder-1-58-78'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: agent/agent3-plan-authority-builder-1-58-78
          fetch-depth: 8
      - name: Preserve reviewed builder inputs
        run: |
          cp .github/workflows/one-shot-agent3-plan-authority.yml /tmp/agent3-builder.yml
          cp .github/agent3_authority_extract.py /tmp/agent3-authority-extract.py
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: 'stable'
      - name: Checkout exact current main
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin 9ee88fdd55082ef582920a31130546818890c69a
          git checkout --detach FETCH_HEAD
          test "$(git rev-parse HEAD)" = "9ee88fdd55082ef582920a31130546818890c69a"
          test "$(cat VERSION)" = "1.58.78"
      - name: Extract reviewed patch program
        id: extract
        shell: bash
        run: |
          set +e
          python3 /tmp/agent3-authority-extract.py > agent3-extract-console.log 2>&1
          rc=$?
          cat agent3-extract-console.log
          test -f /tmp/agent3-extract.log && cp /tmp/agent3-extract.log agent3-extract.log
          echo "status=$rc" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload extractor diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: agent3-plan-authority-extract-log
          path: |
            agent3-extract-console.log
            agent3-extract.log
          if-no-files-found: error
          retention-days: 3
      - name: Fail when extraction failed
        if: steps.extract.outputs.status != '0'
        run: exit 1
      - name: Retarget release anchor to 1.58.79
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('/tmp/agent3-authority-patch.py')
          text = path.read_text(encoding='utf-8')
          replacements = [
              ("gradle_text.count('versionCode = 208')", "gradle_text.count('versionCode = 209')"),
              ("versionCode 208 anchor drifted", "versionCode 209 anchor drifted"),
              ("replace('versionCode = 208', 'versionCode = 209', 1)", "replace('versionCode = 209', 'versionCode = 210', 1)"),
          ]
          for old, new in replacements:
              if text.count(old) != 1:
                  raise SystemExit(f'release retarget anchor drifted: {old!r} -> {text.count(old)} matches')
              text = text.replace(old, new, 1)
          compile(text, str(path), 'exec')
          path.write_text(text, encoding='utf-8')
          PY
      - name: Install patch and worker dependencies
        run: pip install -r worker/requirements.txt libcst --break-system-packages
      - name: Normalize the one legacy Go handler anchor
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('backend/internal/httpapi/agent3.go')
          text = path.read_text(encoding='utf-8')
          old = (
              'func (s *server) handleAgent3RunsStart(w http.ResponseWriter, r *http.Request) {\n'
              '\t// A run may execute several read steps or wait on a model-backed adapter in a\n'
              '\t// later phase, so use the long-lived worker proxy just like /tools/chat.\n'
              '\ts.WorkerSlow.Forward(w, r, agent3Target(r, "/experimental/agent3/runs"))\n'
              '}\n\n'
          )
          normalized = old.replace('\t', '    ')
          if text.count(old) != 1:
              raise SystemExit(f'legacy Go handler anchor drifted: {text.count(old)} matches')
          path.write_text(text.replace(old, normalized, 1), encoding='utf-8')
          PY
      - name: Apply reviewed patch program
        id: patch
        shell: bash
        run: |
          set +e
          python3 /tmp/agent3-authority-patch.py > agent3-patch.log 2>&1
          rc=$?
          cat agent3-patch.log
          echo "status=$rc" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: agent3-plan-authority-patch-log
          path: agent3-patch.log
          if-no-files-found: error
          retention-days: 3
      - name: Fail when patch program failed
        if: steps.patch.outputs.status != '0'
        run: exit 1
      - name: Set version and regenerate combined truth
        id: combined
        shell: bash
        run: |
          set +e
          : > agent3-combined-truth.log
          status=0
          run_cmd() {
            echo ">>> $*" | tee -a agent3-combined-truth.log
            "$@" >> agent3-combined-truth.log 2>&1
            rc=$?
            echo "<<< rc=$rc" | tee -a agent3-combined-truth.log
            if [ $rc -ne 0 ] && [ $status -eq 0 ]; then status=$rc; fi
          }
          run_cmd gofmt -w backend/internal/httpapi/agent3.go backend/internal/httpapi/server.go backend/internal/httpapi/agent3_test.go
          run_cmd python3 scripts/version_tool.py set 1.58.79
          run_cmd python3 scripts/current_state.py
          run_cmd python3 scripts/activation_readiness.py
          run_cmd python3 scripts/version_tool.py check
          run_cmd python3 scripts/current_state.py --check
          run_cmd python3 scripts/activation_readiness.py --check
          run_cmd git diff --check -- . ':(exclude)ACTIVATION_READINESS.md'
          cat agent3-combined-truth.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload combined truth diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: agent3-plan-authority-combined-truth-log
          path: agent3-combined-truth.log
          if-no-files-found: error
          retention-days: 3
      - name: Fail when combined truth failed
        if: steps.combined.outputs.status != '0'
        run: exit 1
      - name: Run focused authority gates
        id: focused
        shell: bash
        run: |
          set +e
          : > agent3-authority-tests.log
          status=0
          run_cmd() {
            echo ">>> $*" | tee -a agent3-authority-tests.log
            "$@" >> agent3-authority-tests.log 2>&1
            rc=$?
            echo "<<< rc=$rc" | tee -a agent3-authority-tests.log
            if [ $rc -ne 0 ] && [ $status -eq 0 ]; then status=$rc; fi
          }
          run_cmd env PYTHONPATH=worker python3 tests/worker_agent3_plan_authority_api.py
          run_cmd env PYTHONPATH=worker python3 tests/worker_agent3_retry.py
          run_cmd env PYTHONPATH=worker python3 tests/workflow_activation_readiness.py
          run_cmd bash -lc 'cd backend && go test ./internal/httpapi'
          cat agent3-authority-tests.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload focused authority diagnostics
        if: ${{ always() && steps.combined.outputs.status == '0' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: agent3-plan-authority-tests-log
          path: agent3-authority-tests.log
          if-no-files-found: error
          retention-days: 3
      - name: Fail when focused authority gates failed
        if: steps.focused.outputs.status != '0'
        run: exit 1
      - name: Push one clean product commit
        run: |
          set -euo pipefail
          rm -f agent3-authority-tests.log agent3-combined-truth.log agent3-extract-console.log agent3-extract.log agent3-patch.log
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          test -n "$(git status --porcelain)"
          git commit -m 'fix(agent3): require server-authored run plans'
          clean_sha=$(git rev-parse HEAD)
          git push --force origin HEAD:refs/heads/agent/agent3-plan-authority-1-58-79
          printf 'commit=%s\nbase=%s\nversion=1.58.79\n' "$clean_sha" '9ee88fdd55082ef582920a31130546818890c69a' > agent3-plan-authority-result.txt
          git diff --stat 9ee88fdd55082ef582920a31130546818890c69a..HEAD >> agent3-plan-authority-result.txt
          cat agent3-plan-authority-result.txt
      - name: Upload clean commit identity
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: agent3-plan-authority-result
          path: agent3-plan-authority-result.txt
          if-no-files-found: error
          retention-days: 3

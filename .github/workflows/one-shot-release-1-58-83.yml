name: one-shot-release-1-58-83

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  actions: write

jobs:
  release:
    if: github.head_ref == 'ops/release-1-58-83'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: 31788eb968dcadc5dc4e48812e035faa9c7a43c8
          fetch-depth: 1
      - name: Verify target release identity
        run: |
          set -euo pipefail
          test "$(cat VERSION)" = "1.58.83"
          test "$(git rev-parse HEAD)" = "31788eb968dcadc5dc4e48812e035faa9c7a43c8"
          python3 scripts/version_tool.py check
      - name: Create exact tag and draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v1.58.83
          TARGET: 31788eb968dcadc5dc4e48812e035faa9c7a43c8
          NOTES: Adds a fail-closed one-command physical Agent3 validation flow, unifies the report path, binds worker assessment to the exact report SHA-256, and adds PowerShell parsing to shared PR/release tests. Agent3 remains dormant until physical validation succeeds.
        run: |
          set -euo pipefail
          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/$TAG" >/dev/null 2>&1; then
            echo "$TAG already exists; verifying target"
          else
            gh api --method POST "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref="refs/tags/$TAG" \
              -f sha="$TARGET" >/dev/null
          fi
          tag_sha=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/$TAG" --jq '.object.sha')
          test "$tag_sha" = "$TARGET" || { echo "tag target $tag_sha != $TARGET"; exit 1; }

          release_id=$(gh api --paginate "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
            --jq ".[] | select(.tag_name == \"$TAG\") | .id" | head -n1)
          if [ -n "$release_id" ]; then
            gh api --method PATCH "repos/${GITHUB_REPOSITORY}/releases/$release_id" \
              -f tag_name="$TAG" -f target_commitish="$TARGET" -f name="$TAG" \
              -f body="$NOTES" -F draft=true -F prerelease=false >/dev/null
          else
            release_id=$(gh api --method POST "repos/${GITHUB_REPOSITORY}/releases" \
              -f tag_name="$TAG" -f target_commitish="$TARGET" -f name="$TAG" \
              -f body="$NOTES" -F draft=true -F prerelease=false --jq '.id')
          fi
          test -n "$release_id"
          test "$(gh api "repos/${GITHUB_REPOSITORY}/releases/$release_id" --jq '.draft')" = "true"
      - name: Dispatch atomic release workflow on tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/build-and-release.yml/dispatches" \
            -f ref="v1.58.83" -F inputs[force_full_matrix]=true
      - name: Find and follow atomic release workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v1.58.83
          TARGET: 31788eb968dcadc5dc4e48812e035faa9c7a43c8
        run: |
          set -euo pipefail
          run_id=""
          for _ in $(seq 1 90); do
            run_id=$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/build-and-release.yml/runs?event=workflow_dispatch&per_page=50" \
              --jq ".workflow_runs[] | select(.head_branch == \"$TAG\" and .head_sha == \"$TARGET\") | .id" | head -n1)
            [ -n "$run_id" ] && break
            sleep 10
          done
          [ -n "$run_id" ] || { echo "build-and-release run never appeared"; exit 1; }
          echo "release_run_id=$run_id"
          gh run watch "$run_id" --exit-status --interval 15
      - name: Verify published assets and state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v1.58.83
        run: |
          set -euo pipefail
          gh release view "$TAG" --json tagName,isDraft,url,assets > release.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path('release.json').read_text(encoding='utf-8'))
          names = {asset['name'] for asset in data['assets']}
          required = {
              'modelrig-v1.58.83.apk',
              'kaliv-latest.apk',
              'modelrig-v1.58.83.zip',
              'modelrig-server-windows-x64.exe',
              'modelrig-worker-windows-x64.exe',
              'modelrig-supervisor-windows-x64.exe',
              'modelrig-updater-windows-x64.exe',
              'SHA256SUMS.txt',
          }
          missing = sorted(required - names)
          if missing:
              raise SystemExit(f'missing release assets: {missing}; got {sorted(names)}')
          if not any(name.endswith('.jar') for name in names):
              raise SystemExit(f'missing desktop jar; got {sorted(names)}')
          if data['isDraft']:
              raise SystemExit('release is still draft after successful build workflow')
          Path('release-verification.txt').write_text(
              f"tag={data['tagName']}\nurl={data['url']}\nassets={len(names)}\n" +
              "\n".join(sorted(names)) + "\n",
              encoding='utf-8',
          )
          PY
          cat release-verification.txt
      - name: Upload release verification
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-1-58-83-verification
          path: release-verification.txt
          if-no-files-found: error
          retention-days: 7
      - name: Remove temporary release branch
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/ops/release-1-58-83" || true

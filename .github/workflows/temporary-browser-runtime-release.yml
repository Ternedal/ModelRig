name: temporary-browser-runtime-release

on:
  push:
    branches:
      - agent/browser-use-runtime-contract

permissions:
  contents: write

jobs:
  sync-release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - run: python -m pip install -r worker/requirements.txt
      - name: Merge latest main
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin main
          set +e
          git merge --no-commit --no-ff origin/main
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            for path in \
              VERSION \
              worker/app/main.py \
              backend/internal/config/config.go \
              android/app/build.gradle.kts \
              desktop/composeApp/build.gradle.kts \
              CURRENT_STATE.md \
              ACTIVATION_READINESS.md; do
              if git diff --name-only --diff-filter=U | grep -Fxq "$path"; then
                git checkout --theirs -- "$path"
                git add "$path"
              fi
            done
          fi
          unresolved=$(git diff --name-only --diff-filter=U)
          if [ -n "$unresolved" ]; then
            echo "Unexpected merge conflicts:" >&2
            echo "$unresolved" >&2
            exit 1
          fi
          git add -A
          git commit -m 'merge: synchronize latest main before browser runtime release'
      - name: Prepare next release
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import subprocess
          import sys

          version_path = Path('VERSION')
          major, minor, patch = map(int, version_path.read_text(encoding='utf-8').strip().split('.'))
          target = f'{major}.{minor}.{patch + 1}'
          subprocess.run([sys.executable, 'scripts/version_tool.py', 'set', target], check=True)

          android = Path('android/app/build.gradle.kts')
          text = android.read_text(encoding='utf-8')
          match = re.search(r'versionCode = (\d+)', text)
          if not match:
              raise SystemExit('Android versionCode pattern not found')
          next_code = int(match.group(1)) + 1
          text, count = re.subn(r'versionCode = \d+', f'versionCode = {next_code}', text, count=1)
          if count != 1:
              raise SystemExit('Android versionCode pattern not replaced exactly once')
          android.write_text(text, encoding='utf-8')
          print(f'prepared {target} / Android {next_code}')
          PY
          python scripts/current_state.py
          python scripts/activation_readiness.py
      - name: Commit release metadata
        run: |
          git add VERSION worker/app/main.py backend/internal/config/config.go \
            android/app/build.gradle.kts desktop/composeApp/build.gradle.kts \
            CURRENT_STATE.md ACTIVATION_READINESS.md
          git commit -m 'chore(release): prepare Browser Use runtime contract'
          git push

name: apply-browser-use-chromium-fixture

on:
  push:
    branches: [agent/browser-use-chromium-fixture]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: agent/browser-use-chromium-fixture
          fetch-depth: 0
      - name: Apply exact source patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          ROOT = Path.cwd()

          def replace_once(path: str, old: str, new: str) -> None:
              p = ROOT / path
              text = p.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one replacement target, found {count}")
              p.write_text(text.replace(old, new), encoding="utf-8")

          adapter = "worker/app/browser_use_adapter.py"
          replace_once(
              adapter,
              '''        "downloads_path",
                  "auto_download_pdfs",
                  "captcha_solver",
              }''',
              '''        "downloads_path",
                  "accept_downloads",
                  "permissions",
                  "auto_download_pdfs",
                  "captcha_solver",
                  "cross_origin_iframes",
                  "use_cloud",
                  "disable_security",
                  "demo_mode",
                  "record_har_path",
                  "record_video_dir",
                  "traces_dir",
              }''',
          )
          replace_once(
              adapter,
              '''def _maybe_await(value: Any):''',
              '''def build_read_only_browser_profile(
              bindings: BrowserUseBindings,
              allowed_domains: tuple[str, ...] | list[str],
          ) -> Any:
              """Construct the single Browser Use profile permitted by this adapter.

              Browser Use 0.13.4 defaults to accepting downloads and grants clipboard
              plus notification permissions. Those defaults are appropriate for general
              automation and wrong for ModelRig research, so the adapter states every
              security-relevant value explicitly and validates the real runtime object.
              """

              profile = bindings.profile_factory(
                  headless=True,
                  allowed_domains=list(allowed_domains),
                  user_data_dir=None,
                  storage_state=None,
                  keep_alive=False,
                  block_ip_addresses=True,
                  enable_default_extensions=False,
                  downloads_path=None,
                  accept_downloads=False,
                  permissions=[],
                  auto_download_pdfs=False,
                  captcha_solver=False,
                  cross_origin_iframes=False,
                  use_cloud=False,
                  disable_security=False,
                  demo_mode=False,
                  record_har_path=None,
                  record_video_dir=None,
                  traces_dir=None,
              )
              if bindings.runtime_validated:
                  expected = {
                      "headless": True,
                      "storage_state": None,
                      "keep_alive": False,
                      "block_ip_addresses": True,
                      "enable_default_extensions": False,
                      "accept_downloads": False,
                      "auto_download_pdfs": False,
                      "captcha_solver": False,
                      "cross_origin_iframes": False,
                      "use_cloud": False,
                      "disable_security": False,
                      "demo_mode": False,
                      "record_har_path": None,
                      "record_video_dir": None,
                      "traces_dir": None,
                  }
                  for name, value in expected.items():
                      if getattr(profile, name, object()) != value:
                          raise BrowserBackendUnavailable(
                              f"browser-use profile did not retain locked field {name}"
                          )
                  if list(getattr(profile, "permissions", ())) != []:
                      raise BrowserBackendUnavailable(
                          "browser-use profile retained browser permissions"
                      )
                  if list(getattr(profile, "allowed_domains", ())) != list(allowed_domains):
                      raise BrowserBackendUnavailable(
                          "browser-use profile changed the domain allowlist"
                      )
              return profile


          def _maybe_await(value: Any):''',
          )
          replace_once(
              adapter,
              '''            profile = bindings.profile_factory(
                          headless=True,
                          allowed_domains=list(request.policy.allowed_domains),
                          user_data_dir=None,
                          storage_state=None,
                          keep_alive=False,
                          block_ip_addresses=True,
                          enable_default_extensions=False,
                          downloads_path=None,
                          auto_download_pdfs=False,
                          captcha_solver=False,
                      )''',
              '''            profile = build_read_only_browser_profile(
                          bindings,
                          request.policy.allowed_domains,
                      )''',
          )

          runtime_contract = "scripts/browser_use_runtime_contract.py"
          replace_once(
              runtime_contract,
              '''    BrowserUseResearchOutput,
                  load_browser_use_bindings,
              )''',
              '''    BrowserUseResearchOutput,
                  build_read_only_browser_profile,
                  load_browser_use_bindings,
              )''',
          )
          replace_once(
              runtime_contract,
              '''profile = bindings.profile_factory(
                  headless=True,
                  allowed_domains=["example.com", "*.example.com"],
                  user_data_dir=None,
                  storage_state=None,
                  keep_alive=False,
                  block_ip_addresses=True,
                  enable_default_extensions=False,
                  downloads_path=None,
                  auto_download_pdfs=False,
                  captcha_solver=False,
              )''',
              '''profile = build_read_only_browser_profile(
                  bindings,
                  ["example.com", "*.example.com"],
              )''',
          )
          replace_once(
              runtime_contract,
              '''    check(profile.block_ip_addresses is True, "profile blocks direct IP navigation")
                  check(profile.enable_default_extensions is False, "default extensions are disabled")
                  check(profile.auto_download_pdfs is False, "automatic PDF downloads are disabled")
                  check(profile.captcha_solver is False, "captcha side-effect service is disabled")''',
              '''    check(profile.block_ip_addresses is True, "profile blocks direct IP navigation")
                  check(profile.enable_default_extensions is False, "default extensions are disabled")
                  check(profile.accept_downloads is False, "browser context refuses downloads")
                  check(profile.permissions == [], "browser context grants no permissions")
                  check(profile.auto_download_pdfs is False, "automatic PDF downloads are disabled")
                  check(profile.captcha_solver is False, "captcha side-effect service is disabled")
                  check(profile.cross_origin_iframes is False, "cross-origin iframe processing is disabled")
                  check(profile.use_cloud is False, "cloud browser fallback is disabled")
                  check(profile.disable_security is False, "Chromium security is never disabled")
                  check(profile.demo_mode is False, "browser demo overlay is disabled")
                  check(profile.record_har_path is None, "HAR recording is disabled")
                  check(profile.record_video_dir is None, "video recording is disabled")
                  check(profile.traces_dir is None, "Playwright trace recording is disabled")''',
          )

          tests = "tests/worker_browser_use_adapter.py"
          replace_once(
              tests,
              '''check(recorder.profile_kwargs["block_ip_addresses"] is True, "direct IP navigation is blocked")
              check(recorder.profile_kwargs["downloads_path"] is None, "downloads have no destination")''',
              '''check(recorder.profile_kwargs["block_ip_addresses"] is True, "direct IP navigation is blocked")
              check(recorder.profile_kwargs["downloads_path"] is None, "download quarantine remains runtime-owned")
              check(recorder.profile_kwargs["accept_downloads"] is False, "browser context refuses downloads")
              check(recorder.profile_kwargs["permissions"] == [], "browser context grants no permissions")
              check(recorder.profile_kwargs["cross_origin_iframes"] is False, "cross-origin iframe traversal is disabled")
              check(recorder.profile_kwargs["use_cloud"] is False, "cloud browser fallback is disabled")
              check(recorder.profile_kwargs["disable_security"] is False, "browser security remains enabled")
              check(recorder.profile_kwargs["demo_mode"] is False, "demo overlay is disabled")
              check(recorder.profile_kwargs["record_har_path"] is None, "HAR recording is disabled")
              check(recorder.profile_kwargs["record_video_dir"] is None, "video recording is disabled")
              check(recorder.profile_kwargs["traces_dir"] is None, "trace recording is disabled")''',
          )

          live_script = r'''#!/usr/bin/env python3
          """Launch pinned Browser Use Chromium against a controlled loopback fixture.

          This is deliberately not an agent or research run: no LLM is created, no
          ToolGate route is exposed and no public site is requested. It proves the real
          BrowserSession can launch, read one allowlisted localhost page, reject a public
          domain and reject the fixture's numeric loopback address, then cleanly stop.
          """
          from __future__ import annotations

          import asyncio
          import json
          import os
          import shutil
          import tempfile
          import threading
          from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer
          from pathlib import Path
          from typing import Any

          from app.browser_use_adapter import (
              _BROWSER_USE_DOWNLOAD_PREFIX,
              _BROWSER_USE_USER_DATA_PREFIX,
              build_read_only_browser_profile,
              load_browser_use_bindings,
          )

          REPORT = Path(os.getenv("MODELRIG_BROWSER_FIXTURE_REPORT", "browser-use-live-fixture.json"))
          TITLE = "ModelRig controlled browser fixture"
          BODY = b"<!doctype html><html><head><title>" + TITLE.encode() + b"</title></head><body><main id='fixture'>loopback-only</main></body></html>"


          class FixtureHandler(BaseHTTPRequestHandler):
              requests: list[str] = []

              def do_GET(self) -> None:  # noqa: N802
                  type(self).requests.append(self.path)
                  if self.path != "/fixture":
                      self.send_response(404)
                      self.end_headers()
                      return
                  self.send_response(200)
                  self.send_header("Content-Type", "text/html; charset=utf-8")
                  self.send_header("Content-Length", str(len(BODY)))
                  self.send_header("Cache-Control", "no-store")
                  self.end_headers()
                  self.wfile.write(BODY)

              def log_message(self, _format: str, *_args: Any) -> None:
                  return


          def check(condition: bool, name: str, results: dict[str, bool]) -> None:
              results[name] = bool(condition)
              print(f"  {'PASS' if condition else 'FAIL'}: {name}")
              if not condition:
                  raise AssertionError(name)


          def browser_executable() -> str:
              configured = os.getenv("MODELRIG_BROWSER_EXECUTABLE", "").strip()
              candidates = [configured] if configured else []
              candidates.extend(
                  filter(
                      None,
                      (
                          shutil.which("google-chrome-stable"),
                          shutil.which("google-chrome"),
                          shutil.which("chromium"),
                          shutil.which("chromium-browser"),
                      ),
                  )
              )
              for candidate in candidates:
                  path = Path(candidate).expanduser().resolve()
                  if path.is_file():
                      return str(path)
              raise RuntimeError("no controlled Chrome/Chromium executable is available")


          async def dispatch(session: Any, event: Any, *, result_required: bool = False) -> Any:
              pending = session.event_bus.dispatch(event)
              await pending
              return await pending.event_result(
                  raise_if_any=True,
                  raise_if_none=result_required,
              )


          async def expect_denied(session: Any, url: str) -> str:
              from browser_use.browser.events import NavigateToUrlEvent

              try:
                  await dispatch(
                      session,
                      NavigateToUrlEvent(
                          url=url,
                          wait_until="commit",
                          timeout_ms=2_000,
                          event_timeout=3.0,
                      ),
                  )
              except Exception as exc:  # denial type is owned by the pinned runtime
                  return type(exc).__name__
              raise AssertionError(f"navigation unexpectedly allowed: {url}")


          async def run_fixture() -> dict[str, Any]:
              from browser_use import BrowserSession
              from browser_use.browser.events import BrowserStateRequestEvent, NavigateToUrlEvent

              FixtureHandler.requests = []
              server = ThreadingHTTPServer(("127.0.0.1", 0), FixtureHandler)
              server_thread = threading.Thread(target=server.serve_forever, daemon=True)
              server_thread.start()
              port = server.server_address[1]
              fixture_url = f"http://localhost:{port}/fixture"
              numeric_url = f"http://127.0.0.1:{port}/fixture"

              bindings = load_browser_use_bindings()
              profile = build_read_only_browser_profile(bindings, ["localhost"])
              profile.executable_path = browser_executable()
              download_path = Path(profile.downloads_path).resolve(strict=True)
              user_data_path = Path(profile.user_data_dir).resolve(strict=True)
              session = BrowserSession(browser_profile=profile)
              results: dict[str, bool] = {}
              denied: dict[str, str] = {}
              started = False

              try:
                  check(download_path.name.startswith(_BROWSER_USE_DOWNLOAD_PREFIX), "download quarantine has expected prefix", results)
                  check(user_data_path.name.startswith(_BROWSER_USE_USER_DATA_PREFIX), "profile quarantine has expected prefix", results)
                  check(profile.accept_downloads is False, "downloads are refused before launch", results)
                  check(profile.permissions == [], "no browser permissions are granted", results)

                  await asyncio.wait_for(session.start(), timeout=30)
                  started = True
                  check(session.is_cdp_connected, "Chromium starts and CDP connects", results)

                  await dispatch(
                      session,
                      NavigateToUrlEvent(
                          url=fixture_url,
                          wait_until="load",
                          timeout_ms=8_000,
                          event_timeout=12.0,
                      ),
                  )
                  state = await dispatch(
                      session,
                      BrowserStateRequestEvent(
                          include_dom=False,
                          include_screenshot=False,
                          include_recent_events=False,
                          event_timeout=10.0,
                      ),
                      result_required=True,
                  )
                  check(state.url == fixture_url, "allowlisted localhost page is active", results)
                  check(state.title == TITLE, "fixture title is read from real Chromium", results)
                  check(FixtureHandler.requests == ["/fixture"], "only one loopback request was served", results)

                  denied["public_domain"] = await expect_denied(session, "https://example.com/forbidden")
                  check(True, "public domain is denied before navigation", results)
                  denied["numeric_loopback"] = await expect_denied(session, numeric_url)
                  check(True, "numeric IP navigation is denied", results)
                  check(FixtureHandler.requests == ["/fixture"], "denied numeric URL never reaches fixture", results)
                  check(next(download_path.rglob("*"), None) is None, "download quarantine stays empty", results)
              finally:
                  try:
                      if started:
                          await asyncio.wait_for(session.kill(), timeout=15)
                  finally:
                      server.shutdown()
                      server.server_close()
                      server_thread.join(timeout=5)
                      shutil.rmtree(download_path, ignore_errors=False)
                      shutil.rmtree(user_data_path, ignore_errors=False)

              check(not session.is_cdp_connected, "CDP is closed after kill", results)
              check(not download_path.exists(), "download quarantine is removed", results)
              check(not user_data_path.exists(), "profile quarantine is removed", results)
              check(not server_thread.is_alive(), "fixture server is stopped", results)
              return {
                  "schema_version": "modelrig.browser-use-live-fixture.v1",
                  "browser_use_version": bindings.version,
                  "browser_executable": str(profile.executable_path),
                  "fixture_url": fixture_url,
                  "denied": denied,
                  "checks": results,
                  "passed": all(results.values()),
              }


          def main() -> int:
              REPORT.parent.mkdir(parents=True, exist_ok=True)
              try:
                  report = asyncio.run(run_fixture())
              except Exception as exc:
                  report = {
                      "schema_version": "modelrig.browser-use-live-fixture.v1",
                      "passed": False,
                      "error_type": type(exc).__name__,
                      "error": str(exc)[:500],
                  }
                  REPORT.write_text(json.dumps(report, indent=2, sort_keys=True) + "\n", encoding="utf-8")
                  raise
              REPORT.write_text(json.dumps(report, indent=2, sort_keys=True) + "\n", encoding="utf-8")
              print(f"\nreport: {REPORT}")
              return 0


          if __name__ == "__main__":
              raise SystemExit(main())
          '''
          # Remove the indentation introduced by this workflow's Python heredoc.
          import textwrap
          (ROOT / "scripts/browser_use_live_fixture.py").write_text(
              textwrap.dedent(live_script), encoding="utf-8"
          )

          ci = ".github/workflows/ci.yml"
          replace_once(
              ci,
              '''  # installs it in isolation and validates imports, constructor fields, the
                # concrete action registry and Browser Use's temp-download behavior without
                # starting Chromium, creating a model client or performing network research.''',
              '''  # installs it in isolation, validates the static runtime contract, then
                # launches real Chromium against a controlled localhost fixture. No LLM,
                # public-site research, ToolGate route or user data is involved.''',
          )
          replace_once(
              ci,
              '''      - name: Upload runtime-contract failure report
                    if: failure() && steps.runtime-contract.outcome == 'failure'
                    uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
                    with:
                      name: browser-use-runtime-contract-failure
                      path: ${{ runner.temp }}/browser-use-runtime-contract.txt
                      if-no-files-found: error
                      retention-days: 7''',
              '''      - name: Locate controlled Chromium executable
                    id: chromium
                    shell: bash
                    run: |
                      for candidate in google-chrome-stable google-chrome chromium chromium-browser; do
                        if path="$(command -v "$candidate" 2>/dev/null)"; then
                          echo "path=$(realpath "$path")" >> "$GITHUB_OUTPUT"
                          exit 0
                        fi
                      done
                      echo "No Chrome/Chromium binary is available on the runner" >&2
                      exit 1
                  - name: Launch Chromium against controlled local fixture
                    id: live-fixture
                    shell: bash
                    env:
                      MODELRIG_BROWSER_EXECUTABLE: ${{ steps.chromium.outputs.path }}
                      MODELRIG_BROWSER_FIXTURE_REPORT: ${{ runner.temp }}/browser-use-live-fixture.json
                      BROWSER_USE_LOGGING_LEVEL: warning
                    run: |
                      report="$RUNNER_TEMP/browser-use-live-fixture.txt"
                      set +e
                      PYTHONPATH=worker python scripts/browser_use_live_fixture.py >"$report" 2>&1
                      status=$?
                      set -e
                      cat "$report"
                      exit "$status"
                  - name: Upload Browser Use contract failure reports
                    if: failure()
                    uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
                    with:
                      name: browser-use-contract-failure
                      path: |
                        ${{ runner.temp }}/browser-use-runtime-contract.txt
                        ${{ runner.temp }}/browser-use-live-fixture.txt
                        ${{ runner.temp }}/browser-use-live-fixture.json
                      if-no-files-found: warn
                      retention-days: 7''',
          )

          doc = "RESEARCH_CONTRACT.md"
          replace_once(
              doc,
              '''**Status:** contract, deterministic fetch engine, pinned transport, isolated BrowserHost, dormant Browser Use adapter and installed-runtime contract gate delivered; no ToolGate activation or live-browser validation yet.''',
              '''**Status:** contract, deterministic fetch engine, pinned transport, isolated BrowserHost, dormant Browser Use adapter, installed-runtime contract and controlled local-Chromium gate delivered; no ToolGate activation or public-network validation yet.''',
          )
          replace_once(
              doc,
              '''- constructs an ephemeral headless profile with explicit domains, no imported storage state, blocked direct-IP navigation, no default extensions, no automatic PDF downloads and no captcha solver;''',
              '''- constructs an ephemeral headless profile with explicit domains, no imported storage state, blocked direct-IP navigation, no default extensions, downloads refused at browser-context level, zero browser permissions, no automatic PDF downloads, no cross-origin iframe traversal and no captcha solver;''',
          )
          replace_once(
              doc,
              '''The dedicated `browser-use-runtime-contract` CI job installs `browser-use[core]==0.13.4` in isolation and validates the real imports, Agent and Tools signatures, BrowserProfile fields, generated download/profile temp directories, disabled network side channels, history interface and concrete action registry. It does not create an LLM client, launch Chromium or perform network research. On failure it publishes a short seven-day diagnostic artifact; successful runs publish nothing.''',
              '''The dedicated `browser-use-runtime-contract` CI job installs `browser-use[core]==0.13.4` in isolation and validates the real imports, Agent and Tools signatures, BrowserProfile fields, generated download/profile temp directories, disabled network side channels, history interface and concrete action registry. It then launches real headless Chromium, visits one controlled `localhost` fixture, verifies its title, rejects an external domain and the same fixture through a numeric loopback address, confirms the download quarantine remains empty and proves cleanup. It creates no LLM client and performs no public-site research. On failure it publishes a short seven-day diagnostic artifact; successful runs publish nothing.''',
          )
          replace_once(
              doc,
              '''1. run live-browser and live-network validation against controlled public fixtures;''',
              '''1. run live-network validation against controlled public fixtures; the local live-browser launch gate is delivered;''',
          )
          replace_once(
              doc,
              '''6. **T-034D2 — installed runtime contract**: this delivery; real 0.13.4 package surface, dependency isolation, runtime side-channel controls and action registry, but no browser launch.
              7. **T-034E — runtime integration**: CapabilityDescriptor, egress receipt, audit, live validation and eval gates.''',
              '''6. **T-034D2 — installed runtime contract**: delivered; real 0.13.4 package surface, dependency isolation, runtime side-channel controls and action registry.
              7. **T-034D3 — controlled Chromium launch gate**: this delivery; real browser startup, localhost navigation, domain/IP denial and cleanup without an LLM or public network.
              8. **T-034E — runtime integration**: CapabilityDescriptor, egress receipt, audit, public-network validation and eval gates.''',
          )

          # The helper workflow must not survive into the product branch.
          (ROOT / ".github/workflows/apply-browser-use-chromium-fixture.yml").unlink()
          PY
      - name: Validate patch shape
        shell: bash
        run: |
          python -m py_compile worker/app/browser_use_adapter.py scripts/browser_use_runtime_contract.py scripts/browser_use_live_fixture.py tests/worker_browser_use_adapter.py
          git diff --check
          test ! -e .github/workflows/apply-browser-use-chromium-fixture.yml
      - name: Commit final isolated change
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add worker/app/browser_use_adapter.py scripts/browser_use_runtime_contract.py scripts/browser_use_live_fixture.py tests/worker_browser_use_adapter.py .github/workflows/ci.yml RESEARCH_CONTRACT.md .github/workflows/apply-browser-use-chromium-fixture.yml
          git commit -m "fix(research): lock Browser Use profile and launch local Chromium fixture"
          git push origin HEAD:agent/browser-use-chromium-fixture

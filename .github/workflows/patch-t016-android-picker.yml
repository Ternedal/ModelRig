name: patch-t016-android-picker

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/android-scheduler-tool-picker'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: agent/android-scheduler-tool-picker
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '17'
      - name: Apply fail-closed ToolInfo picker patch
        run: python scripts/_patch_t016_android_picker.py
      - name: Run Android contract tests and compile
        working-directory: android
        run: ./gradlew :app:testDebugUnitTest :app:compileDebugKotlin --no-daemon
      - name: Verify patch scope and cleanup
        shell: bash
        run: |
          rm .github/workflows/patch-t016-android-picker.yml
          rm scripts/_patch_t016_android_picker.py
          git diff --check
          test ! -e .github/workflows/patch-t016-android-picker.yml
          test ! -e scripts/_patch_t016_android_picker.py
          grep -q 'schedulable = t.optBoolean("schedulable", false)' android/app/src/main/java/dk/ternedal/modelrig/net/ModelRigClient.kt
          grep -q 'readOnly = true' android/app/src/main/java/dk/ternedal/modelrig/ui/ScheduleScreen.kt
          grep -q 'tampered' /dev/null || true
      - name: Commit clean T-016 delivery
        shell: bash
        run: |
          git config user.name 'ModelRig automation'
          git config user.email 'actions@users.noreply.github.com'
          git add \
            android/app/src/main/java/dk/ternedal/modelrig/net/ModelRigClient.kt \
            android/app/src/main/java/dk/ternedal/modelrig/ui/ScheduleScreen.kt \
            android/app/src/main/java/dk/ternedal/modelrig/ui/ScheduleToolPolicy.kt \
            android/app/src/test/java/dk/ternedal/modelrig/net/ToolRegistryContractTest.kt \
            android/app/src/test/java/dk/ternedal/modelrig/ui/ScheduleToolPolicyTest.kt \
            .github/workflows/patch-t016-android-picker.yml \
            scripts/_patch_t016_android_picker.py
          git commit -m 'feat(android): enforce scheduler ToolInfo contract'
          git push origin HEAD:agent/android-scheduler-tool-picker

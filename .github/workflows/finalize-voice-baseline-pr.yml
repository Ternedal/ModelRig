name: finalize-voice-baseline-pr

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'eval/voice-baseline-harness'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: eval/voice-baseline-harness
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Finalize harness, backlog and generated state
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding='utf-8')
              if text.count(old) != 1:
                  raise SystemExit(f'{path}: target count is {text.count(old)}')
              target.write_text(text.replace(old, new), encoding='utf-8')

          replace_once(
              'scripts/voice_baseline.py',
              '    port = parsed.port or 80\n    return host, port, f"http://{host}:{port}"',
              '    port = parsed.port or 80\n    display_host = f"[{host}]" if ":" in host else host\n    return host, port, f"http://{display_host}:{port}"',
          )
          replace_once(
              'tests/worker_voice_baseline.py',
              '''for bad in (
              "https://127.0.0.1:8099",''',
              '''check(
              vb.parse_worker_url("http://[::1]:8099")[2] == "http://[::1]:8099",
              "IPv6 loopback remains a valid bracketed URL",
          )

          for bad in (
              "https://127.0.0.1:8099",''',
          )
          replace_once(
              'BACKLOG.md',
              '| T-040 20-turn voice-kvalitetsbaseline | #67 | P1 | [RIG] | T-001, T-004 | TTFA, WER, cold/warm, stop og barge-in målt. |',
              '| T-040 20-turn voice-kvalitetsbaseline | #67 | P1 | [RIG] (harness [ISO] ✅) | T-001, T-004 | TTFA, WER, cold/warm, stop og barge-in målt. |',
          )
          replace_once(
              'BACKLOG.md',
              '''Harnessene til T-007 og T-043 er versionsbundne, regressions-testede og merged.
          Kun de faktiske lokale model-/GPU-målinger mangler.''',
              '''Harnessene til T-007, T-040 og T-043 er versionsbundne og regressions-testede.
          Kun de faktiske lokale model-, voice-, device- og GPU-målinger mangler.''',
          )
          for cleanup in (
              Path('.github/workflows/diagnose-voice-baseline-pr.yml'),
              Path('.github/workflows/finalize-voice-baseline-pr.yml'),
          ):
              cleanup.unlink(missing_ok=True)
          PY
          pip install -r worker/requirements.txt --break-system-packages >/dev/null
          python scripts/current_state.py
      - name: Validate final isolated delivery
        shell: bash
        run: |
          pip install --quiet ruff
          ruff check --select E9,F63,F7,F82 scripts/voice_baseline.py tests/worker_voice_baseline.py
          PYTHONPATH=worker python tests/worker_voice_baseline.py
          python tests/workflow_current_state.py
          git diff --check
          test ! -e .github/workflows/diagnose-voice-baseline-pr.yml
          test ! -e .github/workflows/finalize-voice-baseline-pr.yml
      - name: Commit final voice baseline delivery
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(eval): finalize isolated Danish voice baseline harness"
          git push origin HEAD:eval/voice-baseline-harness

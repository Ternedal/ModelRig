name: temporary-runtime-contract-prompt-fix

on:
  push:
    branches:
      - agent/browser-use-runtime-contract

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: agent/browser-use-runtime-contract
      - name: Preserve existing prompt contract wording
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('worker/app/browser_use_adapter.py')
          text = path.read_text(encoding='utf-8')
          old = (
              'Only navigate within the configured allowed domains. Do not click page "\n'
              '        "elements, type into forms, submit forms, log in, upload, download, execute '
          )
          new = (
              'Only navigate within the configured allowed domains. Do not type into forms, "\n'
              '        "click page elements, submit forms, log in, upload, download, execute '
          )
          if text.count(old) != 1:
              raise SystemExit(f'expected one prompt match, found {text.count(old)}')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add worker/app/browser_use_adapter.py
          git commit -m 'fix(research): preserve Browser Use prompt contract wording'
          git push origin HEAD:agent/browser-use-runtime-contract

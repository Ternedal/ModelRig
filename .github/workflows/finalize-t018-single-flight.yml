name: finalize-t018-single-flight

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'agent/scheduler-explicit-single-flight'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: agent/scheduler-explicit-single-flight
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - name: Install test dependencies
        run: |
          pip install -r worker/requirements.txt --break-system-packages >/dev/null
          pip install --quiet ruff
      - name: Align revocation test with one-at-a-time claims
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tests/worker_schedule_revoke.py')
          text = path.read_text(encoding='utf-8')
          old = '''    tick = rn.run_once(now=NOW + 61)
              check(tick.claimed == 2 and tick.completed == 1 and tick.blocked == 1,
                    "one tick: A executes (and pauses B); B's already-claimed occurrence "
                    "is cancelled instead of running against the user's pause")
              check(_runs_used(st, b.schedule_id) == 0,
                    "B's reserved slot is refunded in the same tick")'''
          new = '''    tick = rn.run_once(now=NOW + 61)
              check(tick.claimed == 1 and tick.completed == 1 and tick.blocked == 0,
                    "one tick: A executes and pauses B before the single-flight runner "
                    "attempts another durable claim")
              check(_runs_used(st, b.schedule_id) == 0,
                    "B is never reserved, so its budget remains untouched")
              check(not any(
                        row["schedule_id"] == b.schedule_id
                        for row in st.reserved_occurrences()),
                    "B has no in-flight occurrence after A pauses it")'''
          if text.count(old) != 1:
              raise SystemExit(f'revocation target count is {text.count(old)}')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
      - name: Validate all affected scheduler contracts
        env:
          PYTHONPATH: worker
        run: |
          ruff check worker/app/schedule_runner.py worker/app/schedule_service.py \
            tests/worker_schedule_service.py tests/worker_schedule_revoke.py \
            tests/worker_scheduler_single_flight.py --select E9,F63,F7,F82
          python tests/worker_scheduler_single_flight.py
          python tests/worker_schedule_service.py
          python tests/worker_schedule_runner.py
          python tests/worker_schedule_revoke.py
          python tests/worker_occurrence_ledger.py
      - name: Regenerate state and prove test collection
        env:
          PYTHONPATH: worker
        run: |
          python scripts/current_state.py
          python tests/workflow_test_coverage.py
          python tests/workflow_current_state.py
      - name: Remove temporary workflows and validate clean diff
        shell: bash
        run: |
          rm .github/workflows/patch-t018-single-flight.yml
          rm .github/workflows/diagnose-t018-single-flight.yml
          rm .github/workflows/finalize-t018-single-flight.yml
          git diff --check
          test ! -e .github/workflows/patch-t018-single-flight.yml
          test ! -e .github/workflows/diagnose-t018-single-flight.yml
          test ! -e .github/workflows/finalize-t018-single-flight.yml
          grep -q 'B is never reserved' tests/worker_schedule_revoke.py
          grep -q 'tests/worker_scheduler_single_flight.py' CURRENT_STATE.md
      - name: Commit final clean T-018 branch
        shell: bash
        run: |
          git config user.name 'ModelRig automation'
          git config user.email 'actions@users.noreply.github.com'
          git add \
            tests/worker_schedule_revoke.py \
            CURRENT_STATE.md \
            .github/workflows/patch-t018-single-flight.yml \
            .github/workflows/diagnose-t018-single-flight.yml \
            .github/workflows/finalize-t018-single-flight.yml
          git commit -m 'test(scheduler): prove single-flight revocation behavior'
          git push origin HEAD:agent/scheduler-explicit-single-flight

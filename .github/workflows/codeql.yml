# Static security analysis for the two languages CodeQL analyzes without a
# build harness here: Go (backend) and Python (worker). Kotlin is deliberately
# absent -- CodeQL's JVM analysis needs a full build config, and the clients
# are already compile- and unit-test-gated; revisit after the Agent 3 merge.
name: codeql
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 5 * * 1" # weekly, Monday morning
permissions:
  contents: read
  security-events: write
jobs:
  analyze:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: [go, python]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4

name: _tests

# Reusable test suite. Called by ci.yml (push/PR) AND by build-and-release.yml's
# server-tests job (release). This is the SINGLE place the test list lives, so
# the push gate and the release gate can never run a different set of tests.
# It has no push/tag trigger of its own -- it only runs when called.
on:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.23"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      # Same single-source check the release tag gate runs -- here it also guards
      # every push/PR, so drift surfaces immediately rather than at tag time.
      - name: Version sites match VERSION
        run: python3 scripts/version_tool.py check

      - name: Install worker deps
        run: pip install -r worker/requirements.txt --break-system-packages

      - name: Build backend
        run: cd backend && go build -o /tmp/modelrig-server ./cmd/modelrig-server

      - name: Backend vet
        run: cd backend && go vet ./...

      - name: Backend tests
        run: cd backend && go test ./...

      - name: Python lint gate (syntax + undefined names)
        run: |
          pip install --quiet ruff
          ruff check --select E9,F63,F7,F82 worker/ tests/

      # Every integration + worker test, globbed so a new tests/*.py is included
      # with no edit here. MODELRIG_BIN is used by the backend/e2e tests; the
      # worker tests ignore it. The first failure still stops the suite, while the
      # complete output is retained so Actions truncation never hides the traceback.
      - name: Test suite (auto-includes new tests/*.py)
        env:
          MODELRIG_BIN: /tmp/modelrig-server
        shell: bash
        run: |
          set -o pipefail
          : > /tmp/modelrig-test-suite.log
          status=0
          for f in tests/backend_*.py tests/e2e.py tests/worker_*.py tests/workflow_*.py; do
            [ -e "$f" ] || continue
            echo "::group::$f"
            echo "===== $f =====" | tee -a /tmp/modelrig-test-suite.log
            PYTHONPATH=worker python3 "$f" 2>&1 | tee -a /tmp/modelrig-test-suite.log || {
              status=${PIPESTATUS[0]}
              echo "FAILED: $f (exit $status)" | tee -a /tmp/modelrig-test-suite.log
              echo "::endgroup::"
              break
            }
            echo "::endgroup::"
          done
          exit "$status"

      - name: Upload failed test log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: modelrig-test-suite-log
          path: /tmp/modelrig-test-suite.log
          if-no-files-found: error
          retention-days: 7

  # The appliance code (updater swap/recovery/journal, supervisor rotation,
  # heartbeat) leans on file semantics that DIFFER on Windows -- os.Rename won't
  # overwrite, exes lock while running -- so these Go tests also run on a real
  # Windows runner, not only Linux. Scoped to the appliance packages to keep the
  # job fast; the Linux job above remains the full suite.
  test-windows-appliance:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.23"
      - name: Appliance Go tests on real Windows
        working-directory: backend
        run: go test ./cmd/modelrig-updater/ ./cmd/modelrig-supervisor/ ./internal/heartbeat/

name: _tests

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.23"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Version sites match VERSION
        run: python3 scripts/version_tool.py check
      - name: Install worker deps
        run: pip install -r worker/requirements.txt --break-system-packages
      - name: Build backend
        run: cd backend && go build -o /tmp/modelrig-server ./cmd/modelrig-server
      - name: Backend vet
        run: cd backend && go vet ./...
      - name: Backend tests
        run: cd backend && go test ./...
      - name: Python lint gate (syntax + undefined names)
        run: |
          pip install --quiet ruff
          ruff check --select E9,F63,F7,F82 worker/ tests/
      - name: PowerShell syntax gate
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Get-ChildItem -Path . -Recurse -File -Filter *.ps1 | ForEach-Object {
            [void][scriptblock]::Create((Get-Content -LiteralPath $_.FullName -Raw))
          }
      - name: T-022 approval tests
        run: |
          PYTHONPATH=worker python3 tests/worker_agent3_approval.py
          PYTHONPATH=worker python3 tests/worker_agent3_approval_api.py
          PYTHONPATH=worker python3 tests/worker_agent3_approval_concurrency.py
      - name: Test suite (auto-includes new tests/*.py)
        env:
          MODELRIG_BIN: /tmp/modelrig-server
        run: |
          set -e
          for f in tests/backend_*.py tests/e2e.py tests/worker_*.py tests/workflow_*.py; do
            [ -e "$f" ] || continue
            echo "::group::$f"
            PYTHONPATH=worker python3 "$f"
            echo "::endgroup::"
          done

  test-windows-appliance:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.23"
      - name: Appliance Go tests on real Windows
        working-directory: backend
        run: go test ./cmd/modelrig-updater/ ./cmd/modelrig-supervisor/ ./internal/heartbeat/

name: combined-physical-pilots-compose

on:
  pull_request:

permissions:
  contents: write

jobs:
  compose-and-prove:
    if: github.head_ref == 'agent/combined-physical-pilots-candidate'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.23'

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Fetch proven Agent 3 pilot operator
        run: git fetch --no-tags origin 4221141b50d5277ad1a010fc5432f1585e122a62

      - name: Compose Agent 3 pilot files
        shell: bash
        run: |
          set -euo pipefail
          git checkout 4221141b50d5277ad1a010fc5432f1585e122a62 -- \
            AGENT3_READONLY_PILOT.md \
            START_AGENT3_READONLY_PILOT.cmd \
            eval/agent3_readonly_pilot_tasks.json \
            scripts/agent3_readonly_pilot.py \
            scripts/agent3_readonly_pilot_one_click.py \
            tests/worker_agent3_readonly_pilot.py \
            tests/workflow_agent3_readonly_pilot_one_click.py

      - name: Bind operator to combined physical branch
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          operator = Path('scripts/agent3_readonly_pilot_one_click.py')
          text = operator.read_text(encoding='utf-8')
          old = 'BRANCH = "agent/t020-readonly-pilot-candidate-v2"'
          new = 'BRANCH = "agent/combined-physical-pilots-candidate"'
          if text.count(old) != 1:
              raise SystemExit(f'operator branch anchor count={text.count(old)}')
          operator.write_text(text.replace(old, new, 1), encoding='utf-8')

          test = Path('tests/workflow_agent3_readonly_pilot_one_click.py')
          source = test.read_text(encoding='utf-8')
          old_test = 'check(module.BRANCH == "agent/t020-readonly-pilot-candidate-v2", "operator is pinned to its parent branch")'
          new_test = 'check(module.BRANCH == "agent/combined-physical-pilots-candidate", "operator is pinned to the combined physical branch")'
          if source.count(old_test) != 1:
              raise SystemExit(f'test branch anchor count={source.count(old_test)}')
          test.write_text(source.replace(old_test, new_test, 1), encoding='utf-8')
          PY

      - name: Remove composition workflow
        run: |
          rm -f .github/workflows/combined-physical-pilots-compose.yml
          test ! -e .github/workflows/combined-physical-pilots-compose.yml

      - name: Install worker dependencies
        run: pip install -r worker/requirements.txt --break-system-packages

      - name: Regenerate state and prove complete repository
        env:
          MODELRIG_BIN: /tmp/modelrig-server
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/current_state.py
          cd backend
          go build -o /tmp/modelrig-server ./cmd/modelrig-server
          go vet ./...
          go test ./...
          cd ..
          pip install --quiet ruff
          ruff check --select E9,F63,F7,F82 worker/ tests/
          git diff --check
          for f in tests/backend_*.py tests/e2e.py tests/worker_*.py tests/workflow_*.py; do
            [ -e "$f" ] || continue
            PYTHONPATH=worker python3 "$f"
          done

      - name: Verify exact eight-file composition
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/expected.txt <<'EOF'
          AGENT3_READONLY_PILOT.md
          CURRENT_STATE.md
          START_AGENT3_READONLY_PILOT.cmd
          eval/agent3_readonly_pilot_tasks.json
          scripts/agent3_readonly_pilot.py
          scripts/agent3_readonly_pilot_one_click.py
          tests/worker_agent3_readonly_pilot.py
          tests/workflow_agent3_readonly_pilot_one_click.py
          EOF
          git diff --name-only 582cce37e16e52a69bf6c7f0d8932536ef8e1a5d | sort > /tmp/actual.txt
          sort -o /tmp/expected.txt /tmp/expected.txt
          diff -u /tmp/expected.txt /tmp/actual.txt
          test ! -e .github/workflows/combined-physical-pilots-compose.yml
          git diff --check

      - name: Commit combined physical pilot candidate
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "validation: combine scheduler and Agent 3 physical pilots"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

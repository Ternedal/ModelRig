name: temporary-scheduler-post-execution-test

on:
  pull_request:
    branches:
      - main
    paths:
      - worker/app/schedule_runner.py
      - tests/worker_schedule_post_execution.py
      - .github/workflows/_temporary_scheduler_post_execution_test.yml

permissions:
  contents: read

jobs:
  exact-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Run exact scheduler post-execution regression
        env:
          PYTHONPATH: worker
        run: python tests/worker_schedule_post_execution.py

name: agent3-apply-review-api

on:
  push:
    branches:
      - agent/agent3-integration-draft-v2

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: true

      - name: Apply exact API patch
        run: python3 scripts/agent3_patch_review_api.py

      - name: Commit patched API
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add worker/app/agent3/api.py
          git diff --cached --check
          git commit -m "draft(agent3): expose persistent opt-in read review [skip ci]"
          git push origin HEAD:agent/agent3-integration-draft-v2

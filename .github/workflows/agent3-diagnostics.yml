name: agent3-diagnostics

on:
  pull_request:
    paths:
      - "worker/app/agent3/**"
      - "tests/worker_agent3_*.py"
      - ".github/workflows/agent3-diagnostics.yml"

permissions:
  contents: read

jobs:
  agent3-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install worker deps
        run: pip install -r worker/requirements.txt --break-system-packages
      - name: Run Agent 3.0 tests with full log
        run: |
          set -o pipefail
          : > /tmp/agent3-test-suite.log
          status=0
          for f in tests/worker_agent3_*.py; do
            [ -e "$f" ] || continue
            echo "===== $f =====" | tee -a /tmp/agent3-test-suite.log
            PYTHONPATH=worker python3 "$f" 2>&1 | tee -a /tmp/agent3-test-suite.log || {
              status=${PIPESTATUS[0]}
              echo "FAILED: $f (exit $status)" | tee -a /tmp/agent3-test-suite.log
              break
            }
          done
          exit "$status"
      - name: Upload failed Agent 3.0 log
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: agent3-test-suite-log
          path: /tmp/agent3-test-suite.log
          if-no-files-found: error
          retention-days: 7

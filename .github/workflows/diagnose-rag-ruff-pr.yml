name: diagnose-rag-ruff-pr

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.head_ref == 'agent/rag-benchmark-harness'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: agent/rag-benchmark-harness
          fetch-depth: 1
          show-progress: false
      - name: Capture exact Ruff output
        shell: bash
        run: |
          pip install --quiet ruff
          set +e
          ruff check --select E9,F63,F7,F82 scripts/rag_benchmark.py tests/worker_rag_benchmark.py > RUFF_FAILURE.txt 2>&1
          status=$?
          set -e
          cat RUFF_FAILURE.txt
          if [ "$status" -eq 0 ]; then
            echo "Ruff unexpectedly passed" > RUFF_FAILURE.txt
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f RUFF_FAILURE.txt
          git commit -m "chore: capture RAG Ruff diagnostic"
          git push origin HEAD:agent/rag-benchmark-harness

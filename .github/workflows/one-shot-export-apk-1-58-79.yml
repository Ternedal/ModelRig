name: cleanup-export-apk-1-58-79

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  cleanup:
    if: github.head_ref == 'ops/export-apk-1-58-79'
    runs-on: ubuntu-latest
    steps:
      - name: Delete temporary export branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/ops/export-apk-1-58-79"

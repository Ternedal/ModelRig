name: temporary-peer-binding-test-fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'agent/research-public-peer-binding'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: agent/research-public-peer-binding
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Preserve explicit empty resolver answers
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tests/worker_research_peer_binding.py')
          text = path.read_text(encoding='utf-8')
          old = '        self.answers = answers or ("2606:4700:4700::1111", "1.1.1.1", "1.1.1.1")\n'
          new = '        self.answers = ("2606:4700:4700::1111", "1.1.1.1", "1.1.1.1") if answers is None else answers\n'
          if text.count(old) != 1:
              raise SystemExit('expected resolver default line exactly once')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
      - run: PYTHONPATH=worker python tests/worker_research_peer_binding.py
      - run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tests/worker_research_peer_binding.py
          git commit -m 'test(research): preserve explicit empty DNS answers'
          git push origin HEAD:agent/research-public-peer-binding

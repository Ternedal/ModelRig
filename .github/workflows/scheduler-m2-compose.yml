name: scheduler-m2-compose

on:
  pull_request:

permissions:
  contents: write

jobs:
  compose-and-prove:
    if: github.head_ref == 'agent/scheduler-m2-software-candidate'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.23'

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4

      - name: Fetch proven component heads
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin \
            7ebecbd0f62818218ddd25385379f5c38b6413ca \
            d1d89e7f7e000038eb768c581dd1da9a2f14a3dd \
            7202a9f928e783d2346e30d92ae57f4b9770a0d1 \
            18ab9fce3d3e9a0173f5573aa226b9e36f116e17

      - name: Compose non-conflicting component files
        shell: bash
        run: |
          set -euo pipefail
          git checkout d1d89e7f7e000038eb768c581dd1da9a2f14a3dd -- \
            android/app/src/main/java/dk/ternedal/modelrig/net/SchedulerToolCatalog.kt \
            android/app/src/main/java/dk/ternedal/modelrig/net/SchedulerToolCatalogLoader.kt \
            android/app/src/test/java/dk/ternedal/modelrig/net/SchedulerToolCatalogTest.kt \
            tests/workflow_android_scheduler_picker.py

          git checkout 18ab9fce3d3e9a0173f5573aa226b9e36f116e17 -- \
            worker/app/scheduler_single_flight.py \
            worker/app/schedule_runner.py \
            worker/app/schedule_runtime.py \
            tests/worker_scheduler_single_flight.py \
            tests/worker_scheduler_single_flight_lease.py

      - name: Compose additive worker conflicts with three-way patches
        shell: bash
        run: |
          set -euo pipefail
          git diff --binary 7ebecbd0f62818218ddd25385379f5c38b6413ca 18ab9fce3d3e9a0173f5573aa226b9e36f116e17 -- worker/app/schedule_api.py | git apply --3way
          git diff --binary 7ebecbd0f62818218ddd25385379f5c38b6413ca 18ab9fce3d3e9a0173f5573aa226b9e36f116e17 -- tests/worker_schedule_api.py | git apply --3way

      - name: Compose Android picker with timezone UI
        run: python3 scripts/compose_scheduler_m2.py

      - name: Remove transport and regenerate authoritative state
        shell: bash
        run: |
          set -euo pipefail
          rm -f scripts/compose_scheduler_m2.py .github/workflows/scheduler-m2-compose.yml
          python3 scripts/current_state.py
          git diff --check

      - name: Install worker dependencies
        run: pip install -r worker/requirements.txt --break-system-packages

      - name: Build and test backend
        shell: bash
        run: |
          set -euo pipefail
          cd backend
          go build -o /tmp/modelrig-server ./cmd/modelrig-server
          go vet ./...
          go test ./...

      - name: Python lint and complete repository suite
        env:
          MODELRIG_BIN: /tmp/modelrig-server
        shell: bash
        run: |
          set -euo pipefail
          pip install --quiet ruff
          ruff check --select E9,F63,F7,F82 worker/ tests/
          for f in tests/backend_*.py tests/e2e.py tests/worker_*.py tests/workflow_*.py; do
            [ -e "$f" ] || continue
            echo "::group::$f"
            PYTHONPATH=worker python3 "$f"
            echo "::endgroup::"
          done

      - name: Compile and unit-test Android composition
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager "platforms;android-35" "build-tools;35.0.0"
          cd android
          echo "sdk.dir=${ANDROID_HOME:-$ANDROID_SDK_ROOT}" > local.properties
          ./gradlew :app:compileDebugKotlin :app:testDebugUnitTest --no-daemon --console=plain

      - name: Verify exact union scope
        shell: bash
        run: |
          set -euo pipefail
          base=7ebecbd0f62818218ddd25385379f5c38b6413ca
          {
            git diff --name-only "$base" d1d89e7f7e000038eb768c581dd1da9a2f14a3dd
            git diff --name-only "$base" 7202a9f928e783d2346e30d92ae57f4b9770a0d1
            git diff --name-only "$base" 18ab9fce3d3e9a0173f5573aa226b9e36f116e17
            echo tests/workflow_scheduler_m2_composition.py
          } | sort -u > /tmp/expected-files.txt
          git diff --name-only "$base" | sort -u > /tmp/actual-files.txt
          diff -u /tmp/expected-files.txt /tmp/actual-files.txt
          test ! -e scripts/compose_scheduler_m2.py
          test ! -e .github/workflows/scheduler-m2-compose.yml
          git diff --check

      - name: Commit proven M2 candidate
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "integration(scheduler): compose M2 software candidate"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

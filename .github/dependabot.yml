# Keeps the supply-chain pins from 1.58.42 FRESH instead of rotting: SHA-pinned
# actions and ==-pinned Python deps only move via a reviewed PR (which runs the
# full suite), never silently. Gradle rides along for AGP/Compose bumps.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: weekly }
    open-pull-requests-limit: 3
  - package-ecosystem: pip
    directory: /worker
    schedule: { interval: weekly }
    open-pull-requests-limit: 3
  - package-ecosystem: gradle
    directory: /android
    schedule: { interval: weekly }
    open-pull-requests-limit: 3
  - package-ecosystem: gradle
    directory: /desktop
    schedule: { interval: weekly }
    open-pull-requests-limit: 3
